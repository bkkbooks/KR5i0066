front:
  text: 仙佛合宗語録重刋道藏輯要仙佛合宗語録
  hash: sha256:7fcadf0cedf6ec8db1c90f2a0aeb88103a9bd4ab642bbc893f549c2ee4ca8e39
  markers:
  - {type: page-break, offset: 6, content: '', id: CK-KZ_KR5i0066_03p001a}
body:
  text: 李羲人七問崇禎丙子年秋中朔伍沖虛子在金陵將遠行李羲人初為應天府學庠友已巳初夏參博山無異和尚禪機鋒最稱自悟至庚午季秋望七日拜入豫宗為扣性命雙修之旨竟遊楚浙七年如新於兹始還金陵之家乃有七問焉問之一曰昨觀直論此沖虛子壬戍年所著天仙正理直論一書行於世所云鍊精化氣如何知得是化了氣伍子答曰精化氣者是初關時設為次第之名目也以為精由氣化則以氣之發動時不令化精而復全真氣是即元氣還元氣而言化氣元氣即無形之元精不順去化有形故曰精化氣也若謂後天之有形質者而可妄指為精則有形質者以形質為礙不能化氣身中虛靈之處亦無安頓處亦無通達處凡借精化氣之言指人以執信者乃房術邪説之人莫不執以誑世以舞弄後人不知所謂銷礦成金矣而金不復為礦燒木成炭矣而炭不復為木亦不復地氣而長旺此喻觀之可無疑矣於發動時而還靜還於本地用周天火薰蒸之薰蒸得理則氣歸本地而更長旺薰蒸不得理則不能如是今日發動時化氣補得一分明日發動時化氣又補得一分動而至於不動補而至於不用補補至十分而元氣具足具足時便化氣了矣不復有精而亦不復為世法用大藥生矣謂之華池蓮華開謂之赤水得玄珠亦謂之地湧金蓮亦謂之天女獻花亦謂之龍女獻珠萬般喻名但要悟得此理而後不失之浩瀚無稽茫然稱博問之二曰精以氣化而精氣之一固以化言則易知煉氣化神者氣神原二而亦以化言是何故答曰氣神二以其有氣有神現在故二名之及至心息相依一向淸淨隨順至於寂滅得息無出入心不生滅大定而常定矣夫息無出入是無氣矣而息住脈住其神寂為性獨有真覺真照先若無此元氣助神則神不能常覺常照氣不合神則神亦不能常覺常照即神之能常覺照由於氣氣神歸一而為神通非氣化神乎問之三曰如何名為小周天大周天答曰有異用而後有異名曰請詳其所以異曰小周天者坎離交媾之火候以雙修性命者所用者小故稱小所謂十二時意所到皆可為一日內不知其幾周天矣究其妙正飢時吃飯困時打眠始覺名如未覺名來時之理也凡覺照則小用周天不覺照則不用用之妙有升降有不升降鍾離語純陽翁云可升之時不可降若是者所以為小也大周天者乾坤交陰陽混一之火候法輪遲緩綿延昏默終日間如醉醺如浴起而暖氣融融禪宗人自喻為山前水牯牛略似也所以張紫陽真人云此大周天一場大有危險不可以平日火候例視之也究其妙我師還陽真人云此候無顚倒無進退無升降則其大旨便可推知即白玉蟾真人所云無去無來無進退不增不減不抽添之謂也其始也以一時為一周天以一日為一周天以一月為一周天其既也至於十月而不知其亦為一周天其大如何以其用大故稱大夫即以候之緩而周者曰大自然妙合於緩而不得不緩候之速而周者曰小自然妙合於速而不得不速然又當知小周天本無天以周而且建立為有謂之從無入有也大周天始周有為而漸入無為無火候境界謂之從有入無也若所謂心能依息則萬法歸一心息大定而涅槃而一又歸於無此周天之異用為大小異名也如此問之四曰直論謂煉精化氣在下丹田煉氣化神在中丹田下遷中是一遷而三遷之説又如何答曰按三遷之説於鍾離答純陽論還丹云還者往而有所歸丹者丹田也丹田有三氣在中丹神在上丹精在下丹自下田遷至中田中田遷至上田上田遷出天門是為三遷功成既自下而上不復更有還矣吾見鍾離此語矣聞吾師之説同夫煉精化氣在下田至化氣時絶無有精而惟含藏真氣氣尚在杳杳冥冥之間採之而至似有似無之妙此可遷中田而化神者中田曰離南所以文殊菩薩往南遊行者即此龍女變男子往南方無垢世界者即此華嚴經云善財童子五十三參皆往南行者亦即此善財童子即仙家嬰兒之喻豫嘗聞仙師還陽真人云煉精在下田雖曰反覆循環於三田而此真性常若不離於下田即世尊不離菩提樹下而上升須彌升天宫之祕旨也化神入定在中田而始之沖和塞乎兩間歸之無極常若渾然曠中下而為一所以世尊於欲色天二界中間化七寶坊如大千世界説甚深佛法令法久住久住者大定也即其事也其所以然者精氣本地在下田故二者專歸於下氣在下而神本地在中故雖化神在中常渾合若充塞若虛空其中下而為一此又古仙之不肯輕言凡夫之無所授者今敢直語之為後聖謫問之五曰仙家不用定今或可不必言答曰王重陽真人云呼吸相應脈住氣停靜而生定大定之中先天一氣自虛無中而來又云定中知動方是造化邱長春真人云息有一毫之不定命非已有馬丹陽真人云定息採真鉛又云定裡見丹成又云工夫常不間定息號靈胎太上云轉神入定以成至真斗姥心經云知守本來真身更能精修大定乃至形神俱妙元始天尊云息依神定性定命住張紫陽真人云性定可以煉丹不定而陽不生陽生之後不定而丹不結中和集云九載三年常一定便是神仙諸説重宣如此而世人猶有不及信不肯承當亦不知天上未有不入定之仙也問之六曰古禪師有數十年入定而不出者可同否答曰同者也有不同者也有同者同於能絶淫欲持梵行淸淨則陽精不漏精根如童子得漏盡通者此六通之果古謂之不生死阿羅漢唯聖僧神通僧有之是則同不同者為精漏未盡精根未能如童子則無漏盡通不過謂之五通鬼耳雖能入定全是陰界陰神雙眼皆合不及漏盡通者之雙眼開也唯十二時中無昏沉方能使得十二時眼合者敵不過十二時即無真定有在定迷而轉生於人世者或迷而轉入於橫生者性已墮去而空殼在斯亦何足取為定哉此不同之謂也頑空入定無慧照者皆如此學者不可不察而明辨之問之七曰形神俱妙赤血化白血及拔宅飛升者皆還虛後事今言初定初出時何故言俱妙似欠是處答曰不欠是到得大定而出定即得不死不壞之形不生不滅之神神能超越天地而形亦隨之超越天地何不可言俱妙即此一得永得直到還虛後亦即是這箇俱妙故説初生人時是這箇人乳哺大也只是這箇人如入地成佛是這個佛再加持至九地十地十一地等覺也只是這箇佛何常有異如此則知俱妙矣又謂赤血化為白血者此非所以語神仙天仙也乃人仙不老者及尸解之類者耳何以辨之人仙者精全而元氣固依呼吸之為用有呼吸在則有氣血行由靜多而動少氣為踵息血化白亦宜也但能延年益夀而差異乎常人者若曰神仙天仙其氣化神矣不化氣血息也住脈也住即二禪之息住三禪之脈住似之更有何物可流行而為白血乎所以古人云血化膏息定無氣則亦無血只有肉中膏脂在故曰白血腸化筋食則腸充之而空不食則腸不空而實為筋此二者自化神胎成以後至出神煉神還虛皆如此誠理言也古天仙又云説盡萬般差别法總與天仙事不同然此一會説也皆本豫之直論而重明之者但未聞究問元精我且囑之曰元精有真不可以凡擬真中有信不可以律拘為上天之祕機願再致思焉可矣長沙王朱星垣二問長沙郡王吉王太和之堂弟號星垣未登仙派一問曰精滿不思欲氣滿不思食神滿不思睡必如何得滿亦必如何知得是滿請示教伍沖虛子答曰得滿則有知而滿則由於補如補精之法謂之築基凡人之精巳為淫媾耗損無修仙之基為不滿之物大修行者補精時必遇精生於先天之真時即用火以薰蒸薰蒸即補也補到化氣而在內未發生之本氣亦並得薰蒸之氣補即此氣純無精可生便知實滿百日內事也精自滿竅自閉大藥一到淫根自縮同於童子從欲不可得何用思欲世所稱返老還童者是也而陰藏如馬蝗之説乃為世尊三十二相之一此欲界執身不行淫者之功若精竅不自閉淫根不縮如童子不如世尊之陰藏如馬蝗則不得謂之精滿淫根既斷即得長生小果若能躲避三災亦可如吕純陽祖所謂夀同天地者亦可如佛説夀命幾千萬億劫幾阿僧祗劫者從此以上出欲界而升仙界心在入定化神不至思欲楞嚴經所謂淫機身心俱斷斷性亦無是也又何思欲之有然先補精有神氣配合時固巳補得神氣俱旺及所化之真氣超脫過關時前之氣歸元海為坎實者漸漸以坎實點離虛虛得實而皆實即有所謂禪悅為食法喜食者實則不飢何用思食太上胎息氣經云呼吸如法咽之不飢尸子至德經亦云吸氣以養其和孰能飢之是也然十月胎圓者固皆不食初一月即能減食三月而穀自辟除四月以後絶火食當知此後真不食故曰氣滿不思食世尊亦云如來應供等正覺尚無所食此而猶食猶是有生死的凡夫無定力也不可得謂之氣滿也如楞嚴經所云食地中百穀足不離地必使身心二途不服不食我説是人真解脫者若不食則已漸入於仙仙則神滿神滿者純陽無陰也古仙謂分陰未盡則不仙如有一分陰在即有一分昏沉睡魔十二時中靈光不自覺照神亦如何得滿則不可謂之以神補神則不可得謂之神滿觀太上云轉神入定以成至真道亦不備仙亦不成我故曰必使神住定氣亦隨之而住定神氣俱定從一日之一日起即能不睡晝夜常覺惺惺不昧十二時中無一時不入定亦無一時不在定如是十月之間方得神滿不睡既無睡又何思到此心無生滅息無出入已成陽神仙佛到此皆出陽神便出色界到無色界矣不存知見而全歸於無為煉神還虛合道之義當知此又神滿以後九年面壁事也又問可是别有精氣神補此精氣神否答曰非也真正金丹大道非待外求只是自身中現在精氣神當發生長養向外時還於身中合而為一歸根復命自然發生長養於內自然充滿亦強名曰補曰滿實非補非滿也説到神滿時精氣盡化於神矣神定於見性妙覺同於虛空出無色界矣何滿之足言二問曰聞古人云仙養神胎鍊氣化神而出陽神佛修禪定為悟道道成則出定昨者言仙全是入定出定莫是以胎息轉為入定之名抑以佛法可擬之仙法否答曰皆非也道藏經中有太上妙通轉神入定經云轉神入定以成至真昔張天師云神一出便收來神返身中氣自回如此朝朝並暮暮自然赤子結靈胎即此經義也有太上斗姥本命延生心經云修鍊九還七返大丹者持此頓悟玄關靈光現前了證太玄三一之道知守本來真身更能精修大定乃至形神俱妙與道合真有太上胎息氣經云安靜則神定神定則氣和而元氣自至有太上智慧本願大戒上經云當制念以定志靜身以安神有元始天尊得道了身經云息依神定性定命住性命雙全形神俱妙有太上九要心印妙經云神定則氣定氣定則精定又云意定神全水源淸又云飲食大飽息氣難定又云息依神定神凝氣結又云性定命住為養火文昌經云萬氣齊知得入定門又云修真妙行初定通氣大定全真妙行通靈經之所垂訓者皆如是可定又鐘離真人云三關不固神氣不定豈不走失元陽又王重陽祖云聖胎既凝養以文火安神定息任其自然又張紫陽云恍惚杳冥定之象也惟定可以煉丹不定而陽不生陽生之後不定而丹不結又陳致虛云煉已日久六根大定又馬丹陽真人云神不外遊精氣自定又云安心定念止湛然不動名為真心又云工夫常不間定息號靈胎又司馬承禎坐忘論云但心不著物又得不動此是真定正基又沖和集云造道原來本不難工夫只在定中間會向時中存一定便知日午打三更藥物只於無裏採大丹全在定中燒曰無念之靜定純熟可致無生曰九載三年常一定便是神仙又陳泥丸云以端坐習定為採取凝然靜定念中無念工夫純粹打成一片又還真集云湛然不動者謂之定定中覺靈者謂之慧又白玉蟾云以虛無之境界為靜定之工夫此諸仙翁之所言定也未有性不定而可謂之成道者豫今以二家言異旨同者而重宣之仙家言胎息言如胎中之息息之在胎呼吸不及於外而若不呼吸者漸入於定也此息定而性隨之定氣神皆為一神神既一而全而大定得矣楞嚴經亦云既遊道胎親奉覺胤又云形成出胎親為佛子所以云出陽神即是出定邱真人云息有一毫之不定命非已有為此言也佛家言入定以初禪念住者心不外馳而不著欲境也二禪息住者如胎中之無息正父母未生前也三禪脈住者呼吸絶而氣息定惟內氣之息定而後身外之氣脈不動手無六脈大死一回之驗也四禪滅盡定者胎息久久絶無一得永得大定而能常大定胎完神就之説也胎完足自然要出陽神定極自然要出定本一也不可異識得了原來只是這箇伍守虛二問一問曰昔同於曹門問魔事曹老師云凡遇魔來有心中偶起一念為內魔或身外有見有聞皆為外魔即天魔邪魔等速用焚身三昧火為降魔之法我今忘卻請為我再言之沖虛子曰三昧者佛言正定中之受用也所謂然臂然身者即如是此正邱祖法門所言之定法也而仙言薰蒸四大與焚身三昧何殊火氣盛則魔不能容如世尊出火降毒龍降六邪師降野牛及入三昧火中而降毒龍又云火化已後收取舍利者皆是而真我藏於火中則不見有魔矣二問曰古云得之者早修莫待老來鉛汞少太上靈寶大乘妙法蓮華真經云精多則魂魄強氣少則性情弱又云人有久視之命而嗜欲滅其夀若能導引盡理則長生罔極每見至鉛汞少者不知彼修如何答曰一者亦有師傳仙機採藥煉精內補築基之法在二者亦有服食草木凡藥外補之法在單用其一固可兼用其二速效尤神故黃庭經云百二十歲猶可還鍾離靈寶畢法云晚年奉道而氣不足十年之損止用一年工補之此言補於築基也然有補之易者亦有補之難者修行者因氣以長氣而氣太衰者則長甚難靈根凋於中長之遲緩故補之亦難易補者謂陽氣雖衰尚有生生之機所謂一年補十年精神可復盛而成童體若難補則有陽痿之類者陽氣陽精將絶無可補之隙則必用敲竹鼓琴以喚招悟真篇云敲竹喚龜吞玉芝鼓琴招鳳飲刀圭後人皆以此為衰老所修者言之豫曰近似但精既竭而無順以生人之具即是無逆而生仙佛之本有順則有逆謂見色便見心者此也謂衆生即佛者此也無順則無逆乃所以補之難也邪淫之人借此機會誘人曰必用女鼎採補不思女人身中無精何採何補與仙道以自精補自精者大相違悖世世愚人無由得聞正道故輕信棍言陷入淫坑以速死之事誑稱不死之道而不反思終日逐年眼見得愈採女而愈敗精愈習久戰而愈不能久戰取勝保身窮極歲月徒勞而無益何似得一至簡至易之藥餌為補哉故仙家有至玄妙至神效之仙方非採補而同於採補者若以世法用之固能戰勝以道法用之即能補精全治少壯已來之病大助衰老及身之陽可不珍重求一方邪然所以無順生者是何故或以房勞之故淫媾多者精竭而筋弱不能至老而自痿或以採戰所勝習採戰者晝夜淫媾無度意謂有補而實受其傷精盡耗竭而筋亦早軟不能至老或受地氣濕故坐卧住地卑濕則濕最軟筋而癱瘓皆由於此或受浴水濕故凡人未知學道之先行在世間事其淫媾之後不宜入水遇冷水則永為陰症此人人所巳知者遇熱水之浴最受濕而傷筋故筋亦軟此人所不知防者故多犯至筋軟者軟則不能復徑至筋縮者縮則不能復伸皆絶生理之由也所以生理絶者則必曰其絶得生理者而後能長其生長生者必要精充實即是元精足元精足即是元氣足得生理者則有精可以補精氣故曰能長生思惟曹老師昔云精不足者補之以氣精不足即是精枯竭採不足之精而歸根行小周天火候薰蒸日久則所歸之精得氣助而生精而精自能足矣形不足者補之以味形不足即是形痿縮或專心於敲竹鼓琴而招喚者其動雖有常而稍遲緩或兼用外藥草木之五味而補之則效速故以五味補而求形足生精而補精也遂乃授豫一妙藥仙方氣味俱全兼補難易而能起死回生易為採取助成大道謂之助道金丹此亦蓋世無二之方也凡衰老若無此藥以回生則必不能速還丹而成金液矣昔抱朴子云先服草木以救虧缺後服金丹以定無窮即此説也不忍私之一已用以公之同志令在世者得以補衰種子令超世者得以助道還丹又問請示方之名藥之味製之法治之症施為有用之言普救無邊之衆可乎答曰陳希夷華山西嶽名碑記之方勒方於石碑亦永傳之意也名曰老奴蒼龍丸老返為童之義也老人衰痿者能起之陽縮者能伸之中年虛弱者能補之皆可復勝於少壯者萬倍凡世人之精冷及男根泠者服此一月即能種子歌曰此藥甚靈驗添精神髓堂去冷除風疾扶經更起陽老成宜修合祕密莫傳揚服之保元氣延夀永安康傳此方者謂陳總兵得之於安土官宣慰司具百金贄而得者其聲價之高則效驗果亦甚異廣木香五錢治脬滲尿脬中遺尿滲漏者因元氣耗竭之故也小便祕此藥味溫苦而氣降製則用生薑佐者則效速曬而為末及成丸後皆只日曬忌見火烘傷性治又破結氣於中下焦逐積年冷氣燈心二錢通利竅通小便之竅使精尿皆可通利小便治癃閉成淋者用從草中新剝出者佳製則難成末須以粳米粉作漿漿之曬乾為末入水洗分澄去沉粉取燈心浮者曬乾配數難製而耗拆多須多製方可足配數破故紙又名胡巴奴一兩大溫澀能治脫治脫精之症故得元陽堅固骨髓充實治勞傷房勞之所傷者除囊濕而縮小便暖丹田腰痛膝冷腎寒興陽痿酒浸去皮用麻油拌炒熟去麻瓦焙熟更好忌羊肉雲臺菜核桃肉一兩治房勞傷止腰疼甘平無毒去皮另研拌破故紙為一處以此引破故紙入腎牡蠣粉一兩用左邊顧而大者佳煅微紅採用中間如粉之處四邊堅硬者不用入腎血分藥也同熟地黃用最益精止尿管遺遺精遺尿俱治止鬼交精遺夢遺也又治老痰車前子一兩端陽時採去淨外衣擇實子童便浸炒乾勿傷火入膀胱通尿管淋漓澀痛不走精氣益精強陰止尿血利水道令人有子此種子之要藥也馬蘭花一兩酒浸曬乾用藥店中不知辨認此藥按本草云味辛平無毒生於澤畔形同澤蘭氣臭花紫似菊北人呼為紫菊若無此則用澤蘭原是同種而同治法生澤中者名澤蘭生山中者名山蘭三種原是一也能破宿血養新血止吐血又治鼻衄及血痢萆薢一兩莖有剌根白實者良切片酒浸曬乾忌食羊肉補腎益精縮小便治陰痿失溺強骨節又治痺除風寒濕止腰背冷痛筋骨掣痛明目韭子一兩歸心益陽止莖管白濁遺精同桑螵蛸用止漏精補中止夢遺小便數治下元虛冷小便不禁凡世人之遺精由淫想無窮房勞太甚病發為筋痿為白淫隨溺而下者並治木通一兩利小便泄濕熱瀉小腸之火又治丙丁之火諸經濕熱皆使由小便泄去腎虛者亦愼少用山茱萸肉一兩酒蒸去核用淨肉性微溫補腎興陽長陰莖益髓固精節小便止滑精陰虛者極當用之暖腰膝明目逐濕痺治耳鳴除風邪強力桑螵蛸一兩氣平二三月無桑葉時收之則易尋晒乾炙熟用生者則泄大腸亦風藥中專用者治虛損腎衰益精強陰補中除疝止精泄愈白濁通淋閉利小便又禁小便自遺身衰精自出房勞致小便利者加而用之川中來者大於大拇指全蝎淨身一兩去足尾及內土俱淨炒褐色方妙治疝氣又治風痰中風口眼歪斜掉眩搐掣耳聾母丁香一兩壯陽又溫暖腰膝殺甘𧈟堅齒紫稍花一兩本草無此種名昔秦州劉子指池水中蒲草心上有花示豫此花甚能興陽起痿為天下第一靈物乃做鞋三稜蒲之花也似柳花及似菖蒲花者更長大些如大拇指大三五寸長無心無梗如蠟燭梗在如燭之下江北一斤只賣銀一分每兩一文錢近於所出也金陵曾見每一兩賣銀一分用羊脂酥拌炒為妙豫問此味何功答曰人犯房事後水濕傷筋故筋軟筋縮以此治之有神效肉蓯蓉二兩酒洗剝出身外浮甲劈除心內竹絲樣膜筋酥炙忌鐵器勿犯微溫無毒治絶陽不興泄精尿血遺𤃉補房勞堅強筋骨能除莖中寒熱痛膀胱邪氣暖腰膝長力遠志二兩溫去心用皮以熱甘草湯浸一宿晒乾用之不去心者令人悶忌食豬肉生蔥冷水腎中氣分藥也益精壯陽益腎氣強志倍力菟絲子二兩氣平水洗去砂次以酒浸蒸搗爛作薄餅晒乾為末益氣強力補髓添精止夢泄強陰堅骨治莖中寒精自出尿血溺有餘𤃉蛇床子二兩平挼去皮殼取仁微炒去毒即不辣有殼則辣治陰囊濕癢炒為末撒上即乾而不癢曾用此單一味屢驗堅舉尿莖令人有子種子必用之要藥白茯苓二兩味平而氣降去粗皮中純白無赤筋者方好有赤筋最損目研末入細布袋用水揉洗取白粉用攄去赤筋令淨凡補藥中以人乳汁拌蒸晒又拌蒸晒九次更妙入膀胱腎助陽利竅通便不走精氣長陰益氣除濕又養神驅痰仙靈牌二兩又名淫羊藿羊食之多淫故名凡生長之處不聞水聲者良五月採用莖葉葉似小豆而圓薄莖細亦堅雷公云葉四畔有花剌用鑷刀鑷去淨細而切以羊脂拌炒每斤用羊脂四兩炒脂盡為度絶陽不能興者即能興補腎虛得酒助良治勞氣病冷風老人昏耄健忘者巴戟天二兩微溫選用肉厚連珠中間紫色者佳擊破者肉雖紫又有微白糝如粉色者真酒浸一宿晒乾用止夢遺精滑補虛損勞傷陰痿健骨強筋益精腎之血分藥也八角茴香二兩性熱鹽酒拌濕炒用主腎勞疝氣治膀胱冷氣起諸痿當歸全二兩氣溫去蘆苗酒浸蒸全用者治血不足濕痺不舉腰痛又治中風攣踡客血壅塞客氣虛冷沉香七錢微溫咀而韌柔削而自捲名黃蠟沉者妙必燒試有油多者真市店中每以爛船板假充者多得此真香入丸只宜風吹乾忌用火烘恐傷藥性無功助陽益精又治冷風肢體風濕骨節麻痺又云火盛陰虛者不宜乾漆二兩豫謂此不必多五錢也可再多不過一兩也足用生漆桶近蓋上自乾者狀如蜂窠孔孔相屬者為佳辛溫有毒炒去煙撚指成末為度炒熟用者無毒生者損人腸胃畏雞子忌鹽油續筋骨故筋縮筋軟者用之殺蟲服此初坐者不生虱補中治濕痺除心氣血痛去癥通女人月水熟地黃五兩曾用過六兩微寒酒浸爛石臼搗如泥先以蜜和稀勻後入衆藥則易勻培滋腎水增氣力填骨髓益真陰補元氣大黑蜘蛛七箇曹老師云此物陰寒有大毒舊傳云有此一味我聞李老師述張老祖云舊傳有此不敢妄刪但服之恐生頭瘟及各瘡疽曾經過數人多現症腹背舊本存之去此方無弊治疝偏痛腎子箇上箇下大人小兒皆受濕成此疾愚謂此味傷其七生不必用若腎子無箇上箇下之症更不必用曾不用亦妙共草七味製完為末共有四十兩四錢二斤半之數用生蜜四十兩與藥等將蜜煉至滴水成珠只三十兩為率每斤必要煉十二兩和藥時加淸水十兩湊足四十兩每煉蜜十二兩必要湊四兩水足成一斤則為丸易晒亦易乾和藥搗千杵丸如梧桐子大將有四斤半丸每服溫酒下三十丸空心或早或臨臥每日一服七日見效太虛弱極而陽久絶者五十丸更妙服半月即如少壯或連服半月一月又隔三月五月再服一月半月亦可或在蒲團上催工之時連服不間更妙豫説此方之妙無窮何以見得蓋藥非劫性又非偶用而暫效者乃平常逐日所服能養元神補元氣元精堅其骨補其血與髓則頸項腰脊堅硬如鐵柱利於坐堅其筋益其精則易生旺而易採補無凡情欲事者亦可用並無有害有凡情欲事者亦可用其功勝膏散塗貼者萬倍勝用女鼎假稱採補無益有損者如天壤之隔空勞歲月者如氷炭之異實乃順用之足以助生人之道逆用之足以助生仙佛之道利益無量大哉服食丹藥之一端也其能返老還童也有如此豫謂倘中年少年有服此者或疑其略熱外加小甘草三四錢黃柏三二錢少滋腎陰亦可又問昔有以飲食滋味補者與此草木藥味補者大較何如答曰不戒葷食者或以膏脂厚味為補或以腥辣助陽之物為補汝我亦所共聞第恐妨天曹之禁戒曰齋戒者道之津梁而亦難於具辦非貧家之所能雖用者而效亦緩不如藥食之為美藥賤時只消用銀一兩可成丸一料藥貴時二兩三兩銀可成一料大約四斤半二三老可足一年服用堪為助道之因者安可不為之吾戒葷輩遵抱朴子之言只重以藥食為世教也又問方近於房術計莫亦不宜於正耶答曰似房術而不為房術用亦何妨但生生之理同不過以順生為逆生總成就一箇逆則成聖而已耳慨觀希夷留此方在世已七百餘年而未嘗遍為世用今而附梓流通以出世遍於天下極於未來劫在世出世者皆得用普度寧有涯哉所謂不能以百日而返氣者以此藥之能返者兼用之少謂一助其速耳有道之士珍之若財力不及用此則有機先生藥之工以精補精以氣補氣在前語矣後來聖真亦詳而自量之顧與韜六問與韜名昭應天府學庠生韜音滔一問曰如何是攝情歸性伍子答曰性為人心虛靈至靜塵念俱無之時便是先天真陽之氣由至靜而微動謂之鴻濛一判有可為媾精之具性真便亦覺其有可為媾精之具則此發覺便名曰情俗謂之神情復此神覺還為性真當攝此氣同歸故曰攝情歸性其實即採取配合之説是以參同契云金來歸性初乃得稱還丹金即真陽亦即所謂情也古云二五媾精妙合而凝者正同此説凡言情者兼神氣如儒家言氣質之性性附於氣質而動為情則亦從攝於性而復性也二問曰昭與韜名聞元精有淸濁老嫩之辨正不知用老為是抑用嫩為是答曰至淸而合於無過不及之時是也易云初九潛龍勿用喻元精微動而氣嫩則其發生變化不旺故云勿用九二見龍利見喻元精壯盛而氣充故云利見如鄭思遠真人所云月生玉蕊生是也即其勿用於初而利見於二便知用氣足之二不用氣不足之初而天機判矣我直論所謂嫩之氣微不結丹者以此之過於嫩而氣不足補其氣精不足補其精之謂也又謂老之氣散不結丹者以極老而太過言即亢龍之有悔也亦如月缺金花缷及金逢望遠不堪嘗之説也但看過嫩過老之皆不宜則其中自有可用者在直論所謂非覺而動者言也實動而覺者言也覺而不覺者言辨初陽嫩之過也復覺真玄者言見龍利見之時也若到此當機又怕遲慢失其正氣所以邱祖門下徐復陽真人云披衣又恐起來遲亦言防其氣散也此便是採藥時之危險也凡用工時於此氣足之元精只要不著欲念的便是先天純淸著欲念計較者則濁矣念念在道自然真淸又問曰煉成大藥亦有淸濁老嫩辨否答曰初正則末持源淸則流淸惟淸真之精氣合和神鍊而始生大藥則大藥之淸真即由元精之淸真而成者初不淸真則鍊藥不成安有大藥此不必辨而辨在中矣三問曰凝神入氣穴不知還有呼吸升降否若有升降呼吸不知又如何凝入答曰許旌陽老祖云太陽移在月明中又云金鳥飛入姮娥戶即此義也升降者是採取烹煉之要旨凝入者是歸根復命之密機但升降而行也神氣合一神在氣中不升降而住也神氣合一神在氣中不説是凝神入氣穴也不得又問曰昨聞教言妙於升降者由顚倒用之始得其妙此尚茫然不解願再詳其説答曰當升則專升而不降謂進陽火者是也進足則顚倒之以為降當降則專降而不升謂退陰符者是也惟是升之專則採取方有得專於降則烹鍊方有成非若世人祗知以一呼一吸便為升降者比也所以純陽祖翁謂大關節在顚倒者正言此也若不識此雖採取而不得所以為採取雖烹鍊而不得所以為烹鍊萬萬不能成丹也四問曰先生於沖和之理其中答作用之問以夫婦晝同行夜同住為言固可臆知第不知徹首徹尾皆如是乎抑有時如是有不如是乎願詳其説答曰夫婦為一神一氣之喻同行同住為心息相依隨息之説初關有神氣則有小周天故可以如是言中關煉氣化神有氣有神而至於無氣有神由大周天而然可以如是言其似而實有不如是之妙在末後上關無氣則無火候行住無晝夜周天唯煉神還虛頓然見性地位則不可以夫婦言者非二物也一神且歸於無何况二乎其沖和之氣本屬有於初關更真切又問曰小周天如何以子午十二時為言答曰一天之周原有十二位坎斗柄所旋轉之度周一日之時故借喻言十二時用九六之理數也世尊所謂見明星而悟道者此也世人或聞推移斗柄運周天之説遂以心運氣行十二位此亦可笑也何以故為其心已逐氣外馳則神不定失真氣而氣不凝聚丹已走矣必不能證聖者禪宗人拘拘然只謂北斗裡藏身又謂北斗望南看之説落此局中矣又問曰必如何得不如此答曰斗柄外移而天心不離當處六時進火六時退符而天心亦不以進退而離當處離此則非我祖鍾離仙翁凝神入氣穴之理也五問曰先生語胎息之初謂從無入有而實無於不息之中而或暫有有無兼用願詳其説答曰依文悟之良見其妙再觀之北七真之孫不二元君馬丹陽真人之妻夫婦同拜王重陽真人門下姓孫名不二號淸淨散人生三子矣隨夫成道與邱長春劉長生談長真郝太古王玉陽七人同師稱北七真有詞云有中無無中有有些兒做有無中裏面搜取無內藏真有裏卻如無無有雙亡還同太虛明此則知亦過半矣又問曰日日精思猶不得其有無景象真聰慧過顏閔不能者答曰任你有精思有問辨不過勞心之幻役耳未若實行工夫所悟之得真實也所以孔先師云思而不學則殆之病與學而不思則罔者等也君再思中用學即得其妙踰日又問曰有無二字終難投窾必詳言而後可答曰無者無息有者有息即如在胞中成胎之所以息初結胎本無息漸有息而十月成生而離母則我心中無息息在鼻矣今要在身中無息處而作為有息故謂之從無入有既入有則有息若愚人便強執著有息之相便墮有相虛妄是病非真息也故云實無息相還證不息之胎息此二乘菩薩厭生滅而趨涅槃寂滅之時不能頓已於生滅出入故於不息中而或暫焉少有微息此有無兼用亦未完胎神未得大定之初機為然若非有無兼用之漸法必不能至離相寂滅便墮強制外道則非仙佛正宗無息無相寂滅為樂之本者知此而行方可得無有雙忘還同太虛六問曰火候進退但聞其理請詳如何用於實悟時答曰理明事事行理也本非進退乃借虛喻以説明此一端之理耳若必執進退二字而勉強言之蓋古以子至巳六時為陽子丑寅卯辰巳六時也陽合乾故用乾爻乾策乾爻用九而四揲之為三十六故陽火亦用九同於四揲子丑寅以次皆用四揲之三十六乾策總六爻之四揲二百一十有六故陽總六時亦二百一十有六以午至亥六時為陰午未申酉戍亥六時也陰合坤故用坤爻坤策坤爻用六而四揲之為二十四故陰火亦用六同於四揲午未申以次皆用四揲之二十四坤策總六爻之四揲百四十有四故陰總六時亦百四十有四合之得三百六十而完一周天度數之義但其中猶有卯酉二時不用九六四揲則不滿三百六十之數全言三百六十者亦只大略言其火符之粗迹耳我承聖師所授曰陽火曰陰符謂定而靜者屬陰以不行火而陰若符合火之候也故為陰符陰符經注驪山老姥授李筌者曰陰者暗也符者合也即此義如是則行而動者即屬陽而為陽火矣凡一切十二時中分分明明行九六有數之火皆當曰陽火一切時陰陰暗暗不行火而暗合火者皆曰陰符行動者似進定靜者似退若究及精微密悟必如此悟之為得真實玄妙又問有言夜半子時行陽火日中午時行陰符似説只子午二時行者不知如此亦似此理否亦可成箇甚麼否答曰甚非也絶無所成但有犯説拘於天時即是邪妄誑語為我命由天非我命在我不由天者只因自己無傳不知所以然之理扭揑造為此言以欺世耳或卻病家亦借其説而言之非仙道中和自然之理也仙家火子之後六時皆用陽火乾爻午之後六時皆用陰火坤爻乃身心中虛比活用子午十二時何等直打丁倢人自然非止子午二時之太少何等適宜若用天時子午二時以行火則我身中藥生時全不相遇故不用天時也又問得傳所以然者何法何義答曰總是要遇陽氣自生時取回以補陽氣令滿足耳故將呼吸者以收還陽氣歸於氣根以薰蒸補助若無呼吸不能調和若無薰蒸不能補助及至呼吸薰蒸周天一周則陽氣得補復純靜矣於此若再加呼吸薰蒸是不宜於靜中強加動必俟靜而自動又得陽氣發動之機為可補陽氣者總是要補必求再生再補之理要得真傳也又問火候不宜斷而不續卯酉二時不行火候莫似斷否答曰非也神氣相抱而不離焉得斷又問採封是子時前是子時內答曰前也子起則名烹煉又問採法與封法如何分别而行答曰當採時則用採法當封時則用封法當沐浴則用沐浴法每次用周天皆不異心印經云三品一理大涅槃經佛言達一切境不離一法達磨祖亦言六候别神功是也重刻仙佛合宗語録卷六或問十三條引語曰古今來學道必仙道大明從仙師降授而得者而後可以説仙話垂仙教不然妄言之罪莫大焉若不明宗旨唯蹈襲古人幾句糟𥻿舊説惑世坑人者元太虛陽葆真之作直議真詮尹蓬頭之作萬神圭丹等書是也他如盧丹亭之作廣胎息經最邪妄最淫惡詐託旌陽為説僭瀆帝經為名罪深無間地獄不必言之而可易知其為邪唯是似是而非者最害人之深不知道者信其為道余則見其非道每欲為衆闢其邪説而未及茲因周友㩦至命之評閲余因得以所欲言數彼之妄令後賢不墮其坑穽是所願也一問曰紫陽玉蟾二真人皆言凝神入氣穴直議真詮云神至靈妙如何凝聚得他此一句是直議之説甚錯處蓋息念而返神於心此一句是張紫陽自釋凝神二字之説葆真引來釋入氣穴之義猶覺差些則氣亦返於身漸漸沉入氣穴去此二句皆陽葆真直議之説亦差二説不同請問如何即是伍子答曰彼言神返於心則神歸本位矣氣亦返於身也只言歸得本位不似張白二真人所説神入氣穴是神氣有交媾在此正有修為處非神返氣返各歸而不合一便謂可證道者此直議之錯認心與氣穴大悖道也况張白二真之言出於鍾離祖化神後之言安可妄議之與二問曰葆真子議無氣穴謂元陽真氣散於四肢百骸又為視聽言動豈有區區藏一穴之理此議如何伍子答曰人當受天命而生時則元氣是本根原自有著落處故發明之曰氣穴及在四肢百骸視聽言動時氣之緒餘為用者也猶為本根仍在氣穴內雖有不為身外之用時亦有本根仍在氣穴內且人不能一日無元氣即自有所在有穴無穴雖不可見何必議有穴無穴哉不過鍊精化氣時以下丹田為主煉氣化神時以中丹田為主皆由三田反覆有行所當行住所當住化氣時固在下丹田而氣穴又豈在下丹田之外而别議之耶元精藏於腎不發動時即是元氣而可謂氣穴遠於下丹田乎強議無氣穴自已落空亡則歸根無所歸復命無所復後學毋為所惑也三問曰元太虛議云凝神入氣穴只是收視返聽回光內照而已葆真子議云非是執著所在而用意觀照之不過虛靜以返神於內其師徒二説孰是伍子答曰元太虛所議八字乃陰神家活計非仙理也葆真子所議乃空亡之妄語無果證者殊不知鍾離仙翁所言凝神入氣穴者正世尊所言心目所在之謂也彼借回光內照四字為訓但可訓凝神不能訓入氣穴要知仙真所謂回光內照者異於是當煉精化氣之時即回照精氣當煉氣化神之時即回照氣存神當煉神還虛之時即回照虛固不可著不相關之處用照亦不可著內用照皆落空之境耳去仙機頗遠所以佛説七處徵心皆無有是獨俞玉吾所言回光內照呼吸太和是煉精化氣時之內照以其有呼吸太和四字而知之至鍊氣化神非呼吸之可言所以鍾離正為煉精化氣而發元葆二説不足以語此四問曰李淸庵云畢竟如何是道須向二六時中校勘不與諸緣作對的是箇甚麼伍子答曰此禪家語套耳不知仙真上聖諸佛世尊之所謂道者無形無情無名至虛極之妙也其所謂道生一一而生二今言緣言對當知緣一也對緣者我又一也則二非道矣此之緣即塵也對緣者即根也亦是有人相我相之二者不與緣對者去緣而尚有我在著校勘亦有我在此世尊所謂我相未除皆為虛幻耳我為道中之一物一為道中之一數一在故未至虛極之妙安可指一謂之道一在即神在也佛宗中所謂萬法歸一一畢竟要歸無化神時此心著不得緣境一著緣境即墮六道雖化氣時對緣而心著之則不化氣何莫非不對緣而據稱為道唯如斯而已哉殊不知煉神還虛還之無極而至極方為與道合真齊肩於仙佛者也今古尚無又豈可以二六為言耶五問曰坐忘論云勿於定中急急求慧求慧急則傷定傷定則無慧此説是否伍子答曰此言非也何以知其非蓋人之性體靈照是慧動而發用從耳曰聰從目曰明逐於外不定於內則失慧矣張紫陽真人謂之走丹即此不用聰明於耳目而回光復其本體則名慧名定是名慧於定不名慧於不定定此慧即名定不定此慧則不名定彼云定中求慧則視為二矣果定於先者何物而反言求慧於定中不知已定者便是慧何待於求此所以非我天仙頓法道理一性而二稱者同語也觀定慧是一不是二之言亦相慮能已知此矣六問曰金丹必言鼎器如何即是伍子答曰先把乾坤為鼎器此乃仙家起首之定論又問曰李淸庵乃云身心為鼎器又云乾心也坤身也是否伍子答曰乾非心也乃易所謂乾為首坤為腹者是也行得三田反復之工者方能真知爐鼎之妙又問曰然則淸庵云乾心坤身之説非歟答曰彼亦誤也古云乾心坤身者是取將坎位中心實者點化離宫腹內陰之理言坎腎中陽抽出而成坤心離中虛填實成純陽之乾乃百日關中煉金丹時之造化及十月成神之所證也彼淸庵遂混一言之不發明所用之理不分辨所用之時則非也若必求鼎器於身心唯百日煉金丹其烹煉之工用下丹田為鼎器可以坤身言不可以乾心言心離虛尚未得坎陽填實成乾也蓋乾為首乃有妙用在乾而歸根在坤非言心穴也十月煉神丹用中丹田為鼎器可以心言不可以乾言亦不屬於坤身而其妙用歸根皆在心非身也則知淸庵之説與張紫陽真人所言乾坤共為鼎器者不相合此祕密天機學者須要得箇真知實授來始能用真鼎器真皈依而後可成道不然萬煉千修毫無所益又問鼎器之説更多有言臍者言非臍者言臍下一寸三分者言外腎上之毛際者言心腎兩間折中之當臍上者諸説亦有可用否伍子大笑曰皆非也此巧言惑衆者無根之可歸無命之可復也金丹大道因有丹之名曰丹田就是生長金丹之田也非針病炙艾何用點穴為也又問今言金丹神丹何所分别而二名之答曰腎中真陽之氣名水中金煉腎中精而化金氣故曰金丹煉氣化神故曰神丹七問曰昔紫陽真人云元性非他物也亦氣凝而靈耳請詳其旨伍子答曰但看天地亦氣凝而靈而人之小天地者即如是此張真人發萬古之所未發令人真知性命之宗又問如何是氣凝而靈答曰人從父母二氣初合祗為一氣耳此氣漸化成微形中即有一點靈光如螢光朗耀漸微動為呼吸之狀呼吸成形體全而神明具也以生由是而觀非氣凝而後靈乎且謂仙道氣凝而靈之妙者原夫精化氣者精由氣化使氣不化精而復補全其氣氣以化神而仙道成則純是一神而不見有氣非氣凝而靈如何唯此一靈以動而用則曰元神在靜時則曰元性是也又問如何補答曰古云以精補精以氣補氣凡人當至虛極之時元精元氣將發生而為世法用此正元精元氣生長之微機也我則不以世法用而還歸之於原則元精元氣得外來生長之機而生長之矣正所謂金丹內藥自外來者於此生而採取之時即補之時也運小周天火候烹煉薰蒸之工即補之工也得此時此工則機相乘而相投也不得此時此工則後天呼吸之氣無可施之理亦無有益之用先天精氣亦不得其所補以生長也則氣不凝而不靈何以脫凡而證聖哉八問曰昔一人究玄關一竅李淸庵云於二六時中行住坐臥著工夫向內求之語默視聽是箇甚麼此言是否答曰大修行人頓法門頭於語默視聽一無所著謂之透得境界過著了即繫縛於塵妄奚可生心向語默視聽求外馳耶又問曰如何為是答曰我仙祖李虛菴云一陽初動即玄關又金丹四百字亦云藥物生玄竅是也古人又言非有定處只是至玄至妙之機關則不止於一陽動而為言亦不離一陽動而為言總此大道雖多事事法法皆不無此玄妙機關且如藥生有時有處是一玄妙機關火候調息進則進而不退退則退而無進行當行之道住當住之所是一玄妙機關有鼎爐之在玄妙中者則鼎中之烹煉爐中之採取者是也如煉氣化神十月養胎人不知前以氣煉之有為沐浴即此玄妙機關後乃純神之無為沐浴亦此玄妙機關神有將出之景亦有所出之法如何是煉神如何是還虛超過虛無于寂滅至極皆玄妙機關也故紫陽仙翁又云一孔玄關竅乾坤共合成又言此一竅玄關即玄牝之門冬至藥生火候沐浴結胎脫胎俱在於此則一竅之旨盡之矣志仙機者識之然此至玄妙之機關由真心實悟而得若徒口説而不心悟亦安有此玄妙哉學者尤當勉之九問曰古人云心息相依久成勝定神氣相合久致長生二者可能得否伍子答曰勝定長生皆有先天之氣為心息之所依為神氣之所合非止言此出入息之氣也以出入息是後天幻化之物有成壞故又問曰有云隨息之法與息俱出與息俱入隨之不已一息自住此言亦似心息相依久成勝定之説豈亦非歟答曰天仙家真息之妙自有升降而至於無升降不可以言出入有出入者即凡夫非仙聖上上乘頓法也所以云凡人之息以喉有出入息者真人之息以踵無出入息者徒播弄呼吸出入者謂之守尸鬼子無先天氣者則無漏盡通不能長生而必死者故名曰守尸鬼子學者當精求所以為先天氣者而後可言依言合十問曰息息歸根金丹之母陳虛白此言如何答曰根者元氣所居之地烹煉金丹之所大藥所生之處即所謂氣穴亦曰産藥之西南本鄉煉成金丹則曰根基是化神入定之所住基凡煉丹時採藥於此運用周天火候於此則息息不可不歸於此息息能歸於此則三家相見金丹可成生出一粒黍珠而為服食之寶以其金丹之所由以生故曰母此百日關中之理也所言息息歸根便有主張歸者即神凝氣穴之理十一問曰何謂真人呼吸處答曰人之呼吸似天地故呼亦出於天根乾闢是也吸亦出於地根坤翕是也旋乾轉坤是真人呼吸至妙之機非臍腎中央口鼻諸處范德昭所云內氣不出外氣不入非閉氣也正知呼吸之妙者人若不知呼吸之妙處則不能煉鼎中之丹去仙道遠矣最宜究竟十二問曰有云修煉必至於胎息而後氣歸元海方是純坤十月之工此言是否答曰非也元海者元氣之海下丹田便是凡十月之工歸於下丹田矣其煉氣與息皆至於無而為神在中田矣故非可以氣歸元海言又問如何是氣歸元海答曰元精元氣生於元海每將順去而為後天交感之精真人依法採取歸於元海烹之煉之漸長漸盛或服食金丹故仙聖云氣歸元海夀無窮者是也此百日煉精化氣時事非十月化神為言也余故曰未甚説透十三問曰陽葆真子直議云三宮升降乃其自升降非人升降即犯著禪宗人所謂被十二時使者之理周天運用乃其自運用非人運用此議是否答曰全是邪説誤人太甚豈不聞古聖云神運河車無了期乎鍾離真人亦云丹田直至泥丸頂自在河車幾百遭劉朗然真人亦云華池神水頻吞咽紫府元君遣上奔常使氣沖關節透自然精滿谷神存者所以古來高真上聖教人升降要似自然運用亦合自然非言不用人力而自然升降運用也凡夫不行道者升降由經絡管系非三田也運用由五臟而循環非周天也唯能三田反覆者方能三宫升降得仙師祕授火符者方能周天運用所以邱祖長春真人云運行周回自有徑路不得中氣斡旋則不轉學者當以此言質之雜問答三條或問曰道人爭高曰仙大謂老子度釋迦成佛僧人爭高曰佛大謂仙必參佛而後成真果有是歟非歟答曰無徵而妄爭者兩俱非有徵而曲為強辨妄爭者亦非亦有兩是可證而不可掩處自釋迦出世時老子曾過函谷關此時亦度關令矣關令姓尹名喜聞道而著文始真經行於世西行可證者西渡流沙但未聞老子自言曾度佛否佛亦未自言曾受老子度否後人故不見猶龍之嘆邱長春真人於元始祖四年壬午冬十月西渡流沙河止於雪山之陽從元始祖皇帝征西域時所請也亦未聞其自言曾度何佛曾參何佛吾人皆當置之不必言此無徵者又有俗僧稱佛先生而度老子誑世人宗佛而勿宗仙若此不過只為爭衣食計也我考之佛生於周昭王二十四年甲寅者老子於商陽甲時入玄女胎至武丁二十四年庚辰歲二月十五生者自武丁起一君厯祖庚二祖甲三廩辛四庚丁五武乙六太丁七帝乙八紂王九九君一百八十年又厯周武王成王康王昭王四君九十四年共商周十三君二百七十四年是老子出世已先於釋迦之歲年非後於佛者即令為佛之師也無不可反妄稱後於佛而受教豈可乎此有證而曲為強辨妄爭者也佛之言曰昔者仙人授佛妙法如來因之遂致成佛後乃指其名曰阿私陀仙乃西方五通之仙也事在法華經此仙度佛之有證而不掩者昔阿般提國有仙於大迦旃延名那羅尼依頻陀山阿私陀仙得四禪五神通矣後歸佛修梵行為佛大弟子又商那和修尊者乃雪山飛行仙人也見阿難坐於中流水面跏趺入滅飛空而至阿難付於正法眼藏而為三祖又稱遮迦尊者中印度人也為八萬大仙之首昔生於梵天遇阿私陀仙授法已經六劫投五祖提多迦得正法眼藏而為六祖事皆在傳燈録及五燈會元五燈者宋真宗景德間吳僧道原作傳燈録翰林學士楊億裁正而敘之一也宋仁宗天聖中駙馬都尉李遵勗作廣燈録仁宗御製敘之二也此俗人所作亦不足憑宋宗建中靖國元年佛國白禪師作續燈録宗作敘三也宋孝宗淳熙十年淨慈明翁明禪師作聯燈會要淡齋李泳敘之四也宋寧宗嘉泰中雷庵受禪師作普燈録陸遊敘之五也宋李隱林大川禪師以五燈浩博學者難究乃採輯作五燈會元金大定時另有繼燈録元順帝至元間雲壑端禪師又作心燈録皆詳録前事者此三仙參佛而成道之有證者亦皆西方事與東土無干我所云俱有是者徵此也非若此而妄爭則非矣又問東土有此事否答曰道光禪師陝府雞足山下人也初為僧號紫賢先參修岩問道眼因緣金雞未鳴時如何沒這音響之句又參如環問如何是超佛越祖聞糊餅圓陀陀地之句遂能宗説兼通機鋒敏打丁倢人諸方無能過者參悟到極處識破無證果而生死不可了乃自嘆曰畫餅不可充飢悟得個皆這邊事不過説禪談道而已於佛祖超劫夀命慧命全無干涉乃參張紫陽真人門下石得之姓石名泰字得之號杏林以地名為號者聞仙道而成真證佛又曰投胎奪舍是執空之徒伏虎降龍得還丹之妙又曰我教法門只知悟性為宗世尊所云先除淫根之妙義金丹之道得藥為上然必明心見性為主方為最上若以精竭淫身悟性即成佛萬無是理佛已説其落魔道若不煉性而徒求金丹大藥終是滲漏無成又曰大丹未現前大藥未明透一毫滲漏拋身入身圓明照了兼修金丹道成十極號曰真人此東土佛參仙之有證者未聞仙參佛又李羲人癸酉端陽節遇問曰今有一人自北都來南自言頂門開矣衆驗之果然人能如此可謂工夫久者不知何工能得到此我且走欲詢之伍子答曰頂開有真假自稱為頂門開假也無疑又問曰手驗之則頂門邊前後直長一路皆動如是而可謂假吾不信也答曰君焉能識得破信得假君將謂頂門何故以開蓋為神出而開也陽神陰神俱已到得真空大定可以出定之時則迸破頂門而出陽神有六通陰神亦有五通若無神通頂門不軟便是弄假君可曾知他有神通否李曰未曾問尚未知有無伍曰不必問凡有神通者千萬世之先後知見過去未來者謂之宿命通千萬里之內外有天眼通者能見其形有天耳通者能聞其聲皆能見能聞能知况百千步之間不能用神境通而知見乎當君去求見時彼不先知所見之人又不先知所見之意則是無神境通他心通矣既無神通頂門焉有開理又問曰頂門既非真開何由得有這動既有這動何又言得假開即此尊見與我見便覺有一是一非而不能兩可者在也又答曰唯有這動愈知彼是假弄法矣世人不知頂門之真開者不動手按之則軟不按之則不見與凡夫異何以故由神氣大定息也住脈也住神也住而後能開頂出神是頂門開於丐音信丐門也但透其舊軟竅之骨而不動言神透骨而出如火透水而出勿由孔竅也為無息脈之動故若有息脈之動則通身之脈皆同動故小兒頂動正與息脈同動者此理徵之勘破彼動之假也又問曰雖云彼動是假恐亦難能得此動也答曰易能易知只能瞬目之間而已世有一等假行氣者自腦後逆上至頂轉前而下則頂之前後直長一路有動是因暫時行氣而動非若小兒隨呼吸脈動而動者汝若不信觀察他不行氣時不動便識破他未開而假説何故我又説他是假行氣為其時本不行氣欲哄人觀頂門之動乃暫時行氣以動之不對人用哄則不行氣是也世間又有一等人全不行氣乃務為誑人之打丁倢人法呌人以手印試其頂將眼睛雙雙上下連視之一上下則一動兩上下則兩動不上下視則不動動也祗是浮皮與骨開竅軟無相干涉如此詭計雖有盛德大志學者不過初學見淺焉能辨彼之姦邪而遂輕信之惜哉惜哉問曰若如此容易假為得吾人輩皆能頃刻能之乎答曰如今諸人便可上下視一試之上下視皆動不上下視皆不動諸人亦是有工夫開頂麼又問曰彼何為假此事答曰為人學道須要把萬種機心惡心妄心欺心一切割斷便斷盡輪回種子做個了生死證聖果的人始得若墮在方外遊説之黨無往而不為誑騙人之局也識之愼之又一友問曰嘗聞氣化精今聞精化氣何謂也答曰人之有生以來身中一點元氣是性命之宗及至十六歲乃元氣自能化精之時身體壯盛能行淫媾則化精者正此元氣化一分精則損一分氣逐日淫媾太甚精竭而元氣亦竭矣至人煉金丹服食長生必要元氣全足如胎中時然後得長生精氣不足則不得長生故已竭者必要補之補之之機因其化精之氣機有動方可補得不然不得元氣增長凡氣機一動趨事淫媾者則為精乃世法中氣化精之所嘗聞不為淫媾而收回氣穴外用周天火候薰蒸四大則發動之氣因薰蒸而長旺乃仙道中之精化氣也所以元氣復足者由於留得元精不至耗失而得即其由精而後氣足非精化氣而何附録伍真人修仙歌沖虛伍子有仙階萬厯元年癸酉改元神宗皇帝年號住母胎母王氏孺人自嘉靖壬子年六月初一日生至崇禎庚辰年十一月二十日酉時無疾而坐化尸解所謂白日為真尸解乃升天及生天之類父由貢舉齊靑教父健齋翁嘉靖時中江西榜貢舉壬戍科中會元為權貴所奪乃就齊地靑州府學教授雖甚貧窘而甚甘淸廉乃善人而君子修仙佛者必生於仁賢父母之家方是因果不昧古云一人得道九祖升天當知有聖父母而後可生聖子卻從文廟育吾來文廟是文宣師孔聖人廟母夢廟前榴樹果顆顆如丹又如火吞之一顆化生人十月將過遂生我又夢環胎九鳳多仙兆重來瑞若何二年正旦朝將午翻身下降入婆娑半載隨官臨浙滸浙西紹興府糧儲鹽法别駕衙內也伯陽仙里紹興府伯陽魏真人也生於上虞縣紹興府之所治五齡父别牧滇南滇音顚雲南有滇池時為雲南維摩州牧所怙文章黃蓋土以官卒也當年童子侍師筵叔兄兄叔疊繩愆十齡奮志明經學得遇重陽祖七篇先天章一後天章二坤宫章三乾宫章四玄宫章五黃房章六地雷章七是也十三歲初生異志家有立齋叔翁中明經科貢舉而志於學道此時見立齋叔之書謂學道證仙亦即生學道之異志念念尋真求出世馬自然云此身不向今生度更向何生度此身見此怎不生長生之想十六許可批其文不向橋門爭二試草齡名利便休心時嶽翁之地有連主仙祠堂乃范登雲真人兄弟三人仙祠也顯靈無二吾以名利成敗問之籖曰何必分胡越籓籬剖即家脫身煩惱障飛雪襯煙霞此亦指豫之有根緣也儒衣敝履幡然棄家中頗亦有紅陳無奈三年水荒至每自三月至六月雨多而水漲民無平土之居農無西成之望不敢荒年受福多也食蓼根十數次蓼根者無種無苗萬厯戊子己丑年間江西歲大飢偶生此物於河泮沙洲如簪腳大三四寸長或微紅或白可末為餅食土人尋食療飢豫亦求鄰家老食數次意謂減祿求增福也後歲不飢則不生涉水傳餐救飢人時有滔天之水貧者絶食每日跣涉送飯救人飢餓力為苦行足指生瘡痛及身衣遭跌濕朝三換飯竟加梁日倍蒸倉中空穀皆人貸劵上售錢有幾誠口稱水荒心存騙局此情有若嬰孩拙便是修仙性地仁以穀借出而不收入似無知之嬰孩利人而損巳矣究其施仁積禾德彳亦真赤子之心也二旬五月得逢師生年初至二十歲還陽曹姓戚之兒姓曹號還陽邱真人派下法名常化生於南昌武陽之精渡處祖父皆富聞廬江縣李虛庵真人有道行治裝往謂得天仙之道前此别有一人亦號曹還陽住鎮江府注丹經談外事邪術者與此不同後學不可誤以為此而妄信其言外者南昌同縣武陽地三里鄰居遇箇遲一論天仙最上理請到家中時扣之謂我先人世有善謂我前生佛授衣初生於靑州府之官衙才數月有術者曰此禪僧之轉生也前生修佛猶昨日轉世夜眠恰如一今生今日得逢仙醒後昨心還不失王敻真人云自修證五六劫及證此身念念修心倐巳一世形骸雖改此心不忘持到中秋八月時賣田護師同入室家有父宦囊餘荒年為貧飢者散盡去而不回及至自有所為必有賣田之勢師之兄曰公子家勢熖偏高怎及他騙得道聞又取寶烏能悔輔度人差此亦愼擇弟子之一端所謂師尋弟子難者是也且做生涯還本利我自為之更甚些弟兄同到寧州宿信箇山人解梳木山人騙去半本錢到家折盡愁思哭語豫折去百數金願把外丹酬你欲燒煉點化成金銀之術世謂之煉外丹當此時師只肯受外丹不肯授內丹此見仙師重內甚於重外我求超世證仙真何欲丹金堆過屋大修行人家且宜必捨絶其俗念豈可戀外丹而生一心傳乎豫輕外由於重內故不受豫唯不好師固傳師云汝惟不好煉丹是不貪富貴勢利德已不虧志已特異故可傳外且仙度人傳內未有不傳外者資外以修內汝且受之但無妄為妄傳則可矣但記在心著在目壬子春遂與師同煉於豫章城西西山之後溪水涯次鉛砂凡體入池煎黑盡白見成金木雖曰二體即古所謂一物含五彩亦作仙人祿者是也其中金木水火土之五行俱全青龍白虎玄武朱雀之四象俱備而後成其為白豫師所謂一轉成母者即此是真母昔旌陽銅符鐵劵注乃吳猛真指靈文所言每黑一斤可得白二兩則三十六斤得七十二亦驗面上片片紅桃花心中顆顆碎金粟此即名白金名乾金兌金庚金水中金火中金若雞子鉛汞名真鉛真汞為天上之至寶神仙之祕機真鉛真汞是此真除此煉成得真之外餘皆世間之凡物物白物黃皆此物此得水火既濟交併金木之神氣者為神丹之根基是白而又是黃非黃而又非白內外皆若黃白二色故仙家稱黃白世人無由能聞亦無由能見故亦不知黃白是何物名黃白是何故次次丹頭實所依鼎鼎薰蒸化天祿煉即此烹亦即此養以此而乳哺亦以此有此則丹可還故曰金液還丹無此則丹不可還必無成丹點化服食之理縱燒煉百年空廢家業所謂朱砂未白頭先白水銀未死人先死勢所必至可不愼之超之脫之即丹鉛超者離黑而超出白脫者離白而超出神來所以謂之神丹若非得此鉛中丹之神物必無成道之理暗進明進如酒麴暗進者暗進神水暗進神火屬烹煉之工也明進者明進神水明進神火屬火超脫之工也暗進者在固密之中明進者顯然在外所以此妙絶與世法不同與世談者異若不能如此則非丹道不成不成學丹者當安分已矣壬子春來一試焉般般已驗符親囑師授已多年尚未經手一為之亦乏資財之故及見漁莊所云大丹只從四兩起手何不一試為之况思而不學終是危殆不安是以不得不試驗而為真用實理雖堪點得住世金三轉靈光大現即能點化怎敢妄為滿天福未惜食田屢賣之依師遠出相隨逐試在壬子授法在癸巳雖傳其法而不肯為其事故甲午又賣田隨師參究仙道若非如此堅心恐亦不得聞道寧州旅邸投徐家粗飯常朝難食足初離家之膏粱甚難飽食其粗糲渴時苦菜藥般湯夜後柴房虎伴宿孔方用盡囊且空瘡毒生多眉又蹙孤身安飽不暇圖修仙決志無疑卜信之真學之篤心無疑二也不為時嘗政事不求功名專於事隱也不帥師抒火計火藥之法有攻戰守之全能實護國安邊之長技幼時只圖分茅祚土故學之見鍾離棄侯爵而成仙亦且棄置於無用之地七書八尺若為仇七書者兵家之武經七書也八尺者觀世音菩薩所遺少林寺之神鎗有劈打之法又名夾鎗棍皆用武之具修仙佛者戒殺心正要戒所以殺事百史五經不再識識記也五經子史文士博學之具為治世之需既治身心則不治世故不必再記璇璣倒杖盡休哉璇璣者斗柄運轉以明星象周天之占候倒杖者地理法扞點穴法所宜即毬簷天心十道葬墳墓之仙機修行擇地異於此故亦不用此禽遁握奇俱已矣禽遁者演禽之數及遁甲八門之法兵家卜吉凶決勝負必要之機握奇者安營寨排兵布陳時在中軍帳獨持至一之樞機所謂運籌幃幄之中而決勝也時值周基日有餘五月草二奏天衢遇師一年之後無一日一時不問道此而知心識志方行表奏天庭及紫微中宫請天命而決可傳與否許傳則傳不許則止仙道禁戒至重不得私授於人也投詞符節合同了投詞者誓之詞也重陽真人之門馬與孫等皆焚誓狀之類是也世之後學皆投詞於師此則投詞於上帝而請帝命付符節符節者即洞神經云升天劵以靑素帶身臨升之日五嶽不見此劵則拘人不得升水神不見此劵則留人不令升地官不見此劵則不得升度天官不見此劵則閉天門不令升進得劵則前入紫府見大道君然後一切諸神不敢拘制此天仙度弟子之所有事者剌血靈官王證之抱朴子云至祕重者莫過長生之方故必歃血盟誓乃傳欲修長生而不謙勤親師至要寧可得乎求心不盡令師告之不多祕何及得浮淺之示豈足成不死之功若此之人亦終不得教之在我耳邊説兩句聊通一線修仙路不是等間人可聞修仙便要應仙度古神仙身事歌云天人須選天人學上天不擢下愚人從今隱處辟邪市辟邪是鄉間地名市則有街道貿易朝食忙趨日問師豫隔師家五里許每日早飯畢即趨侍師而問道一年問有三百日半月參將百二時十五年間勤侍教萬千句裏切尋思眼見師餐飲兩頓心忘我受腹重飢每日問道見師餐兩飯矣我尚未及一餐亦願效發憤忘食者故如此整整忍飢不想食漸漸腸疼不識醫餓日久則傷而腸疼亦不識為餓傷而求醫問到黃昏方返舍或明或暗到家遲月上早則明月上遲則暗隨著差馬火把而行家中飯辦炊三次倚門人望不歸兒如此朝朝并暮暮禱蒼唯願道聞之每逢朔望進黃表每月朔日望日表奏上帝以祈恩賜全道果有天仙三催師度一壇淸醮奏靑詞聞道之後己亥年春建醮謝天地及厯代傳道之聖師又斬無常三十夜勤心進道有天知斬無常者保全一年不死之法有符訣咒以斬斷之仙機佛法都問過誓今決要天仙做徐靈府云學道全真在此生迷徒待死更何生今生不了無生理縱復生知何處生生平諸病欲將無凡童稚時所得哮喘風濕等皆愈而欲無昔丹陽真人在終南西遊華亭偶宿窑空中土津火毒吐血發喘道友曰當食生蔥釅醋可解其毒豫謂道家有病他人莫能醫自治足矣修煉身中至寶厥疾自瘳又詞云欲要解四假違和煉身中金玉些小句言便稱賀試道行即有驗凡得一句一言祕妙無不躍喜稱賀幸有前緣萬般職分總休心效所謂全拋世事一念機緣全煉我我者即自己妄想私心煉有我之心至於無我便入無生之際寂滅為樂道若不明仙不成枉作世間人一個誓志此生必要明道成仙若不如此則前世似實修而人生於今既得人今何不以之而修仙不亦枉然乎曾求妻下耳金環并下銀叉湊護財化氣將完護者要財用甚急不得不委曲求為應用網巾圈子割還盡圈子及鈕扣用廢殆盡護得師工大藥來師家少食我推食師家少衣我解衣孀慈罪我傾家計廢家業之資多不免漸漸蕭索荆布愁豫遠案眉舉案齊眉凡世夫婦之大願修行者未成時離家以修之已成後無家之念慮荆布焉得不愁豫遠家衆貶譏圖個甚世人圖富貴圖飽暖必圖成家計今反廢家業抑何所圖而然鄉人談笑願何為抱朴子曰豫忝大臣之子孫棄當世之榮華者必欲登名山合神藥規長生也俗人莫不謂豫為狂惑之疾然不廢人間之務何得修如此之志王重陽真人一鄉皆説為害風謂其輕棄家業為狂惑害風真人亦自呼王害風而不辭幾遭罵辱憑乾唾有惡姪每持刀殺人降人有罵辱至聞而不聞則聞魔自消正鍊已法也便逢欺打未還捶曾有二人將欲痛毆以不還而消之説來不盡千千苦學道如吾未見誰師言汝志我已知苦心學道是仙機十年三受天仙囑速我將伊畢度之一日老師謂豫曰汝於仙階已有分者從十年以來曾三次有天真命我速速全與你道我今亦知汝矣當度與汝也此道先須辨真偽真者成仙之真機元精所生之時真採取配合之時真偽者凡一切後天有形之精皆不可成仙者是偽必要先辨真者長生陽神貴長生不死是真元精所修後陽神現像神通變化皆用初辨得其真煉精化氣氣化神神還虛矣名極位精生本是元精生不是凡精後五行淫精淫事凡精者濁穢焉能證洞淸只為濁形不化氣無形之氣始飛升元精一返補還滿證箇初基自有靈此即煉精化氣築基有成功者精滿無生超欲界精滿不思欲故曰無生既無淫欲之具如世尊之所謂陰藏則超出欲界之外矣心靈方出塵凡世五龍捧聖到南方入定還神功可大南方者離宫心象也即離宫修定煉氣還神之説未到還神必欲還還神者即轉神入定也未還則馳於外而不定未有不定之仙佛必要還於定氣停脈住不庸餐氣停則氣滿而不思食脈住則氣滅盡定而不用食庸即用意只為北堂孀秉節可無孝德了其間憶母年將九十足金陵孤子歸寧速成道世尊兩視親豈我潛修違所欲母有囓指之呼不敢違所欲奉天教誡而全孝道也蓬頭垢面已多年昔白玉蟾徹夜坐晨亦不沐晝亦不炊或客來有問以牙疼為辭無酒亦醉睡醒亦昏蒲團兀坐不成眠天來子云學道先須學打坐若還空坐亦徒然畫餅充飢終受餓一任頓超無量劫不須猶説未生前定到超劫則證到未生前矣無可再説再説未生即是有生落二義者天先地先先有我先有我即先天地之元神所以超劫運者不隨天地同壞不生有我是真我真我則不生有我之念是大寂性體在天地及大劫運度之上故不隨以壞若有我則猶是天地之有後者為天地之所生焉不為天地之所滅若無我又同天地之無天地壞我即壞皆非真我惟我而不我是為真我我到地天無無無無無亦無是至極之極即經所謂玄之又玄妙之又妙方許天仙是這箇這箇者是真我無無亦無我既無無亦無視天地無無亦無矣視大劫運度無無亦無矣天地雖隨劫壞猶若無無亦無之天地何繫於我故不隨壞而常存於無無亦無故曰這箇方是這箇真我
