body:
  text: 仙佛合宗語錄冲虛眞人伍守陽著眞陽子伍守虛校註吉王朱太和十九問法名太和號雲水在宗人府玉牒名派常湻𥈠皇帝重孫一問曰䝉指我以眞藥物猶未明辨所以爲藥物之眞嘗聞上古聖眞及師仙所言只是口說眞藥物猶不知自身中辨何爲眞何爲不眞故不免疑而再問之伍冲虛答曰眞藥物卽眞精也精何故言眞以修仙道可用者名曰眞不可用者不名眞彼後天交媾之精卽不眞交媾淫精已有重濁形質不能變化復返爲無形質之元炁而化神旣不能化炁化神便是不可用者故不眞莊子南華經云旣以爲物矣欲復歸其根不亦難乎陳眞人云貪嗔愛慾不能離安得此身延夀考抱樸子云有一等專守交媾之術以規神仙而不作金丹大藥亦愚之甚也先天元精乃謂之眞精未有天形之先只是元炁如未有人形之先亦是此元炁然生天生人生仙生佛皆是此炁故云至靜未動曰元炁靜而時動曰元精元精實卽元炁非二也而强名爲精乃修仙成道之根基始是修仙可用之眞精第世人人人能說眞精世人見仙只言眞精遂亦藉口亂說知眞精以誑人况彼不遇眞仙親傳何由知得精之眞者不過執後天交媾之精冐認指爲眞精者也凡斥稱世人以其迷戀世法之人非眞苦修志學者仙何肯傳大道假令聞道亦無用處及至誑人皆指媾精爲眞精也或有暗與道合偶似一遇其眞者有之終不知其所以然之妙理也顧與韜庠友在道隱齋中問曰所以然之理願得再詳之冲虛子答曰靜動生滅之有循環人人之必然者且循環不窮焉不一遇由學不得眞傳雖遇先天發見而竟失卻亦不知辨眞與不眞而用皆由不知所以然也何爲所以然蓋人自有淫媾之後已來精耗而因以耗元炁炁曰元是元頭始初之炁無形者耗而少矣必補而足方可長生不死必用無形一樣元炁補之纔方相受若有形之淫精則自炁變落下一層故不相受不相補旣身形與精形相隔有形與無形不相受此理之所以也不知者蓋精生有眞時要知而不知則精中眞炁不足卽補炁亦不得足不能成仙當採取配合亦有眞時當知若不知則炁精不能眞足者卽補精亦不得足而化炁亦不成仙能知此所以足者以補則身中元炁自能長旺圓滿可伏胎入定出神入仙故古聖云杳杳冥冥其中有精其精甚眞得所以然之眞方能成仙而了道此正所謂道之原也必先知此所以然者而後能求求而能得若世人浮慕而聞其粗淺套語安能知彼人有從有念而爲精者卽交媾精之類也與韜問此有念答曰有念者有淫媾之妄念也因淫念而生之精卽同交媾精因淫事而生之精亦卽交媾之敗精精已敗者炁已耗矣更何以得長生故華嚴經中佛言初禪念住楞嚴經中佛言汝以淫身求佛妙果輪轉三塗必不能出如來湼槃何路修証陳虛白云大道教人先止念念頭不住亦徒然是仙佛皆同除此一念也有從無念而爲精者卽先天元精也與韜問無念答曰無念者無淫媾之妄念虛極靜篤乃未有天之先未有念之先在杳冥中之精爲先天元精世人每有無念而遇未得師度仙機竟棄而不用或知元精之虛名而不知當用之眞時實用故不免當靣錯過於斯二者亦有鍊之而亦竟無成功是何故二者是言有念無念之淫精眞精也淫精鍊之無成固宜矣而有略知眞精鍊之亦無成功不知此是何故蓋由不知辨所以妙理則亦不能辨所以妙用眞精由鴻濛杳冥判來其妙有可長旺得身中之精炁者猶有不能長旺中之精炁者若人不知當採時之妙理卽不知用當採時之妙工也不過祇是遇得世間凡夫傳得世間凡夫法耳凡夫法皆是邪淫事或有被人譏貶恥笑不敢說邪轉爲口說淸淨而身心所行實不淸淨口說眞精竟是杜譔空亡幻說皆爲欺人之謀詭取衣食學者遂執而信行希望成仙亦大誤矣與𡸅曰或亦有執實行淸淨者否答曰雖有實行淸淨終不得遇仙傳藥生之眞時採取烹煉之眞時不能得丹成仙證道修至炁盡老死依舊是一凡夫死亡而已絕無不死而長生者總因與仙家辨眞時不同我故曰凡夫法子已從凡夫學鍊藥矣按其不成便見其藥之猶不眞也當知有異於彼而爲眞藥者在也子者對吉王殿下言也不成者是由不知藥生之眞時不知採藥之眞時故不得眞藥不能補足身中未發動之元炁炁補足卽是丹成炁補之不能足則是丹不成仙不成止是凡火之妄爲非仙傳之眞藥也旣見不成怎不求眞傳尋眞藥之妙理妙用者乎夫無念而得爲眞精者固是矣人而無念則心眞虛靜矣至於靜篤鴻濛時似有動而忽有動機正是眞元精之先天也此人人之本有可遇而可得者雖有知眞精而不得元神靈覺如是如是精雖眞而亦不得爲眞精用或有聞師言眞精而知眞精之名但因初學淺見時至而猶不知不能以元神配合宰運採取烹鍊亦至當面錯過如何能得眞精用如此亦是知之不眞信受奉行之不篤耳玉淸上妙功德經云不善修持而失法本不能長生天來子白虎歌云月無庚氣金無水縱有眞鉛枉用心此上天所祕之妙實在如是天所祕是祕之不傳無德以傳有德也人與天相隔甚遠人德合天則與天爲一矣故傳與以如是德之不修以合天則不能得傳也如是者是以元神辨藥生之時爲配合得知此則得長生不死入定出定神通無極此上天之所以當祕也靈寶度人經云水火二用非聖不傳舉世間人所不得知之妙實在如是天仙以如是祕法得證仙於天惟天仙之所知所行者而世間人何以知人能修德合天卽是天人則可得知如是不修德以求合天卽是凡夫下鬼終於不得知如是者而已欲學道修仙者先當自勉修合天德海誓山盟而不敢輕洩者實在如是世有善根聖眞專心修德精進學道上仙高眞固肯傳以道矣猶且令設盟誓如海樣之深如山樣之大懴悔其已前之或有錯者禁戒其日後之不爲非不緩怠於自修不妄傳於無德其不輕洩藥生採藥生眞時者如是度人經云長生久視之法上天其禁至重得此眞卽天仙矣卽同世尊佛矣得此元精眞則精炁能化炁而成漏盡通出陽神而超浩浩劫運惟此眞者方是天仙之道同佛道不得此眞則談禪說道皆爲幻妄虛言矣若不得知此藥生採藥之眞時則不成漏盡通不出陽神超刧運只成一個空談妄語而已子今得此於明言精始眞矣藥始眞矣言吉王如今得明白說此藥生眞時始知仙道所用之眞精眞藥始可成漏盡通出陽神等事始知不同於昔所學之世法所言世法中之濁精而已者一試修之起首便能合道古云起頭不遇作家到底翻成骨董若傳得眞便行得合起頭修也合道到證果極處也合道古云九轉工夫總一般是也悟一步則行一步行一步則入一步入一步則得一步則知不傳之妙得果之靈證道之速旣悟藥生及採藥之眞時則時眞卽是藥眞精眞便行此採眞精藥之工旣行採工令精隨神凝入炁穴周天烹煉薰蒸久而煉精之工足矣化炁足而得大藥成漏盡通長生不死之初果始知天仙所不輕傳有如是之妙得長生之果有如此靈驗總之百日而得長生十月而入定胎成出陽神而神通無極證道如此速所以古云成就只一二年不似淫邪旁門窮年採戰至於老病苦死而追悔不及者比非彼世人所得知所及證也而世人之誤信邪師誑惑者可勝惜哉世人不修仙德而妄求仙道又不知果有眞仙道之正理在而求之安得知而安及證更被邪師以仙書眞道之言巧釋彼邪說詐以欺之世世人人盡信其誑而不能疑絕無能改過者可惜被害而迷失仙道且喪失本自有之現在性命也已二問曰古云水源淸濁要分别敢求指示如何分别答曰水喻眞精淸卽先天濁屬後天源者精炁之所由以生者也此仙聖示人分别至切要之語奈何世人妄解聖言罔誣後學仙聖之言垂世必世人得受仙度者而後悟解始眞若凡夫但聞凡夫之教甚至不受凡教而徒然看妄人之妄註而亦爲妄精妄解聖言自稱能悟得悟不顧欺誑害人而以迷指迷徧古今也若不向源字上用辨只於淸濁字勞心謂後天中以無形之精爲淸以有形之精爲濁元精只是無形元炁不可以形辨可形辨者後天旣爲後天又爲後天之神所宰雖未見形亦已耗㪚不得復元若精不合淫念淫事必不至於有形及至有形則中之眞炁已爲淫事耗盡矣是邪門外道所言而仙道必不以如此爲辨嗚呼此地獄中種子之說也凡言有形無形者必是以淫媾爲辨淫敗炁耗古聖言炁盡則死故爲地獄中種子也仙聖因元炁之生人故教人鍊住元炁令人長生不死殊不知先天元精由靜極而自動炁至足而源至淸卽謂眞藥物矣靜而動是天地循環自然之機仙道亦如之不是人心念妄所動者故曰自動元始天尊說得道了身經云不識動靜眞機不達眞常全眞妙理如何得道成眞此問水源淸濁辨法與上章問中事同理同而問異故兩答之各有詳略亦互爲發明而元神靈覺卽能合和是謂以覺合覺隨而採取隨而烹鍊不作世緣念想用工一刻卽長一刻之黃芽而金丹可就仙道可冀元精元炁有覺而元神亦有同覺卽得時至神知之妙以兩所覺而配合故云覺合覺如一夫一婦始終不相離也許旌陽云内交眞炁存呼吸俞玉吾云眞機妙處在杳冥之内冬至之時必先閉塞其兌澄心守默使金與汞同歸於爐中如日月合璧則神凝氣聚金液乃結倘忘其緘默任重樓浩浩而出則自取傷敗也本註云用工者卽採取配合烹鍊之工也一刻者卽一小周天火候也黃芽者卽神炁内鍊所成之眞炁也純陽仙翁問曰何爲黃芽鍾離眞人云眞龍眞虎是也龍乃陽龍出在離宫眞水之内虎乃陰虎出在坎宫陰火之中本註云金丹者金液還丹也卽元神煉元精所成之靈炁又曰黃芽曰大藥所以服食者服之而結胎養神神定而全卽是仙成金丹成時是命住神得定是性住故曰金丹就仙可冀言必成仙也若念想塵緣擬議習染而後精因之以生則純是後天思慮之神所致此源濁者之不可用以其眞炁不足不産黃芽而有生必有死之决然者也世人口稱學道而妄想凡情愛慾者多矣情慾有動則精必生此精之生不以靜而内生唯于身外偶生故靜篤之眞炁不足而源濁不可用以内修者故廣成子云毋摇汝精精摇則少而漸竭無以還丹故陳眞人云精少則還丹不成是也若此者皆因塵緣習染淫慾未斷皆凡夫事猶在欲界最下處與有生死凡夫同類故與凡夫同必死者或有水雖自靜而動而源亦淸矣其元神靈覺雖覺而不能眞覺依然墮于塵緣習染轉爲後天思慮之神所攝則不復爲淸眞而妄用其採取烹煉亦無成聖果之理南岳魏夫人云若抱淫慾之心行上眞之道者淸宮落名生籍被考於三宫也宗道者貴無邪棲眞者貴恬愉白玉蟾云學仙非爲難出塵離慾爲甚難王玉陽眞人云隨情流轉定落空亡更道難成功難就業難富於此辨得源字眞藥斯眞矣水源卽是藥源淸眞是藥淸眞源濁不淸眞是藥濁不淸眞長生仙道必分别源字爲要又問水之淸濁何關神之淸濁答曰靜定之中神炁如一皆靜也如是靜亦神炁一動亦神炁一古云時至神知卽神炁同動是也學者不知神淸是不著妄念隨水源皆淸是聖種神濁是水源著妄而濁卽皆濁是凡夫輪迴種故仙聖教人辨此爲至急靈寶大乘妙法蓮華眞經云性者靜也炁者動也動靜一如非至人安能措心于此廣成子云靜則靜于神意動則動于神機動而外馳逐妄則爲二動而不妄馳猶然合一非眞淸之同而何元神一馳炁亦馳元神一染精炁亦耗非濁之同而何動而爲二者神固有不知攝氣歸根者爲二也或有不遇本根之對境散漫馳于六根之别境亦爲二也俞玉吾云金火要同爐在人一念返還耳此淸同合一者皆如是仙道之當然反是則根塵相觸而不能返還此濁同合一者亦如是卽元始天尊得道了身經云意定神全水源淸意動神行水源濁之說也陳虛白云心動則神不入炁身動則炁不入神故我邱祖眞人亦有心地下工全抛世事之旨在也楞嚴經亦云塵旣不緣根無所偶反流全一六用不行是也此四條皆結證上文神炁靜動合一不合一之旨仙佛同然者而禪宗人又言動念卽乖者亦是此意按丘祖教人心地上用工卽照而寂寂而照之意明心見性也禪心無想禪性無生正與世事大相反者法尙應捨而世事必抛也抛至無生便是性地按楞嚴所言塵者是外來六塵之事與物也緣者相依著之意根者眼耳鼻舌身意六根也偶者根與塵相對也言心不著於外塵則不使眼根用見與外色塵對偶不使耳根用聞與外聲塵對偶之類反流者逆流之水故洞山和尙言洞水逆流卽仙家返還眞一之水意眞一之流得反則命根斷性獨明靈六根之用皆不用則心地之工成而得證此又問曰辨淸何爲答曰淸炁者天之本體欲爲天仙必以淸炁同於天之本體而後能與天合德所以純陽仙翁云煉藥方可昇仙譚長眞仙翁水雲集云今生若要登雲路不合虛無不能仙此言得同天之淸炁卽可必證天仙若有一毫形不能妙則同于重濁之地體而止合於地德止證得地仙而已矣地仙不能離于地故名地仙所以純陽仙翁云煉形止于住世可得百千萬億𡻕夀不能昇於天者有志于修天仙者不得不辨之尋向上去三問曰古云鍊精者鍊元精非交感之精未審元精未及鍊者亦成形似交感之精否抑止於元精而不至似交感之精否請詳之答曰精一也有元精淫精之異名者是由主宰之者而致有異也豈自異哉然元精在身中靜篤時無形之精也卽元炁卽先天廣成子答黃帝云至道之精杳杳冥冥是也雖能生諸後天有形不得神宰亦止於先天無形而不自爲後天生有形雖久而不採不鍊亦只成先天之散炁而巳世人皆言成有形之精謂採之遲者及不採者皆老而成形此言大非也彼是妄談房術淫媾之精必至如是而不可以語仙道元精也畢竟仙道不同於世說有神宰爲交感之用而後變化成後天非自成後天也當其隱於寂靜之中靜極而自動曰生精是天地人自然循環之生理當如是也故修丹者由靜極而生之精名曰精而實非精故曰元精未妄動而炁本自足炁足則能成丹轉運而胎神出神也所謂以精補精因精以淫耗而炁爲之不足仙聖教人以身中發出之元精不令再耗返還而補未發動之炁令足所以補者補之令足也精炁足如十六𡻕童子卽是長生不死根本若不能補足炁而氣不得補足終非長生不死之仙道玉淸上妙功德經云不善修持而失法本不能長生大還心鑑云至陽生不修行益生何得長生乎然鍊丹必不用交感之精者是何故以其或偶觸目觸耳而生或念妄而生觸目者是眼根偶見淫色觸耳者是耳根偶聞淫聲念妄者是心中偶起淫念皆所以生淫精者生不由靜而炁不足炁不足者原非丹本卽不能成丹以長生不死彼又以將見精爲幸不知及將見精其勢卽爲後天之敗精而已昔廣成子答黃帝曰毋摇爾精乃可長生陳泥丸云樹根巳朽葉徒靑氣海波翻死如箭焉得有已敗之形枯炁盡者而能復返爲先天入於無形之炁乎故仙道與邪門之所以異必不用淫精也王重陽眞人云回首處便要識希夷煆煉須將情滅盡修行緊與世相違故紫陽眞人云幻丹者由未靜心田遽採一陽陽非眞陽神非元神以欲念而交會陽生此幻丹所以有直採之升至臍又無安頓處後天的一敗精蕩然而去先天又無主此非長生之丹乃促命之法此深示人以後天有形者必有壞也黃庭經註云學仙之人一交接則傾一年之藥勢二交接則傾二年之藥勢巳往之藥都亡于身所以眞仙常愼於此伍子又申明前註旣學仙則精炁常聚而多倘一交媾把所聚精炁亦傾多說傾一年之藥勢大約言也我謂更多傾者也有精炁甚難成藥萬幸得成藥豈忍媾傾最宜愼保精也張翁所言先天主者是先天所由生之根本意也後天精不耗散則先天精亦不耗散後天盛則所生先天亦盛淫媾用精竭者則先天之精炁無由所生而有陽絶之病故云先天無所主張紫陽自家又云大藥不離精氣神要識藥材又精炁神之所産也非便用精炁神也總之知鍊元精必先要知個精生有時知其眞生時及當採之眞時者則得元精而鍊若不知眞生時採時者而元精猶不能得何以虛浮用鍊予有一詩子其悟之詩曰元精何故號先天非象非形未判乾乾者天也言未分判天地之時無形無象惟虛無之炁耳判爲天時則有形有象元精是未有天以先之名號故云未有象未有形太極靜純如有動仙機靈竅在無前太極者虛極靜篤之極至總包含陰陽靜動每靜篤時而自動故曰靜純有動如者動無拘定之時如或速或緩活動而生之意然曰如有動者初動之機未判天之時喻天之生先天精似有不有卽當用我似有不有之妙用若動而成動則判天動極則所生皆後天矣非仙佛之所用必其仙機有動之靈竅雖然如動猶是在天無形之前必不可至天有形象之後取元氣也夢回妙覺還須覺識到眞玄是便玄妙覺者知如動之妙也覺在外境世人每妄猜而言之覺在内境惟天仙知之行之唯由天仙傳之故也世人不知而由無傳此仙道所以與世之凡夫異也修仙者必要知内之妙覺始得故我顯言之曰還須覺眞玄者再申前言妙覺如動也說與後來修道者斯言不悟枉談仙此詩將仙機洩盡指示後學聖眞仙佛天人必當于此參悟而眞修不然無下手處雖欲空談無下口處四問曰如何是藥生採取如何是運火鍊丹如何是得丹服食如何是成仙了道答曰陽炁生來塵夢醒陽炁生是眞陽之精炁生而爲藥物也呂仙翁所謂一陽初動便是塵夢者是百日關中欲界凡夫初修時未絕塵未絕睡魔而有塵有夢者也塵卽六塵中之色塵聲塵是也大修行凡有塵卽當如佛言背塵有夢卽當醒覺夢與醒原來循環無端者也夢亦靜裏將動之一機所以夏雲峯亦云自然時節夢裏也教知夢醒者喻有妙覺在此句答藥生之說者攝情合性歸金鼎以神馭炁凝神歸入于氣穴也白玉蟾云以端坐習定爲採取此句答採取之問者運符三百足周天伏炁四時歸靜定符者周天之火符也周天本三百六十五度四分度之一此言三百則足者内有卯酉二時沐浴用無數之候也陳泥丸亦云但守火爻三百刻産成一顆夜明珠是也伏炁者如古人所言長生須伏氣也四時者四正之時又順四季之時故參同契云順時須謹節是也靜定者是火候至微妙處此一句答運火鍊丹之問七日天心陽復來百日關初下工時只有微小陽炁來復及百日之工用足則築基已成金丹乃採之于七日之間則陽炁滿足之大藥隨採而至此正陽炁來復也若于此陽不來復卽是藥不眞不合當採之時火不眞不合周天之當行當住此句答運火之問五龍捧上崑崙頂旣煉成丹得大藥則用五龍之仙機捧過三關上頂轉降而服食之也此答得丹服食也黃庭十月産靈童駕鶴龍霄任遊騁服丹後而服二炁于黃庭養胎十月而成神神全而産陽神之靈童出殻超凡駕鶴上昇玉京金闕無不可遊之處正是通天徹地知古今知來者之能事成矣五問曰世人學道各立一門戸有言必調息者執呼吸而不已障於道而無所成此是不知從有入無者有言不必調息者縱呼吸而不顧背於道而無所事此是不知從無入有者一無所修則與凡夫原來不别上文執者與佛說事障與法縳者同下文縱者與佛祖所說無記空同我屢習爲不唯無功而且有大害始知彼凡夫外道偏執斷見常見擬議作知見者耳未審必當如何是天仙大道之調息答曰調息之義難言也難言者難以一言而盡徹始徹終也凡對初機之言必由于粗而淺以漸進悟旣悟粗淺明了而後可言精深眞修實悟學者未有不悟淺入深悟粗入妙者汝自悟來而後可言曰參悟到不知旨處故詳問之答曰調息者初機小周天火候之用本具有進火退符沐浴温養之義也一呼一吸故爲息仙家謂之太極之也佛并諸祖謂之圓相之也不呼不吸亦爲息仙眞謂之太極中無極之丶也佛并諸祖禪謂之圓相中之丶也所以有水牯牛之喻當呼吸之息心與息不相依則不調是神不能馭炁也神炁不曾配合而相離矣間隔不調唯交併則調黃庭經註云出爲呼氣入爲吸氣呼吸之間心當存之又佛言隨順是隨息而順其自然之妙也皆言心息要相依若相依而强制執著呼吸而不隨順自然則亦不調心息依矣蕩然漫行而不由眞息之道則不調心息相依時行則同行住則同住行所當行之路住所當住之處無不是相依方可曰調眞息道者卽黃赤二道也神炁同行必由之道若能由此道採取而能得炁烹鍊而能成丹胎息而能冲和大定不能由此則不能得炁成丹而定神也古仙所謂行之不精是也門人問丹陽眞人弟子行道數年道眼不明是何故眞人曰行之不精能由眞息之道矣行之太速則近蕩而不調行貴速而忌太速恐太速之似浮而不就息道若浮而不就路者則神氣皆似散漫而不凝聚心息雖依而不成相依之功行之緩則滯有相之呼吸氣而必成大病緩則神氣滯而不行或欲行而不見有神氣之行或欲行必資於呼吸有相之氣然呼吸全不宜執著者呼吸之氣一著便起邪火而爲疾病古所謂非煉呼吸之氣是也亦不調華嚴經云爲踐如來所行之道不遲不速審諦經行是也又問曰必如何而後可言調答日速而不蕩緩而不滯純陽眞人云繞電奔雲飛日月驅龍走虎出乾坤自然能由眞息之道者是俞玉吾云火候之進退不可毫髮差殊然後九轉之間可保無咎不見其有謂之勿助眞息似有而不有若見爲有息則助長邪見不見其無謂之勿忘眞息本無而似不無若起見無息則不成眞息非有非無非見非不見見有見無皆是偏見卽是斷見常見皆有害於眞息故皆非合乎自然同乎大道見有見無固是邪見執著偏著不見有無亦是用意執著而不免有偏執之爲害何以成丹而得大藥必合乎自然者而後可同大道此有一呼一吸者不得不如是也若不如是則火候差失不合天機必不成丹而證道又問曰不呼不吸之息如何答曰更有自然之妙在焉馬丹陽眞人曰調息者不得著于口鼻調是作用息是自然定息非强閉氣也劉海蟾云莫將閉炁爲眞炁數息按圖俱未是是也閉極則失於急而不調閉炁是外道邪術之强制閉必至於極也而非自然眞息之能無極故不調禪家云轉得身吐得氣亦似此意而後可稱爲禪那拄杖子禪者靜也那者息也言靜定之息也拄杖子亦言息也人手執拄杖相依而行路喻人修佛心必依息而后能離塵離境解脫而見性欲大修行心不依息而禪定則止於外道凡夫口頭禪而巳非縱氣也劉云專氣致柔神久留往來眞息自悠悠言不可縱放如凡夫上句强閉卽前所問執呼吸者此句縱氣卽前所問縱呼吸者縱則失於無知而不調旣縱放不照管則念不在息便似不知有息而息何得調禪家故云未到水窮山盡處且將作伴過時光亦似此意而後可能攝心寂滅又問曰如何是此大用答曰古云自有天然眞火候不須柴炭及吹噓生天得道經云心目内觀眞炁所以淸淨光明杳杳冥冥昏昏默默正達無爲安靜六根淨照八識空其五藴證妙三元得道成眞自然修度佛經所言佛理皆與此同如此便是自然定靜定靜不已百尺竿頭猶進一步至於久而安佛言輕安是也安者和也佛曰法喜曰禪悅和而能冲冲而無極沖和之理得矣冲和理者卽入藥鏡所云先天炁後天炁得之者常似醉也靈光集云顚倒循環似醉人翠虛篇云骨肉融和都不知王重陽眞人云尋自在覔逍遙漸漸歸禪定皆同此義者卽華嚴經所云以定伏心究竟無餘者梵網戒經亦云如如一諦而行於無生空一切佛聖賢皆同無生空無生至空是寂滅至極處正所謂窮空又能窮盡空理卽無餘湼槃亦同於仙之和而冲冲而無極者然眞息在内本有息之實相而若空空無息非果無息而實有也旣曰眞息則與凡息不同言眞息在内則有眞息之實相實相者似空空而無息始可入定到眞無息眞空地位若不能空空而逼塞不似無息而浩浩然乃是凡息而非眞息也故中和集云守似有郤如無深言眞息在内之妙用也蓋眞息者是入湼槃寂滅必由之路也凡息者是墮凡夫不脫生死輪迴之事也學者當知之此節文義皆言初習入定時之旨不息則無相無相則實不見有也而亦若不見無也上文言初習定雖欲無息乃習爲無而未得無故曰實有及今不息之久而得定于無全無凡息之相旣無息相則直入無息爲大定而證聖證性地若起一見有見無之見則不可起見則非定旨故總不見有無如此方爲得眞定而後可以還虛所以空而不空不空而空而猶不見空不見不空方是空而眞空卽王重陽眞人所云虛空返照虛空景照出眞空空不空卽世尊之空不空如來藏者皆是當不空之時而只知乎不空者此墮常見矣故不空而又若空正是照而常寂也當空之時而頑然乎空者此墮斷見矣故空而又若不空正是寂而常照也佛宗乃有分明不受燃燈記自有靈光耀古今之說故云空不空是眞如來藏予云畢竟在寂照雙修寂照雙亡而巳矣凡仙佛二宗言空言寂言有言無皆言心息相依之定者言心性則有息在其中言息則心在其中若非心非性則不能定息非息則不得性定心定學者不可執文偏悟便墮空亡而無證果能悟之者仙佛合宗之旨見矣悟得眞空實性者方能調此眞息息不能調終難大定本是以心主宰而定息息不調不定卽是心性不定何以至于合道傅大士云六年雪嶺爲何因大定調和氣與神一百刻中都一息方知大道顯三乘人能卽此息而離此息斯可入滅盡定矣卽息而離息是萬法歸一一無歸之說同旨滅盡者心無生滅息無出入得眞大定也咦警醒後學仙佛聖眞之辭也滅盡定而後能出定未入到滅盡定而妄出仙宗謂之走丹佛宗謂之入魔皆非所謂出定而亦無神通可顯正有退墮之危險宜防慮者神通境界向上正有還虛合道之旨在滅盡生滅出入之定是所當出出而神能通達無障礙不爲六塵所障碍而不通此眞神通方能上天入地六通十通百千萬億無所不通此證還虛合道之至極處六問曰藥火之說紛紛不知所以信受一云神是火炁是藥以神馭炁卽以火鍊藥此言神言炁二也一云火卽是藥藥卽是火此言火藥不分神炁一也一云採時謂之藥鍊時謂之火意若神炁皆可言藥皆可言火三說何不同耶答曰同又問言句似異而理旨何同答曰皆以神馭炁也採時氣回神中神炁合一而同升同降得藥矣則謂之藥也可卽得汞之物而名眞鉛者是也凡言眞鉛言眞汞言眞息皆仙道中合二者之全而言眞是二者不合一不可言眞只是凡息凡鉛凡汞而巳鍊時神歸炁穴神炁混融而同行同住有火矣則謂之火也可卽得鉛之物而名眞汞者是也眞鉛者卽身中所採取歸根之精炁也眞汞者卽心中配合精炁而爲採取烹鍊主之神也蓋言汞中有鉛則曰眞鉛鉛中有汞則曰眞汞如是妙義世所不知故丘眞人云白日同行晚來同眠同卧正言神炁不相離之說總是二物交併歸一矣李玉谿云以神馭炁爲採藥以炁合符爲行火皆言神炁合一同行同住之說謂藥謂火爲一爲二何所不可靈寶度人經元始天尊云令此神炁妙合太空空體自然不屬陰陽自無生死升入無形克證道位方名得道我有一詩子其悟之詩曰汞言火藥總皆非非火藥而强喻名火藥者乃聖眞示人神炁之妙用而發明之者也二者本宜合一故聖眞每併一而言之日月齊輪御炁飛凡日喻神月喻炁日月有同度而行之時神炁有相隨而行相依而住之理然神本無在有知時而似有炁本有在無相時卽似無有無不同者不相合必因呼吸之氣而合之故仙聖皆喻以火鍊藥非此必不能使神炁合亦不能行能住如法也邱眞人云運行周迴自有逕路不得中氣斡旋則不轉故我曰御炁飛子並後升天上去午同前降地中回純陽眞君曰子後午前定息坐夾雙輪崑崙過卽此所言子時神炁相並從後升上午時神氣同于前降下而循環厯辰十二皆留伏十二者身中之時也皆者言神炁當火候之時行則皆行當火候留伏而住之時住則同住灌頂三雙默轉移灌頂者取元精眞一之水逆回升上而灌注於頂也此卽採藥之說佛宗諸菩薩修行每一處說法談經必先以水灌頂皆同此妙喻奈何僧總不知不究使佛教爲虛設矣蓋由不除淫掃去欲界離欲梵行雖見其說竟置之無用之地故也三雙者尾閭玉枕夾三關及骨兩傍皆一竅謂之黃赤二道三關皆有雙竅故曰三雙默轉移者神炁從三關雙竅中默轉循環也古聖强名爲火藥不離神炁自相隨卽是凝神入炁穴一句了郤仙佛大修行事七問曰請問古喻如猫捕鼠之義答曰以性攝情以神召炁之喻爲然也彼猫捕鼠時四足踞地寂然存不動之勢此心專意誠卽呂仙翁所謂齋戒等候一陽生之旨兩眼熟視凝然俟擒鼠之專謹防當面錯過之義故陰符經云機在目卽楞嚴經云佛阿難所云若不知心目所在則不能降伏塵勞又云長生久視佛所云正法眼藏皆此義也皆言機在目之義此文正合仙佛之所同者究此所云寂然不動者以待通可不似知白守黑知雄守雌於百日關中者乎此仙家之語謂知金之白者出於水之黑者之中則待黑中發生白時而採白也雄是陽卽腎水中之元精炁雌是陰喻腎水也下句重言上句之義可不似晝夜靜思以除六賊者乎此佛世尊自修之案在雪山六年晝夜靜思以除六賊六賊者是眼耳鼻舌身意六根中所妄起色聲香味觸法之六賊也靜思者寂靜而守正定正念于二六時不間斷若生一欲念則大爲心害墮欲界下矣急持正念除之究此之熟視無二則知用志不分凝神于十月關中者乎此仙家之語謂鍊炁化神之中關者亦可知佛說偃坐室恒作是念者乎此佛家圓覺經語也可知仙佛二家之說皆與猫捕鼠同喻故以猫喻主人以鼠喻眞陽藥物但捕鼠喻採藥乃初關有爲之事耳過此則必忘猫忘鼠非採非捕而後可稱了道我今又爲子原其始當知鼠來有候卽藥生有機若不能辨眞陽生機將何能當其眞機則謂之如猫守空窟若有知陽生眞機而不知當採時眞機不能得歸根復命徒然枯坐頑空則亦謂之如猫守空窟雖有身心自然生機總成一個當面錯過此所以又當防爲癡猫也八問曰何謂冲和答曰冲和者言不息之息中妙義也詠去集云冲和者乃其二炁混同最玄之理也充塞天地薰蒸一身天地并一身之間全是氤氲充滿無空隙處若有空隙不足不名冲和鍾離眞人云運周天則火起焚身焚身之義卽充塞薰蒸義不爲呼吸之所障亦不爲升降之所囿有呼吸則無沖和若吸升呼降之不已不能與沖和迭爲循環亦囿于升降障沖和必離囿離障方行得宜沖和之妙處沐浴固曰當然守中亦稱密法當百日關中小周天之用者曰沐浴當十月關中大周天之用者曰守中守中者不偏著有墮常法不徒然著空墮斷法以有入無合乎中道之必然者而自然故曰守中正言所以沖和之妙用後來之聖眞仙佛得師降授之後方能印證解悟於此劉長生眞人云沖和炁養神世人不知調息之謂何我則曰調其息之和而可沖也王重陽眞人云能全呼吸定喘息實非難會養氣神調沖和應甚易又云神氣沖和成大藥世人不知于此當防危慮險之謂何我則曰防其不和而不可沖之危險也不和則墮于强制之旁門邪法非不空而空之旨焉能得沖唯和故可沖不和故不能沖此二句重申明總上文四句之義採藥以是鍊藥以是野戰以是此卽仙機佛法之行所當行者守城以是此卽仙機佛法之住所當住者結胎以是養胎亦以是也此言百日而十月小大周天火候之中當不外于沖和也昔劉長生眞人云沖和結坎離言百日關也云沖和氣養神言十月關也又問曰是何景象爲沖和答曰不偏不倚偏倚是拘執著有相而非中無過不及勿用意太急而過勿用意太緩而不及不疾不徐不疾速而忽爲浮蕩不徐緩而失爲停滯非無非有不縱放爲無而實似有不强執住有而實似無卽是空而不空不空而空除此八病方和而可沖有此則不能沖又問曰是何作用以沖和答曰夫妻並肩心息相依也陰陽合一二五之精妙合而凝也晝則同行不前不後心隨意動也前則墮於旁門之導引後則不足爲宰運皆非合和之實義此處最有危險之必當防慮者故佛亦言隨順夜則同住不逼不離息隨心止也逼則太過於沖而不和離則不及於沖而不和不和卽是此之危險如斯了悟便是沖和作用眞三昧若著前後逼離皆差于沖和沖和者禪定之妙義三昧者華嚴經云正定中眞受用九問曰何處當防危慮險答曰自始至終事事皆有危險且略言之除不敢輕洩者遵天律重禁而不言但以粗迹之可言者而略言之如藥生有時不知其生之眞時而當面錯過此危險也採藥有候失其當採之候而不得其眞精眞炁此危險也仙道之藥生有眞時與世俗人造言誑人者不同時若不眞雖曰採藥而無藥可得所自虛稱爲得者非眞藥不能成丹空勞而無益生之眞時卽當採之眞候于此急採而後可得眞精眞炁火候之行周天泛然于黃赤二道之外茫然不見其循由此危險也火之行于子後午前有黃赤二道乃周天火子後逆運之所必由者若泛然于道外而行𣺌𣺌茫茫不見循道而由行此火必不就爐鼎而煉丹者甚是危險之當防處進火不至於進之所當止之地亦不至進之所當添者之分數退火不知退所當抽減者之程限不合於多寡之仙機此危險也當止者黃庭經註云出入呼吸俱入丹田程限者非不及而火小不能成長旺之功而變化非太過而火大火輪不能轉運而烈熖無所制陳泥丸云採取有法運用有度斤兩有則水火有等與夫抽添進退之妙沐浴交結之奥無不防危慮險白眞人云温養之時用心不謹不防其危不覺汞走鉛飛火足而不知止火者有傷丹之危險崔眞人入藥鏡云火候足莫傷丹鍾離云丹熟不須行火候更行火候必傷丹張紫陽云煉了還須知止足若也持行未已心不免一朝遭殆辱得藥衝關而竅不能眞通有藥敗之危險此正由前知藥生而不合當採之眞候雖似丹而藥力微弱不能長生者亦不能衝關故藥必復敗而同凡夫關竅初通而不能升三關聚者而或倐退散是危險聚由神以主之或不精誠勇猛以一箭透三關一怠緩則火卽退散正當行而不能同行者三關過矣而危險在鵲橋鵲橋本無路可通借橋以通行鵲者似喻南離心神之朱雀義也全憑心神領炁渡過此處故喻鵲橋渡之少有不合仙機則有危險矣鵲橋渡矣而危險在服食歸黃庭步步向竿頭進一步無著腳處虛空著一腳大有危險者重陽眞人云尖竿尖上細搜尋鍊陽神而微陰未絕神胎就而魔障百出大有危險者神無出景而妄出固爲危險有出景至而不能出其當出亦不能無危險及乎出定而入定危險之最甚者豈能盡言耶如是諸多危險俱能究竟勘盡無餘過得去了僅僅超脫得一個生死輪迴實證長生不死方爲有分與道相應向後證到虛空始無危險所謂萬般有壞虛空不壞是也十問曰何爲沐浴何名沐浴答曰沐浴者煉精煉炁之要法火候之祕機機之祕法之要故不能直言以輕洩而託喻爲沐浴也沐浴者本卯酉二位所寓生死之說也時當卯酉乃借以喻之而詳于下文世尊行神說法之時亦以沐浴爲喻可見仙佛宜有相合同之要法也在小周天時又名曰陰符乃不行有數之火而用無數以合于有數者所以玉皇玉訣云陰者暗也符者合也究合天地之機操運長生之體故曰陰符在大周天者又曰焚身三昧火喻意云何夫五行在世道中别有所論生死之理卽長生一沐浴二冠帶三臨官四帝旺五衰六病七死八墓九絕十胎十一養十二者之十二位是也此屬子丑寅等十二支辰位者其說曰火生在寅金生在巳水土二者生在申木生在亥五行干支之陽者卽生于此四位陽之死位卽五行陰干支之生位陰之死位卽陽之生位亦似喻彼處死而我此處生死于此而卽生于彼處之義聖眞以人生死大事之機在沐浴法故借以爲喻也生必有死死處則生言天地陰陽之與人同未有生而不死未有死而不生者也仙家以煉丹之法比之謂其所云火之長生在寅第二之沐浴在卯位故借卯位沐浴之名而稱卯時所當用之機以陰符其火候者也又云水之長生在申第二之沐浴在酉位故借酉位沐浴之名而喻酉時所當用之機亦陰符其火候者也此正見陰符卽是沐浴而黃帝驪山老姥李筌等陰符之說皆大明矣卯酉在四正之位内卯在正東酉在正西子在正北午在正南入藥鏡亦云四正而金木二行甯無長生沐浴之理在子午乎如金之長生在巳則沐浴在午位木之長生在亥則沐浴在子位也故崔眞人入藥鏡云看四正是也崔眞人洩萬古不洩之機于三字王重陽眞人云子午沖和連卯酉春冬秋夏相攜達摩所云一時用六候二候採摩尼四候别有妙用卽此之言是也又問曰人皆言卯酉沐浴不行火候今乃謂之要法謂之祕機得無有火候而與眾言相違乎世人皆執言不行火是全無火候由不遇仙傳故不知古云不行火候所以然之理俱是初學凡夫者之知見所聞者曰不行所見者曰不行及已之對人言亦曰不行流結妄局絕無一人直信有法有機唯伍子獨言法言機于是彼皆學世法口談者竟不知眾言或是或非伍子抑非抑是莫不以相違而相疑殊不知眞仙之言已有可考證處答曰聖眞言此四時之火以不行有數之候者爲候也此隱言也參同契魏伯陽眞人曰耳目口三寶閉塞勿令通離氣内營衞坎乃不用聰兌合不以談希言順鴻濛陳泥丸眞人云沐浴交結之奥陸子野註悟眞篇云卯酉不進火但以眞氣薰蒸而爲沐浴者此俱發明隱言而已爲眞洩之說者矣非全無火候爲不行也我得聞於聖師而知眞聖師者虎皮坐張眞人李虛庵眞人曹還陽眞人三聖自證之眞而傳眞印之仙書而同是卽魏陳陸等諸書實不違于眾也而眾自違之彼眾人依傍仙聖之隱言而嘔吐其愚迷之臆見遂言卯酉二時之沐浴爲全然不行火候而妄𧩊爲已之知見謬造假書妖言惑世而世皆後學淺見安敢置一辯言以爲自信而救世哉我則詠之曰世稱沐浴不行火且道吹噓寄向誰要將四正融抽補纔得金丹一粒歸亦以此語爲未來際刧聖眞辯明之也更精言不行有數之候爲沐浴要法祕機也後聖能眞修實悟者必當取証於此歟有謂二八卯酉之月不行火候而爲沐浴者可顯知其非也且論知非之法安在以其有重陽眞人云子午俱無何須卯酉白玉蟾眞人云無去無來無進退不增不減不抽添鍾離眞人之言曰一年沐浴防危險薛紫賢眞人亦云一年沐浴更防危俱可證也以此證知十月懷胎皆沐浴爲眞傳非止執於二八兩月爲沐浴而妄言之者非也旣說一年皆沐浴則知二八月在年内者皆然有眞元通仙道經云得之大者沖和而久視此亦言非比二時之沐浴要久視也旣皆誡人防危則必有沐浴之候而防其不能沐浴若彼謂不行火者更有何危可防我今又誡後聖甚宜體究仙言又問曰古人何故言二八月而豈無因者乎答曰古言二八月因屬卯酉矣火之沐浴工卯酉時虛比借謂大周天欲似其名理勿執其幻稱誤人千萬紀借言發明沐浴之機如佛所謂善巧方便而說豈可强執爲實不行火而敗壞將成之大丹哉更誤害千萬世信心學者哉又觀紫陽眞人云火候不用時火候之用小周天有十二時時完則有間斷行大周天之火不用時則無間斷時且不用不間又豈可以二八兩月爲間斷又云及其沐浴法卯酉時虛比石杏林亦云冬至不在子時沐浴亦非卯酉皆言小周天且不用時而虛此沐浴而謂大周天可實用月爲沐浴乎我說旣云莫向天邊尋子午又豈於厯數中尋卯酉耶若使養胎而廢二八兩月之工則神炁散而背道矣十月關中乃大周天養胎息之工爲轉神入定也若不行火卽是不轉神不入定則炁不化神何以得成陽神而出身外抑可使婦人懷孕而二八兩月不懷乎卽婦人無兩月不養胎之理斷言修仙養胎亦無兩月不養胎之說斷然無惑今此破萬古之疑洩萬古之祕同我天仙正理直論之所時書者而發明大用後之聖眞仙佛遇天人神師授道嗣我丘祖長春眞人滴派者必當從斯印證過而後可謂之眞知仙道沐浴張紫陽云地獄不囚傳道者教存經籍度三師附錄和吉王朱太和詩二首道憑一字作根基道在無極且無形無數乃生有形有數之一太極也一而生二陰陽也二而生三精氣神也三而生萬變化無窮運化從心妙轉移煉精化氣以心主宰乎其化煉氣化神亦心證成其化此有心之運化轉移固不外于心及煉神還虛得虛靈獨耀非執着幻妄爲虛空者實無心之妙用也亦不外于心正三界爲心之說也金自水鄕還白液白金生于黑鉛水中亦喻腎水中生眞陽之氣白乾金兌金者是也木由丙穴返青瓈丙穴南方火地也言汞木之青者由丙丁火生出乃回返于丙内是汞出硃砂内之義亦喻外馳之神復凝返于内也丹凝神氣棲玄谷玄谷者卽氣穴神馭氣凝于玄谷氣凝神亦凝二者凝而成丹故曰丹凝卽凝神歸氣穴之說星拱罡台照碧溪碧溪者卽神水華池也罡者北斗第七破軍星之稱遁法中所謂指者吉台星者罡前之三台星也同罡旋十二位卽斗柄運周天之說拱罡台是神行卽氣行也照碧溪是神住卽氣住也待到無垠坱北境垠音寅言無涯無際也坱音秧北音扎言鴻濛混沌也卽澄虛無境界時同佛生滅滅已也黃庭獨坐伴夷希夷希者不見不聞也黃庭者中宫也獨坐者絕對待也伴夷希者卽佛寂滅爲宗也其二旌陽曾爲斬蛟來晉時許旌陽眞君斬蛟精至長沙府一劍功神逕自回斬蛟已回于南昌千二百年吾復至旌陽回後于今又千二百餘年矣吾復至此雖非爲江上蛟精卻爲斬腎水中蛟精而來也幾微一竅氣重開一竅者玄關一竅也氣重開者先天一氣生生不已開而復開也採藥有時時至神知亦予所謂覺而不覺復覺眞玄之說也丹凝玉鼎風生耳三寶合煉于鼎中眞陽與眞性凝結而成丹玉鼎者古人金爐玉鼎者喻氣穴丹旣凝謂之大藥玄珠採之將至先有風生于耳後風聲至則大藥亦至火伏金爐息注胎下三字申明上四字息注胎者安神定息謂之懷胎還神時時息定則成胎胎成則息自住不出不入神息常住而頓至滅盡定矣此道久將無用處總言十月還神定性從有入無而實證無生以無爲寂滅爲大用者求生舍我更尋誰此句有二說雙關一說是汝今求長生之道於我旣得問正法仙道更不舍我所說而别尋邪說乃由汝之眞性篤故能如是也一說是求道悟道而求生證道必由我自已所爲篤信堅心凡精密工夫他人一毫力着不得伍太初六問法名太初號見初第四叔父之子眞陽之親弟也一問曰眞修工夫如何起首答曰仙道不過鍊陽精以化炁爲首者也仙家必先以元精返還於身中而復歸于元炁佛家則泛言戒淫欲以出欲界俱是除淫之義起首若不如是則爲落空亡若有一死便是萬生萬死輪迴不斷六道難離矣若人能修如是離欲之行謂之淸淨梵行成得離欲之果謂之淸淨梵德爲轉神入定之眞基也究之佛門惟浙僧間有談及除淫離欲者由天台智顗和尙之遺教智者之兄名陳鍼出于張果眞人之門故也第少壯之人神炁盛動靜循環之機速言鉛汞不少故藥生亦速陽炁生而後採取烹鍊所謂一陽生是興工日又謂一陽初動中宵漏永是也乃有藥而後行火也鍾離眞人云難得者是少年少年修時根元完固易爲見功止於千日而可大成又難得中年中年者先補之完備次下手進工始也返老還童後乃超凡入聖老邁之人神炁衰謂之老來鉛汞少者純陽六十四𡻕遇鍾離白玉蟾六十四𡻕遇陳泥丸馬自然六十四𡻕遇劉海蟾劉朗然子亦六十四𡻕遇師者劉寛于漢靈帝時棄司徒太尉而學道年已七十三受青谷先生傳道而道成翠虛篇云老少殊途有易難馬丹陽云有心入道當回首况流年六九性命宜乎早救莫直待身枯朽動靜循環之機遲則敲竹鼓琴爲喚龜招鳳之權法而後陰極陽回而爲應採之珍此悟眞篇之旨也又云不定而藥不生此玉淸金笥祕文之旨也重陽眞人曰純陰之下須是用火煆煉方得陽氣發生神明自來是也神明者卽眞精元陽之妙覺龍眉子亦謂風輪激動産眞鉛都因靜極還生動者之說皆是也乃有機先一着而後生藥以行火也靈寶畢法鍾離云晚年修持先論救護次論補益自小成積功至中成中積至返老還童煉形住世是也此起首玄妙天機而世人不得知者有如此今舉世但言衰老者不可修蓋不聞此理也重陽眞人云若還悟此目下便回頭蓬萊路彩雲端有分相隨入我則曰有此一口氣在皆可爲之凡有一口呼吸之氣皆由元氣之所化生一口氣在卽元炁之猶有在是長生之根本在也故可爲修仙之事馬丹陽云氣不斷神可固先把馬猿用工擒住自然得性命停住盍亦觀之黃庭經云百二十𡻕猶可還我祖師重陽眞人云便如百𡻕未爲遲只在心中換過時陳泥丸云若欲延年救老殘斷除淫欲之旁門一云古人八十尙還丹泥丸云果欲留形永住世除非運火煉神丹老子自言頭尙白老子者李老君也卽太淸太赤天太上老君分神化現下降于世蓋由元始天尊初開闢爲成刧而至刧壞次開爲成刧分神化生大道君及刧壞已厯四刧次開爲第五成刧而初又分神化生老君以主太淸因其已厯至五刧而稱老故也頭亦示以白故也及老君分神降于李下亦示人以頭白其曰頭尙白自言修之遲者指人雖老者猶可修成惟要精進以求成也馬丹陽贊勉人云六旬有九纔方修補眾人言晚了時光馬風道未暮又答人云八旬有四因甚發心修勿言老休夀相氣不斷亦可修持速澄心爲尙白玉蟾云今已九旬來地尙且是童顔此皆言雖老猶可修也葛仙翁云吾今六十憂赴三塗王重陽眞人自敘云五十二年光陰急活到七十有幾日前頭路險是輪迴一失人身萬刧休如何能得此中修劉朗然曰莫待老之將至甯知身後何如丹陽云尋思最𦂳是修持急急修持尙嫌遲這性命于身𦂳一息不來身爲土糞願省悟疾速修持固氣精神仙準衰老者又安可以老自諉而不决志速修之哉少壯者見斯毋謂老旣可修而縱心自怠以至於老鍾離云過了一年無一年過了一日少一日丹陽云七十光陰能幾日大都二萬五千日過了一日無一日看看身似西山日又云夀數休言百𡻕從今古人生七十難得張紫陽云莫教燭被風吹滅六道輪迴難怨天有緣遇此當知爲萬古仙眞催人早修之特旨也二問曰甚時候是初用工之時答曰凡人之炁與神皆日主動而夜主靜由天道以日而生動生陽於靜後至夜則環爲靜也人受天生亦順受其日動夜靜者動作休息是人所以順天者求修行之靜莫不以唯夜爲然也俞玉吾云修鍊力久更無夢覺之異雖當寢寐神亦不昧精生之時不待喚醒亦自覺悟夏雲峯云自然時節夢裏也教知靜而復動則用工也此純陽祖所謂動則施工靜則眠之訓也我於萬厯壬寅春初試百日關于家而鍊精以化炁首一月調習次一月精進時至神知運一周天斡音豁旋斗柄默悟世尊所謂見明星而悟道之說契我妙用古仙所謂北斗望南看禪師所謂北斗裏藏身之說皆同自是以來一夕行過三五周天至七八周天又至十餘周天則工將徹夜而無間歇矣精盡化炁矣火候斯足矣遂得止火之景而止之法丹陽云所謂當下手暗修完功行不許人知約兩月之餘總三月之季而成大藥古言百日築基者信哉重陽眞人云睡則擒猿捉馬醒來復採瓊芝每依時這工夫百日只許心知昔曹還陽老師下工時年方三十神淸氣盈夜靜工勤無世緣之累不五十日而火足採其大藥五日而得此行工之精而得大藥之易者眼有金光鼻有氣搐耳後有風生腦後有鷲鳴鷲爲水鳥卽白鷺也腦後虛空中若有鷺鳥之聲亂噪不住則大藥將至之先兆也故世尊示人曰鷲嶺又曰鵲巢灌頂是也身有踴動丹田有火珠馳驟上衝下突如是六種見驗已六種者六根有所證果之驗也俞玉吾作參同契註亦有六種應驗之說同此華嚴經世尊亦有六種震動之說同義則火珠有自然投關之妙火珠者元精元氣鍊成金丹大藥如火珠也投關者欲自衝過三關顧與𡸅問如何得自欲衝關答曰昔曹老師云馬行熟路陳泥丸云其次膀胱如火然内中兩腎如湯煎時乎挑動冲心源皆言得金丹大藥之景也始知天仙金丹大道獨異於世而同於佛吾師獨早成之於身是爲知修能修仙道之偉丈夫者歟是亦起首得眞時還陽精陽炁化陽神而出者歟若所證不得陽精陽炁陽神便墮在外道陰神之類者是不知起首之眞時者後來吾門學者可不以起首時而切切早究之哉末後句勉之戒之也三問曰止火之候何爲至要答曰藥熟丹成則必止火顧與𡸅問曰止火者是止而不行乎是止而復行行而復止乎伍子答曰鍊丹之法以火鍊藥用小周天火也藥已熟丹已成則不用火而止是止小周天之火棄卻有爲之工行採大藥之工則藥漸見不生向外旣不生向外馳何必强用火故必止火若得大藥則將大周天無候無爲之火以鍊炁化神蓋小與大有與無不同工者故必要先止此火而全然不用丹藥未成熟則火無止景有火足之候見卽丹成之候見也于是當止而止之得其宜矣丹未成無止景不當止火又宜精進火必鍊至于成丹而後止若已熟而不知景止火縱經多刧而温火養丹守住陽精陽炁於丹田能暫得長生不死葛仙翁云固形保神莫大于精畢竟未脫凡胎凡質猶有死生在非證聖也藥物眞火候眞鍊法眞而得成大藥者固是出世之聖眞也何又不知止火蓋由學者前生之積修功行淺今生之志願止于求長生不死欲長於短夀長享富貴安樂而巳故仙師亦止以長生與之遂其志耳故精氣住于丹田者必不死卽陳希夷所謂留得陽精决定長生之說也凡夫精之洩者皆由丹田中元炁所發而化卽此仙凡而觀則丹田乃可守可洩之地亦可生可死之基若留精守于此久之而復洩之同于凡夫之常見猶不脫凡夫之死生故暫守之者必求化神所有超脫服食轉神入定出神之事皆在止火之候是止火爲超凡入聖關頭第一玄機也安得不爲至要夫火旣止當採金丹大藥於混沌七日前百日關中固言採藥乃初陽之微氣採之易者只用片响之候一瞬息之工而可得藥故達摩云二候採摩尼言此也及烹煉薰蒸補得元炁已足則陽盛而可見形然炁何以有形非形質也乃有似火𤍠之形也故古云丹田火熾曰兩腎湯煎曰火珠是也唯有此形而後能出神變化有形爲身外身此是無中生有採之而後生者故採之難必用採工於七日方有得不如是則不得除一日二日三日之前日少而不能得丹之外於四日五日六日七日之間其中或有一日見丹田火熾兩腎湯煎火熾者内景也湯煎者外景也風呼耳後呼者似風之聲也鷲噪京山玉枕關上名玉京山卽腦后之處仙家有雀聲嘖嘖之喻言其似有也佛家有鷲嶺之喻亦言其似有鷲鳴非實有鷲鳥所鳴之嶺斯時也眼底金光眼光圓滿如金光陽氣復還圓滿之徵也仙家有金光咒佛家有金光明經皆此田中大藥一粒至矣丹田中有火珠之說卽所謂一粒刀圭卽所謂一粒復一粒從微而至著者正世尊所謂火化以後收取舍利者此也火化後同仙家小周天之候也收舍利者同仙家採大藥得玄珠之喻有名曰水裏玄珠黃帝以罔象得玄珠罔象如言無象卽是以無爲之工無象之火以求玄珠意有因以青龍姹女採取而來故畧言之曰龍女獻珠得此者獲無漏果證無量夀初證長生後超刧運皆由得此而成證果豈可忽之而不知究之哉所以直論直示人曰止火景四問曰世人不知止火法者最多其後所證何如仙聖不言止火者亦多雖見仙書遺言亦不知此爲要間或見有言者亦不知其洩祕之要旣不知仙機不能證仙果我不知彼還可證甚果答曰祗可長生不死爲欲界初成之果人仙是也能守一日則爲一日不死之人仙陽精盛滿是長生之本根由其歸于丹田而後可得滿滿而守于此中則不虧而得長生暫守暫得久守久得故純陽祖云世間甲子管不得壺裏乾坤只自由百千萬億𡻕刧不死之人仙卽百千萬億𡻕刧久守之功也王果齋云一日十二時時時不絕一年十二月月月長存海客論云汝能遠離房室元炁不散可以長生又問曰用如何法守答曰陽精凝聚已結丹者謂之不死之基守在下田當不離小周薰蒸之候而温養之胎息經云知神炁可以長生固守虛無以養神炁又云若欲長生神炁相住太上久要心印經云存其神而守其炁又象伏龜故名神龜龜含水中有炁曰神炁人之根蒂俱在此處不復泄漏則眞炁常住所以不死有眞炁足則無可死之理鍾離祖云眞水眞火合一鍊成大藥永鎭丹田浩刧不死夀齊天地胎息經云炁入身來謂之生天眞皇人云炁不散則命不亡命不亡則形不滅也仙經云還精胎息延夀無極重陽祖云惜眞炁在丹田其人不死若不久守以鎭下田其眞炁猶可散於欲境而基亦可壞蕭紫虛云爲報近來修道者煉精不住亦徒然是必要知火所當止而止之止了之後方可採大藥而超脫向上斯時卽得六通之一爲漏盡通也漏盡通者陽精無漏成神通也爲六通之根本男根如童子矣卽華嚴經所謂具丈夫形成就如來馬陰藏相是也卽老者返爲童之說精有洩竅者修成無洩竅精巳枯竭者修成滿足大人之身根如童子之小根昔世尊修如來時成三十二相其一曰陰藏如馬蝗馬蝗能縮短腎莖縮短似之故以爲喻卽此說也此與眞仙修證同若假稱佛宗而爲外道者不能有此不知止火者則不能别用採工以求大藥而超脫何以得成眞了道哉知止者採而得藥力足以通關實由得淸源之水煉到火足而知止候不差之力也此五句是言修之眞證之實者成仙必矣若藥不應採而不來卽丘祖眞人所云火少則金精不飛之故也修士不知火有止候之景亦不知無景之不當止乃妄止之而致火少則眞炁未滿足大藥未成雖採而無藥可來此正教誡學者要知當止之景也或得藥來而力不足以通關是知水源之初未知調藥不及於當採之時而炁微之病雖得藥來猶是氣微力弱不能衝關而成大道藥生時採之太早則不眞而生炁微正謂初九勿用若誤用微炁决無大成之功以此久守於丹田亦可爲長生人仙如炁足者亦如留得陽精决定長生者之小効此卽次子炁足者愈于凡夫之不妄洩者所有八百𡻕如籛鏗者此欵何舉籛鏗爲證由其從來只見稱其夀不見稱其神通者蓋以採補小術小効而巳不知先天自然之足炁乃不得先天足炁之功可以延年止于八百不可逃生死以超刧運卽此之類故足以證此有七百年老古錐如佛弟子迦葉者老古錐是言其端坐卓然如寶塔昔世尊言其不能不生死如阿羅漢若如阿羅漢無生死則向上可超刧運不能無生死終有生死不能免故只見當時稱其七百年有一千七十二𡻕如寶臺和尙者一云寶臺和尙亦西土人來東者遇達摩于東度之皆是此類但不能至年刧多求其夀齊天地而更能超刧運唯知止火得藥而通關服食入定出神者能之故靈寶度人經道言道夀無極天夀有窮人夀無定眞與道通夀則無數所謂長生久視夀厯無極呂祖眞人云一點元陽以煉形化炁使形化炁超凡軀入聖品以三萬六千年爲一𡻕三萬六千𡻕爲一刧三萬六千刧爲一浩刧浩浩之刧不知𡻕月之幾何而與天地長久仙經云服丹守一與天相畢所以知止後有大異者如此昔鍾離祖仙翁云丹熟不須行火候更行火候必傷丹張紫陽亦云未鍊還丹須速鍊鍊了還須知止足若也持盈未巳心不免一朝遭殆辱又彌勒云饒經八萬刧終是落空亡後聖可不知急於止火之候與五問曰何爲周天火候答曰周天者如日月行天一晝一夜行天一周是也又問日月火候以何相如應喻一周答曰天體周圍三百六十度有餘者而火候亦三百六十餘者以此爲相如也借以太陽日理言之初自地之下而上升轉逆上於天之上復下於地之下所行完過三百六十度矣謂之一周許旌陽云神運炁化上則經天下則緯地一日一周而明日又一周積三百六十周而爲一年故鍊金丹時之火候實似之當神炁並行之初亦從地之下逆升於天之上天上乾之首也地下坤之腹也古謂之黃河水逆流一謂之曹溪水逆流一謂之洞水逆流者亦復降于地之下如一周於天之理故以喻一周於身者又三百六十周爲一年之日喻三百六十周亦爲一煉之火候也此發明了周天又收結前句俞玉吾云若能回天關轉地軸上下相應則一息一周天也又云上升下降一起一伏徘徊於子午韓逍遙云法輪要轉常須轉只在身中人不見又云法輪轉得莫停留念念不離輪自轉此言詳於内指通玄祕訣者然言三百六十周之度兼言三百六十日之一年卽此身中有一年之象便能還復身中一年所損之炁故古來聖眞皆以之取喻也又問身中造化如何有三百六十去合天上之周數三百六十答曰許旌陽眞君云二百一十六用在陽時者言陽時依陽之策數用九易繫辭云乾之策二百一十有六坤之策百四十有四子至已爲六陽時若四九三十六爲度也云一百四十四行於陰候者言陰時依陰之策數用六午至亥爲六陰時各四六二十四爲度也合之得三百六十正同天度之周數故取喻亦宜也又問古仙皆分小周天大周天之說果何所用而分别大小意或非以三百六十周數而可分别異名答曰旌陽之說卽小周天之所用有三百六十數者鍾離仙祖之云一年沐浴防危險者卽大周天之所用也無三百六十數者張紫陽之云只此大周天一場大有危險者不可以平日火候例視之其言平日火候者卽從前百日關中所用之小周天也言不可例視者正分别小周天之有象數大周天不限度數之各異用也小周天用於化炁時百日關中鍊精化炁也其中玄妙有子午十二時之陽火陰符古云子巳六陽時進陽火午亥六陰時退陰符及伍子受曹眞人密旨又若十二時中時時皆有陽火陰符凡進則曰進陽火凡退則曰退陰符亦以陽用者曰火陰用者曰符重承眞人囑又加囑而不替伍子意欲疑問眞人咄曰信受著天命不可違卯酉二時之沐浴也故華嚴經亦云諸物定能應時轉妙法輪是也皇甫履道云十二時中無令間斷俞玉吾云天道無一息不運丹道無一息間斷大周天用於化神時十月關中鍊炁化神也其中玄妙有不息卽有無息從不息而無息者也許旌陽云有火隨爻變無火遂無生如是而言火候之周天少彷彿其大略者再合併以直論中之火候經與語錄中之眾問答而後始得全火候之粗迹而玄妙之妙合於天機者猶在眞參實悟坐據蒲團較勘處自有眞知而口頭語言終不能以一塗而盡參悟則實有心得若徒求知于口耳間聞恐後用心悟時又生大疑病六問曰䝉喻精雖眞而不得爲眞精用是何故此疑旣知精之眞或必能用其精之眞若反不得用者無乃猶有天機未得眞而使然矣答曰未調藥之故也藥必先調調其生之時合于當生之時調定其機而後用當採之工調者當未採未煉先之工非若火爲行火時用調者又問曰從古以來但言調息爲火候未言調藥而今又何始有此言答曰此萬聖萬眞至祕之天機也只爲前聖高眞奉持天尊科禁祕之不敢輕言者後之聖眞成道者皆必由於得此世俗之小根不得此者卽不能成道也我輩金蓮法眷也從曠刧修來必因未得此句則不得眞可長生不死之元炁不能成仙了道直至今生有幸得聞老師曹還陽眞人云忙裏偷閑調外藥無中生有採先天之句是李虛菴眞人口授來天仙金丹之祕訣也正不敢獨善一身又恐後來人不知有此一機所必當知者而爲請求乃至不得所以證了只得吐露一句消息與後來聖眞好向此句尋個眞實入頭方有得金丹成道分若不向此句請求正無緣於丹道正所謂說盡萬般差别法總與金丹事不同陳泥丸云若非金液還丹訣不必空自勞精神調藥者正所以調金液也又問如何用調法答曰藥生時用調調其合於當採之時然邪正兩門皆言藥生有時今世人所巳知之時乃邪說旁門之所謂時非天仙聖道之所謂時好邪淫之人不信修仙另有眞道迷執淫事爲道故不用調藥之時及法若天仙聖道必調藥之眞時而后合同於天上之事故最闢邪淫之說只恐門下法眷誤犯喪失見在性命怨悔不及人若不信便將他自身所巳知巳行者勘過不合於仙道百日十月有成之期空勞𡻕月爲何無成再將他前代師家曾巳行過者皆無成而必死卽見邪說虛假便當知天仙之道言藥有不同調藥更甚異唯天仙知之調之應得成天仙者得聞知調之凡世人不得知不能調也不能調則精生時之老嫩不齊則其補精之用有所不可白玉蟾云藥物不精神丹不靈必單單先如法用工調藥調其藥生炁足而可採煉補精能至滿足者爲是藥不知調則不得眞足之元炁不唯藥有不生之時或生有遲促之異是其採取之假而無驗不證長生不死便當知非改過若不改過便是自投地獄若藥不調其機而亂採失於遲早之候而徒採不足之炁欲補精而不得其補欲滿足而不得滿足便成盲修瞎煉得其調者凡藥之生皆如是時皆可採補方名眞陽方成眞藥生生如是不差别而後可謂之調不然炁不足用精不能補則大藥不能生也不可謂之天仙大道調得眞覺則得眞炁不得眞覺則不得眞炁炁嫩微而急採之故不足以成丹必要得旺炁之精方可用以補精精到滿足卽是炁到滿足精炁到滿足卽是大藥有炁之發生則謂之大藥生能沖三關而成神仙天仙不滿足者不發生大藥不能沖過三關此見調藥爲至祕要機關又問若以辨時而調藥世人皆言有老嫩之分别或是彼已知者今何言其俱不知不能答曰天仙於藥生之時候辨老嫩爲調凡世邪道以藥生之形質辨老嫩而不用調由此不同所以不知不能又問何爲藥生之時用調何爲藥生之形質答曰辨時候者辨之合於淸眞先之先天辨形質者辨於重濁後之後天又問何爲淸眞先重濁後答曰覺覺是眞覺調之皆得眞覺全無妄覺卽是淸眞之先若以妄念貪淫事而求至於濁質微露卽是重濁之後信奉如是辨者未有不得眞精爲用者也按佛與祖言淫事卽塵境魔境淫念卽妄識覺而依塵則入魔而爲六道種覺不依塵背塵合覺此六門先入一妙亦佛法初機時同于仙道初機者仙佛合宗語錄伍太一十九問法名太一官名達行字際可予之堂姪一問曰仙道至要聞有三藥物火候與鼎器世有藥物鼎器失眞者妄用女人爲鼎交媾取精爲藥已䝉指爲妖人淫心邪說惑世誣人不足論矣陳泥丸云身内夫妻實妙哉白玉蟾云薄福癡人不斷淫尾閭閉卻採他陰元陽搖撼無墻壁錯認黃泥喚作金或問房術可致神仙抑可信乎抱樸子曰此妖妄之言由好事者增加潤色致令失實亦奸人造以欺世隱藏端緒以求奉養以窺世利耳大抵彼言御女而不知道而用之雖一二女亦足以速死又云欲守交接之術以窺神仙愚之甚也谷神篇曰旁門多技巧俱不免無常玉皇本行集經云雜法開化有三萬六千種道雜氣普消吾眞道乃行今言精雖眞而不得爲眞精用者願聞何旨答曰不得爲眞精用之違於妙者是言欲學淸淨仙道者亦有已知未知兩端之不能用之故也一是未聞生有眞時及其精眞時至畢竟失於靈覺而神不配合爲之主而不能留精雖眞者是人無淫念淫事而身心亦有虛極靜篤景象此是靜極而動之精甚眞所謂人人本有者學者不得仙傳眞中辨眞之機乃不知我身中已有精生之眞時是神無覺知也神旣失于靈覺則不用主宰乎採取配合之工以留此眞而還于靜爲長旺後動漸採漸補之機所以云不得爲眞精用者有此一是聞知生精眞時亦不實求身中生精眞時此卽儒書所謂思而不學則殆者是故不得以神配合採取所宜之時所以不能得其精之眞於當用不當用則或過早炁嫩過遲炁散而不能結金丹成大藥也精生時人人皆有自然之眞可辨而用若世俗愚人學旁門小術妄認爲仙道者其癡癡志得意滿不用此眞則眞固不得用爲眞矣也有談淸淨大仙道者亦信奉經書以淸爲眞取眞有信之言但不得仙傳辨至眞於清眞之法不能實求身中之淸眞是何時爲非嫩非老而用其不嫩不老之眞以行採鍊則眞精亦錯過而不得用及至所用者又非眞必不能補精化炁而成金丹大藥所以不得爲眞精用者又有此予謂無怪乎世人不知不能得用也葢仙道乃天上所有而世間絕無唯仙眞所知所用而世人無由得知用之天機也縱有虛聞而不能實用設或有一人知用是必前生有苦修之根今生自少至壯皆苦志精修不怠得天仙下降獨傳且囑之懇切者而後能用故我今囑後聖所以亦由是懇切也後聖亦宜體究斯言故彼盲修者俱已無成此句總結上言二者又問古人只言時至神知然神知之果又有知眞時之妙乎答曰然眞精生時神固有知其機眞於可用不可用之妙尤所當知又問眞中辨眞之祕妙固不敢輕聞我今願聞抑可得乎答曰道以勤求而聞以苦修而得當知此精生眞時之道非世法中人所可知可有之道乃遺世苦志所有進修天仙聖眞之道也實在大羅天三淸四種民天三界外内三十六天尊帝聖眞之所共祕皆不輕洩者按道藏度人上品妙經云四種民天以上之三淸大羅在三界之外自二十八天以下之無色界色界欲界謂之三界内也最下之界六欲之六天一曰皇曾天二曰玉完天三曰何重天四曰平有天五曰文舉天六曰魔夷天此欲界之六天也中之色界有十八天第七曰越衡天八曰濛翳天九曰和陽天十曰恭華天十一曰宗飄天十二曰皇笳天十三曰堂曜天十四曰端靖天十五曰恭慶天十六曰極瑤天十七曰孔昇天十八曰皇崖天十九曰極風天二十曰孝芒天二十一曰浮容天二十二曰江由天二十三曰阮樂天二十四曰曇誓天此色界之十八天也并六欲界共二十四天也此以上之界無色界有四天故第二十五曰霄度天二十六曰元洞天二十七曰妙成天二十八曰禁上天此無色界之四天也合三界共二十有八天也三界之上則有四種民天第二十九曰常融天三十曰騰勝天三十一曰梵度天三十二曰賈奕天此四種民天之四天也此以上則有三淸起下之太淸大赤天也卽洞神此上名曰上淸禹餘天也卽洞元此上曰玉淸淸微天也卽洞眞故三淸又名三洞洞者通也通達無窮也此以上則有大羅天言極高至大包羅眾天共三十六天也各有一帝又諸天靈書度命妙經云大羅天是五億五萬五千五百五十五天之上天也又按佛藏經言三十三天皆在三界之内而以外則無天之名但佛經由阿難所集記是凡夫學者之言道藏則由天尊上帝所說者耳所以天上天下萬古不輕洩之旨正在於斯絕與世間凡夫所談者不同故不有誰敢輕洩不有誰敢輕聞玄科天律禁誡甚重犯者有風刀之考三塗之苦天仙有六通固自知人善惡而不輕洩卽有仙緣先得仙傳者亦不敢洩無眞心堅志學道者固不敢容易輕聞每有災禍切身功德淺小者亦不能輕聞何以騐知昔有勤苦人幸得輕聞師道而卽易與人以輕聞遂至有得輕聞者葉莫徐三人皆卽以痢速死而輕洩者亦屙血三年以是而知有前修今修者福緣所繫最深重所以世無金丹之道生不能長刧不能超者皆爲無此淸眞之中又有辨其至淸至眞易修易成之仙機也陳泥丸云修仙唯有金丹門金丹亦無第二訣所以爲第一難遇者顧與𡸅問曰至淸至眞何以爲易修易成之仙機伍子答曰若不得至淸至眞卽是元炁不足無金丹之本任人費多𡻕月採鍊炁皆不足所謂猶將水火煮空鐺原無飯本之米如何煮得有飯出來故爲難修難成若知得至淸至眞則可採得元炁之足者一採鍊卽一得何其易修每採鍊皆得炁精漸滿而化炁足百日之内得至精無可採炁無可化何其易成我固叮囑學者必要辨至淸眞唯是至淸眞眞陽之精生於虛極靜篤之時固曰淸矣唯淸固眞旣已淸眞便是可用之機若有仙傳能覺知者當其覺初覺其炁之未甚足則不可必其急於用必要眞覺其炁之眞有足則眞足之炁方可補精化炁而還足本根之炁然炁精在禀賦原本至足只緣愛慾淫妄而耗虧則有不足故欲補足所以必取此根本足處發生者可爲補足之用以凑補爲禀賦靜體之至足非至淸至眞之有足何以補得至足是以不得不覺求炁足者此足炁人人本有欲取爲用人皆自有不待外求唯知足者而後知得足則以覺神便主之爲配合採歸根而留能得足而成金丹大藥所以於淸眞必要辨至淸至眞之足也得足炁則得長生不死而仙矣知足炁亦知可必得仙矣必長生不死而不復投生矣世人只浮慕仙名虛稱學道亦終不知此理唯自家此精補精此炁補炁不必别行異術何其易修不過百日之工採取烹鍊築基成丹何其易成此所以爲眞仙機也若傳不得于眞仙知不明于正理行不合於仙機焉能得眞精爲用故我冒犯天譴而輕語輕錄于世爲現在未來聖眞說之能因名言以求法必得易修易成之實果剋日上升朝謁三淸大羅矣我又囑諸後聖得句之後必當愼言密悟我雖出此多言不過摹冩其粗迹指人以尋究之門令人八咸入正道易於修證不致誤歸老死効力於呂祖所謂度盡眾生之意耳每遇後學入道之淺信道不篤學道不專之人雖能問爲所以辨我則猶是遵天科誡而應之曰别有辨法非敢戲論更不敢因其懵然泛問而遂輕言此所言者是修仙一定之理不敢言者是眞修實悟之機必後聖能勤苦參究奉持禁戒體天行道有功行不退怠者奏告上界而奉天傳道可也故馬丹陽云天機未敢輕分付細細看眼悟不悟遇有艱難不憶家恁時指汝長生路薛道光云休將大道付人情又云堪憐自古神仙輩時故如愚不作言禪宗和尙亦云寧可將身墮地獄不將佛法做人情鍾離眞人云三淸祕密之事忘言忘象無問無應恐子之志不篤而學不專心不甯而問不切彼此各爲無益此而若有輕言言者聞者皆有天責言者犯漏泄天機之罪聞者犯無德無志不足以載道凡欲學道必先持齋戒精勤參悟奏告上帝帝命仙度而亦有成如有不奏吿而敢私相授受者則泄道及竊道之罪尤速矣三元品誡經云或得仙經妙法妄傳非人之罪傳授經法不爲宿奏諸天盟吿五帝三官不合儀典之罪或妄解經義不合聖心並屬天官三十六度風刀之考又云洩漏神仙祕術寶藏靈書之罪或妄造經論毁謗玄元聖道之罪並屬三元靈曹考之前聖有犯已獲禁誡之報者詳傳記中久矣茅君曰華僑漏泄天文妄說虛無乃今父子被考於水官張紫陽眞人三傳非人三遭天譴李虛菴眞人輕言于葉莫二人之非者遂有大便痾血三年之責而葉莫皆以痢死而可不知天律禁重哉然而後世眞心悟道者出吾又不知恐其無以爲辨有慈悲救世者出吾又恐其無徵不能見信故必留此一語以爲綱目以待後來聖眞之憤悱者二問曰古云聖人傳藥不傳火從來火候少人知此二句薛道光詩也又方便眞人云聖人傳藥不傳火神仙祕易不祕難今更聞藥有不傳之祕而聞之果不聞其世人之有此聞是聞之信有前因主之也此言藥之不傳者今得聞之果與世人之所說所聞者不同而我獨得聞亦是從前累刧積修有功之因而得聞也不然世之願學者亦多而亦皆不聞而火之不傳又何以言之此正詳問火候不傳之祕答曰火候最要自悟自悟者卽不敢輕言之意亦不徒口說耳聞而已是必專心勤苦實實用功求必知其候之精妙處必行之合于精妙之機必得其精妙眞火候之所証果若不合于如是則墮落在外道邪法行氣之類矣所以馬自然遇張紫陽之後有自悔闢邪之言曰道人拜了千千個盡是行氣並咽唾摇筋擺骨至三更使得渾身汗如水也有生也有死也有世人皆如此有文學齋長周南餘武學秀才胡茂元同在道隱齋中問之曰行火候亦若行氣降重樓亦若咽唾于此二者計如何辨仙道與邪門之所以異答曰仙道借呼吸有形者爲火候以行先天元炁之無形者而有形之火亦同歸于無形方是精妙自然若邪門單行呼吸以有形爲事故必致有病何以爲病升提太遲重則提爲邪火其病頭暈病目赤腫翳障病咳𠻳痰火病癰腫等症若降下而遲重則逼沉粗氣貫入腎子爲疼病偏墜病腹脹等病症上下兩病皆致人速死故大異於仙道也仙道降重樓者是元炁返還而降歸根非嚥唾也唾者口之精有形之物亦非無形元炁者比然元炁降歸炁穴則有補炁養神之果唾津嚥至脾肚而歸于濁溺無証果者此亦正邪之大異者悟其順時合則時者子午卯酉之四時春夏秋冬之四時日中之四時有沐浴沖和之候此則之宜順而合者年中之四時有木火金水之和法以和而爲沖此亦則之宜順而合者故參同契云四時順宜與炁相得則者是法則非言之所可罄也言語出于口舌必不能盡說心之妙悟以口心本是二故也亦非言之所能肖也肖者相似之文雖明言之猶是屬于口而浮於外終不似心悟卽是實得夫火何以不可罄不可肖也且言火所當起之候隨藥生之候故然矣火起之候名曰子是合我身中之生機當活用以虛比爲子者以周十二時也若天時夜半之子非仙家金丹之用乃旁門邪法所用者然火子固活用亦不能自起必因藥生了則起火採而鍊故云隨藥生爲起候亦所謂有藥方能造化生也故火必因有藥而後可起餘無藥時起火不得又必以起時稱活子故藥生亦因火生之子而皆稱爲活子以藥生而卽火生之故也於其火藥同用之機有兩情相知之微意固同用不同用歟果相知不相知歟未可言其似也同用者卽以神馭炁也神行則炁行神住則炁住神炁合一而不相離也于此必要相知方是眞得不離若神爲徒用不知有炁是不能馭炁若炁爲徒用不知有神爲主是不能隨神如是皆不相知則悖同用之機不同用則金木間隔矣如炁同神用炁卽可證長生不死之本神同炁用神卽爲神通超刧之主果同用則必長生果不同用則不脫凡夫死亡輪轉果用而相知是眞同用不相知是不眞同相知者神知氣合一而隨之卽凝神歸入氣穴不相知者神行而不知炁隨行石神住不知炁隨住否或氣行而神反止之爲不知或氣住而神反馳之爲不知如是則神炁二者依舊爲二不成採取烹鍊築基養胎化神之理文柔之候用進而升剛武之候用退而降俞玉吾云丹法先以文升後以武降文不過柔武不過剛文武法必當適中合乎自然過柔則似不及過剛則似太過剛而變柔柔而變剛文完則必用武武完則必用文當柔不變柔則傷過矣當剛不變剛傷不及矣皆屬勉强必不可差毫髮循環變化以完周天升而不離二炁降而能順四時神當升時則先天元炁及後天呼吸炁相隨以升而不離爲採取也卽心息相依神當降時則二炁隨時之凝而歸于二炁之根以日中四時合于年中四時順春夏秋冬四時之令而和其沖融薰沐之妙于烹鍊前此聖眞之所已言者抑曾以是爲言乎而謂胎息又豈可易言乎古聖皆巧喻並不如上文之眞語神炁妙用唯此語中一字一句皆發前聖之未言不似已言者之爲喻上加喻使後學于小周天且不能明其大周天爲科禁律戒之尤重者上界仙眞不肯易言在世聖師又豈敢輕忽而易言之乎後學又豈得易聞乎此固小周天之妙理也中亦有合大周胎息理者何爲胎息其肇音趙始也也結胎之息從無入有而實若無於不息中而或暫有有無兼用之際也結胎者成化神入胎之初也神馭元炁及呼吸氣歸于炁穴之根而爲胎得此住定謂之胎結然炁穴中自從元炁及呼吸炁皆發散于外而爲人生日用直至于今則此中本無了胎中之息於此時而歸復幻化作有息以凝神住炁故曰從無入有若執爲實有息而强制爲息相則墮外道邪說旁門之妄舞弄後天者矣眞仙道則入有不見有息故曰若無卽所謂有不著有不空而空也不息者入于有息而爲胎雖入有猶妙似于不息故曰不息此上上天仙聖眞眞胎息之妙相也不同外道旁門之不息由强制爲不息者比然極致時亦暫有息少循其屈伸之理不至如旁門强制不息者之散漫故此曰眞胎息卽道一禪師所謂未有住而不行者然有而必無無而必有故曰有無兼用其旣也末後之時脫胎之息從有入無矣而實無無息中而靜定寂滅此正所謂無餘湼槃者也從有者卽從入爲有息之胎乃不息之定息爲有息是有定息也非曰有呼吸之息如凡夫浩浩然者比卽我上文所說實若無也由若無而至實無故曰入無而實無則滅盡息而得大定謂之滅盡定矣然無息而或不能盡無息猶是有餘湼槃言尙有餘息未滅盡及息無而至寂滅滅已至大定而常在大定方可陽神出見而出定爲無餘湼槃之實証也必至如是爲眞成陽神眞出定卽華嚴經云謂如來出現者是也夫以不息之功爲胎謂之萬法歸一矣有一在則爲目之所易見心之所易知亦猶可易言易傳者也卽金剛經所謂云何應住佛言應如是住菩薩但應如所教住者是也不息爲胎者是以胎中之息爲法而求證無息也昔人問胎息蕭紫虛眞人答曰能守眞一則息不徃來謂心歸一息而住定旣定于一往來自無若有往來是二非一謂常見也唯有一胎息在也而目必見此心必知此所謂萬法歸一者歸此也所謂歸依法者歸此也是爲眞胎息故楞嚴經佛云若不識知心目所在則不能得降伏塵勞故金剛經言應住卽言住心住息爲道胎覺𦙍也卽言悟佛知見入佛知見習學禪定者之必然者故如是直言心必依眞息三昧而定住則不住于六塵而生迷惑其六根應當住如是正定而成正覺也由是佛得住定法而成佛亦卽以住定法垂教于世菩薩修佛時華嚴經已云菩薩住佛所住故于金剛經又言菩薩欲要修佛應當如佛所垂教而住卽能住佛所住亦能成佛所證以無息大定而圓胎則一又歸於無矣此言滅盡定所証陳泥丸云虛心凝神得神氣俱定息不往來謂之大定趙眞人法語云眞火本無候時人休强猜要知端的意無去亦無來無者無其先天後天之炁二也元炁及呼炁吸二者俱得到旣無是炁証大定矣無其心之生滅動靜之環也凡夫之心有生後有滅動而有靜相爲循環不已修行人旣已得大定全無生滅動靜循環卽性證寂滅矣無其六脈而性眞寂滅盡定也陳泥丸云我昔工夫行一年六脈已息炁歸根正言十月關中之實証也六脈者兩手寸關尺共六部脈也脈住由于息能先住息雖住必至滅盡而後脈住故華嚴經云二禪息住三禪脈住四禪滅盡定者言息與脈俱滅盡定也故重陽眞人云也無減也無增不生不滅沒昇騰沒昇騰者住而不行滅盡定後景象卽世尊不起于座之義金剛經亦云菩薩于法應無所住行于布施了心必先依法而住心旣住矣若不捨法而久住法則法又縳心同于六塵之縳心俱爲不了之心如何得常樂我淨故云必勿住法而施捨其法如藏經亦云恒以淨念住無上覺淨念者不生不滅之念旣不住塵妄所不住法之念也無上覺者佛覺極上圓滿之覺再無可上得住于此則證最上上乘矣卽靈光耀古今之極證也又云安住寂靜諸禪定智入不死道者是也安住寂靜者佛言大定而常定于無餘湼槃自然且常樂也禪定智者卽定中之眞覺也安定禪定正覺入于不死之道故能不死此世尊當時所實證者是如此後世僧人竟不知佛證不死不信佛証不死掃去禪定而不修皆甘心死亡成空亡斷見無之見目有所妙其見無之知心有所妙其知此證入佛知見爲心目所在之極證妙見者不見色不見空離所見而若見妙知者無思議之所知離所知而若知證到于此無知見無佛之地是爲眞歸于無者矣而謂無之無知見也不可何也嫌于晦昧非妙覺也無者是無有爲之法無有見執之相卽眞空也知見者是正覺之正知見非世法及凡夫執相之知見非外道斷空之知見也當入無之時用佛法正覺之正知見以入定而后始能無若無正知見則無入者之主宰則是神不能凝炁穴不能入不能圓滿胎神而出定墮在晦昧無知之空亡不成正覺晦昧者黑暗不明之義喻人之無知妙覺者卽正覺之精妙處証入洞虛玄妙之境于無天地時覺猶獨在覺道圓滿而超刧者是也覺旣圓滿卽是妙覺由始覺本覺而至非别有所至所以覺道必由仙佛正知見以入以成故曰無知見也不可故陳泥丸云無心無念神已昏安能凝聚成胎仙而謂無之不可知見也不可何也嫌于不知所以復性眞之體也無者心之無生滅以定息至無出入而俱無也無生滅則無妄覺而有正覺之所至無出入則無妄動而有禪定之眞寂靜方是眞無無出入故有寂定無生滅則有覺照如是者唯有佛知見者能之故云不可說不知見若世之邪人誑語自稱知仙佛妄言不可知見只因不知寂而常照之義是不住正覺將何者名爲仙名爲佛葢正覺原是我性眞之體人人心中本所自有人必由正覺知見而復見性體性體卽是仙佛彼皆不知仙佛正理反要無了正覺知見便是墮頑空矣何以復性眞之體而成仙佛所以彼皆不成超刧正果爲大錯矣内祕眞藏經云大乘之道離一切相離一切行覺法空寂覺無所覺寂無所寂無覺而覺無寂而寂名無上道若此者總上文以知覺知見成正果義皆妙悟深入密修密証而可致言者乎密修證者至精妙之大用悟到至精妙之地故曰妙悟道藏内妙法蓮華眞經云不滯有無永絕生滅是名眞人予斯多言猶是摹冩粗迹之教言也猶非心悟所到之萬一也言語只能少言其似心悟則能妙合其宜子勿執此火傳便自以聞爲得以知爲得也傳火則言之必淺心悟則入之必深聞言若止徒知不若心悟之深入唯决烈精勤以實悟修之萬幸萬幸三問曰直論中所云當吸機之闔我則轉而至乾以六升不降當呼機之闢我則轉而至坤以六降不升此旨玄深實不能測願再詳之言行火之機當在吸之時順吸機而至乾乾爲天爲首位在上故曰升不降非全然不降以滅闔闢乃不重于降而重于升只見升不見降也當機在呼則順呼機而至坤坤爲地爲腹位在下故云降不升非全不升但輕其升若無而專重于降只見有降不見有升也答曰昔鍾離仙翁度純陽翁時巳言可升之時不可降此卽吸機之妙用也我言可降之時亦不可升此卽呼機之妙用也謂若一陽初動陽精生而喻活子時者是也元精流布而欲下元精之根在丹田若將生精則必欲下行于淫根我不令往下而返歸于根非升不可故必升之曰採取故六陽時從子而後升六陽者子丑至巳六時爲陽也子後者純陽祖曰子後午前定息坐夾雙關崑崙過者是也皆升以升之升之卽採取也陽生隨用火之子亦曰子此而採取卽子後升六陽時皆以升故能令藥氣歸于乾卽所謂還精補腦是也卽機中之也之卽無可降之理則不降也升而轉歸於本根之穴矣歸于根卽凝神入炁穴故六陰時從午前當降而降凡採取烹煉過身中午位而降此旨由張紫陽金丹四百字序巳露其機故午當尊其言而降皆降以降之六陰時皆重于用降降之卽烹煉也烹煉必用鼎器卽丹田之炁穴也卽丶也丶之時無可升之理則不升也不升者雖有升降轉運如北斗天罡猶若不升取功在降煉故也門人胡太眞問曰如何六陽皆用升六陰皆用降答曰凡用火必從子起子及六陽在先行因眞精要往下必令還于上必升方還得皆升者取其上轉也至午以後陽炁巳全還矣只要薰蒸長旺因在炁根穴内用工所以旣要補塡炁穴滿足焉得不歸下炁穴此必然之理也所以妙于升降者由顚倒用之始得其妙升時有降而若無降降時有升而實若無升此其所以爲妙也顚倒者卽是用升降之顚倒也此萬古萬眞不洩之天機在是也修士可不識之哉又重陽眞人云子後看時知日短午前坐處覺宵長此可證也學者當以此印證之四問曰直論中論鼎器以爲下丹田中丹田也今日教言又聞有乾坤爲鼎器之說雖皆出於古言不知是一說是二說答曰非有二說也用之時異也時異者有用百日工之時煉精化炁而築基是也有用十月工之時煉炁化神入定胎成而出陽神也今言鼎器是也坤是百日煉精化炁時之用凡採下之炁必向上至於天頂之上下之炁者卽腎中眞精陽炁也又爲地之炁本不自升上故採而升上邱長春眞人云地炁本不升因天氣降下混合至極復升引帶而上至于天頂極高之上是也取上之炁必向下至於地腹之中上之炁者卽言天之炁喻心中之神也蕭紫虛眞人云天上日月地下轉海底嬋娟天上飛乾坤日月本不運皆由斗極轉其機是也斯有歸著於用乾坤也白玉蟾云上至天谷下至陰端二景相逢打成一塊與此義同故云歸根自有歸根竅復命焉無復命關是此云乾坤卽所謂關竅雖云舍乾坤而别指鼎器不能也又問曰何故有向上向下之理答曰純陽仙翁云坎離顚倒金木浮沉是也此節詳言鼎器所用之顚倒兼發明藥物所用之顚倒葢由在腎之元精屬水腎有坎水之象元精雖是炁亦名曰眞一之水本往下流易用於淫根精之本體曰元精著于用則曰淫精每依附淫根爲用者故靜則藏於炁穴動則依于淫根而五臟皆有精炁皆由系管而行于脊後二十四椎之間五臟有管皆繫連于脊椎間之竅以通行五臟之氣凡淫媾時一身内外唯脊腰獨用氣力故五臟之氣隨通身之氣皆聚于此皆化成精之形由此過而洩故人勞氣力于淫事者皆腰疼是故仙機要旨皆必由此逆行上以返還欲逆之而回故必由之以向上能向上則離習炁而得眞炁矣習炁者言淫媾之事也佛經云以海水灌太子頂是也仙機以元精之炁升至上田謂之還精補腦又謂之醍醐灌頂諸菩薩佛法亦謂之醍醐灌頂仙佛起首同此妙喻在上之元神發動皆依念慮爲用本似火而炎上易出入於眼耳鼻舌欲逆之而返還故向下依于精炁而同返還入于炁穴旣向下炁穴則離外境而盡脫四生矣念慮者如眼之念慮爲用視耳之念慮用聽之類脫四生者是眼不住色而不生色心之魔耳不住聲而不生聲心之魔鼻不住香而心不生香魔舌不住味而心不生味魔此言離了外境之色聲香味而心脫四者之識皆得向下之所證也卽世尊於娑竭陀龍宮說法此卽下丹田之說又於迦羅龍宮入定此卽仙家中丹田入定之說經七日不起是也又問曰中下二田爲鼎器之理如何答曰下田卽煉精化炁時之說已詳矣三十六部尊經云眞精在腎餘精自還下丹田眞炁在心餘炁自朝中元而華嚴經亦云一切諸佛臍中皆放光明名菩薩受生自在燈張紫陽云黃庭爲鼎氣穴爲爐黃庭正在氣穴之上王重陽眞人云臍中丹田内有黃庭宮古云一點落黃庭卽此處方眞此上文一節皆言下田之理畢矣下文一節皆言中田之用而中田則煉炁化神也重陽眞人全眞集云姹娘嬉嬰子卧搬上中田總向明堂過又云拾得眞金堅又剛放在綘宮封閉了滿宮明耀現霞光譚長生眞人云欲覔眞空只在南山盡靜中谷神篇云百朝沐浴忙移鼎純陽翁云一從提上中宮帳萬里羣魔不敢當亦有本行經世尊云若至恒河水南岸安稳住定如須彌又達摩祖胎息論云鍊胎息者鍊炁定心是也常息炁于心輪則不著萬物氣若不定禪亦空也此一段明中丹田之說猶詳在李生三遷之問彼此相爲互明者眞修實悟之人必要先知用中丹田之眞處而後可成陽神前之鍊精以化炁用上田之乾下田之坤卽紫陽眞人所言乾坤爲鼎器如易所言乾爲首坤爲腹是也極致其上下二者而虛其中田故天皇眞人云以形爲爐首爲鼎也精滿于腦火鍊成丹白玉蟾亦云鼎用乾坤藥須烏兔是也化神時用在中田馬丹陽眞人云保養下田無漏洩方遷綘闕鍊中丹綘闕者心屬火赤也常若曠中下而爲一如世尊于欲色天二界中間化七寶坊如三千大千世界說甚深佛法令法久住卽此時義而上則其所經行之虛道耳言上田亦我神炁所經行過之路道葢三乘之工皆有三田反覆之理以爲行所當行者若用初成時住于下田用中成時住于中田用大成時住于上田此我所謂住所當住者是也鍊神還虛時唯虛寂于上田上丹田者仙云泥丸佛云泥洹又云佛事不周終不取于泥洹不用中下二田者炁已無而神已虛也到此地位巳無返還化神化炁之工則不用返還化炁神之地是由三田各有當用之時故亦各爲之說有緣高士見聞此說當識之爲定論五問曰法中有五龍捧聖前此未聞果凡耳之不得聞抑前此聖眞無此法名之可聞乎願一明示答曰有而且多皆設爲工法之喻名耳古聖仙佛借喻言以說法者心切于度人也法不說則人不知求不知用未來者何以得超凡入聖欲直說之天律明科禁重天機又不敢輕洩以犯冥考故以意義近似於道法者而爲喻以言使後人因名以求實用卽所用而求証聖果故皆立一喻名也又或有名雖不同而工則一昔世尊佛喻之曰蘆芽穿膝王重陽眞人亦云若人收定三寶搬運寄歸何處先用蘆芽穿膝之法運炁然後七返還丹又曰蘆芽穿膝上下河車搬精補腦水火雙行此見我此仙宗卽同佛法而後世凡愚不知爲喻而疑爲實有穿膝豈有所坐磬石之上眞能長蘆芽以穿膝乎達祖喻之日折蘆渡江梁武帝建都于金陵八年十一月朔祖渡江往少林其時江邊已無蘆可折矣不知佛與祖皆以蘆爲喻者海與江喻人之愛河欲海流浪之苦西江水黃河水逆流亦是此意豈有航海之胡僧海不能以蘆渡而江能以蘆渡乎初達摩在南天竺國欲東遊震旦謂此東土有大乘氣由是國王以巨舟實以重寶與之渡海凡三周寒暑而至廣州登岸事詳在傳燈錄及五燈會元皆有此妙喻而濁惡愚夫執謂世境之言妄以誑世似亦可羞也夫又問曰此五龍捧聖之喻亦喻出於古人乎抑今日之新爲喻乎答曰前於佛而有玄帝經云刧初太古修來證道於軒轅黃帝五十七年之甲子𡻕當其超凡質以養神胎之際用此法矣後留法象於武當山曰捨身崖脫凡胎也曰五龍捧聖入聖位也喻此以示後人度人之心何殷殷也故修仙之士得遇眞仙傳道者得聞而濁惡世皆凡夫無聞也元始天尊說眞武妙經云淨樂國王與善勝夫人夢呑日光而有娠懷胎十四個月于第五刧名開皇刧初元年甲辰三月初三日午時一云甲寅日也生于王宮神靈勇猛不統王位唯務修行攝離坎眞精歸根復位得玉淸聖祖紫虛元君之傳道成後于黃帝五十七年甲子九月初九白日昇天又按淨樂國在奎婁宿之下海外國也武當山煉眞之所在翼軫宿之下又啟聖錄云前厯八十二化而後成道乃太上之第八十二化也濁惡世無聞者葢濁惡世人皆行濁惡之事無志修眞何以有聞無緣遇仙仙不屑與之愚何以有聞故終于無聞也捧聖者非别有所爲乃仙佛超凡入聖所同用而必用者卽冲透三關之祕法非凡世所言之比及世人遇有此言出後聞此皆茫然不知何用殊不知卽三關祕法故陳泥丸眞人云最隱無過九曲灣是也昔我祖師虎皮座張眞人眞人張其姓靜虛其法名宣德壬子年生于邳州爲丘眞人北宗龍門靜字仙派也得道於蜀之碧陽洞受師仙旨以廣教門周行四部洲厯西番轉北番還中華雖有大明嘉靖皇帝徧求請而不肯出以復命常以虎皮爲座具故當時十方皆稱曰虎皮張常幽棲於武當山坐於武當山之虎耳崖石竅中不與世人相接唯顯示學人知當避世深得此名理以吐露祕機其後口授於廬江縣之李虛菴姓李號虛菴法派名眞元也嘉靖乙酉年生于廬江縣城西初以醫濟世乃結菴於城外延訪仙師自十九𡻕至五十五萬厯巳卯也始得張眞人盡傳内外金丹天仙大道捧聖超凡功成顯聖虛菴眞人口授於南昌縣南武陽里之曹還陽還陽爲號常化爲法名曹爲姓嘉靖壬戌年元旦前三日二十八爲生辰廢盡千金家而學道甘貧淸苦爲精修得五龍捧聖轉神入定爲懷胎至天啟壬戍六月十二爲出陽神入新建縣西之西山面壁還虛爲大隱還陽眞人來口授於我及汝父眞陽登仙派名守虛也皆得聞此者凡修仙道者知此而行得此而証則得長生不死而永無生死神通無極是爲證聖矣若不知此不得此則必不能脫了生死不免六道輪迴此聖凡分路至祕天機得與聞者有熊秀菴亦名守虛鄧紹元名守空二者新建縣之西山仙種也并曹老師之子號希還命名守玄者數人虛菴得聞此以證道大顯神通濟世救民一日大旱無以治農事諸祈禱者皆無應眾官民哀求李眞人禱以救民眞人乃以墨塗掌心向日默言數句卽有黑雲蔽日遂致彌天不數刻而大雨如傾及鄰封六邑皆得有秋一手舉五六千斤之石如弄丸之輕竟不知其力之能舉多少其神通最多此不暇數仙隱於萬厯乙卯𡻕時縣宰貪酷無度求見眞人欲求服食點化眞人不屑與之見遂以違命懷仇連及姻家被禁誓必追捕辱之以洩忿此亦可笑可鄙也視黃帝肘膝下風者之必得視劉海蟾卽棄宰相者之必得視呂純陽卽棄德化縣令者之必得如彼挾勢位捕師者之必不得爲孰愈哉與退步而求至行前者何異有冠冕者求道之禁戒也眞人由是託尸解之狀以避之宰以爲眞死遂解其忿而眞人似死入棺者七日棺卽空矣其形神俱妙仍居於姻家其子名李能培充生員竟不丁憂後繼宰者深羡其肉身菩薩名遂播於十方神遂煉其還虛此亦有神通不必顯之一案也所以大修行者安肯令世人知之還陽得聞此以成仙含光太虛妙覺無極出陽神入常定寂滅于無極亦仙隱於天啟壬戍夏當此欲藏跡西山之時巳形其五龍之名於筆矣曹老師將仙去之時謂其子索紙筆留記于伍子云五龍捧聖萬金機齋戒焚盟巳受之初願臨期能妙用眞眞皆此上天梯從此始有五龍捧聖之名在紙筆矣我亦因之以筆永其形我因師之筆形而再言之以夀諸梓則流行于永久矣吾弟眞陽初見直論有五龍之名責我曰古謂仙機必不書於紙筆五龍祕機祕而又祕安敢書於紙筆乎予曰師巳肯形于筆我何必不肯其所筆乎雖有五龍虛名似亦不妨代爲口授普開來學而凡大仙行仙佛最上上乘妙道者只此是聖凡分路他如縱說能修有證非此一法無以透關而脫凡證聖也唯其爲至要至祕之機不得不露一句令後學聖眞有仙道福分者知所參求知所信奉凡有志於仙佛者俱不得輕忽此言背此不求者雖修萬刧終難逃其六道可不思之爲急務耶問曰玄帝之喻五龍有法象可證者人可易信法象者卽武當之捨身崖及五龍捧聖等之說便是有據今以蘆芽穿膝爲佛說五龍之喻以折蘆渡江爲達摩說五龍之喻但我尙似凡夫之見同於信心不及不知何所證據而可令人必信不疑乎答曰昔王重陽眞人云蘆芽穿膝上下河車搬精補腦水火雙行等語巳先指示在世流通亦詳道藏中久矣又西竺經目有所謂五龍經其曰無字經三十二卷有字經二十卷豈虛名哉卽三藏來東五千四十八卷内三十五部大經之一觀其名則有義在若無據而說則爲幻說無授而言則爲妄言旣非幻妄後學甯可疑而不知參究之哉六問曰如何是養胎如何是胎成答曰養胎者煉炁化神之喻非實有胎也太上靈寶大乘妙法蓮花眞經云淸靜之義天尊言專養精神不爲物雜謂之淸反神伏氣安而不動謂之靜卽此也又問旣無胎何云養又答似胎之理故借喻以言其似也以鍊炁之初本要似胎中之無呼吸者而又不能無呼吸習入定而求至無不能頓然全定全無此仙佛聖眞初習禪定自然必由之漸法也若胎孕之將産時也人胎十月滿足將生之時呼吸全有故初習定似之生滅之相尙在心起一妄念思想平日舊習便是有了一生相又起一念滅妄便是有一滅相如安國師讀楞嚴經四句偈云知見立之說卽所以爲生滅凡習定之初求無相而不能頓無云尙在者生滅不能滅已盡之說也出入之迹猶存生滅者心也出入者息也心有生滅則無以攝息其息焉能不浩浩然爲出入懷胎者必存神以攝氣存氣以留神乃可得神在胎中名二乘亦名曰如來以有來故名如來又謂之如理而來如理而去來去卽是出入之義習定之理故華嚴經云如來大仙道微妙難可知燃燈佛又言諸行無常是生滅法皆謂此也入湼槃而未實証世尊謂之有餘湼槃由此而漸趨者也猶稱爲漸法卽此法此理而仙聖喻之曰養胎也胎息法云心定則神凝炁住而胎長矣胎之長由于息之住無息則不胎無胎則不息卽此是也其終成也胎息論云動念則泄眞炁故胎息不成如何得道無呼吸而滅盡定矣若人世男女始媾之時祇二氣合一而未成胎渾然無物也生滅之相滅已眞實用四禪許多定力而後得生滅滅已卽六祖盧能所謂禪心無想禪性無生是也出入之迹寂滅鼻息無出入之迹得證滅盡定矣心爲不生不滅之心身爲不生不死之身此時神形巳俱入妙六祖盧能亦謂心是地性是王王居心地上性在身心存性去身心壞是也從此一得頓然直與虛空同張紫陽云覺此身如在虛空常至如此則禪定也故仙聖喻之曰胎成也世尊佛謂之無餘湼槃無餘者無有不入寂滅之心與息也而後脫胎出神出神是定性成而出定世尊謂之如來出現所以楞嚴經云旣遊道胎同仙家懷胎之喻親奉覺𦙍如胎已成人相不缺喻定成神全而性妙靈覺身心合成日益增長又曰形成出胎親爲佛子是也胎息養得神全而純陽仙家出陽神稱曰神仙佛言得大定而出定稱之曰佛卽此說之同者燃燈佛所謂生滅滅已寂滅爲樂正謂此也過此向上則爲眞圓頓門矣不隨天地同壞者史太素胡太眞問曰仙家人修到出陽神佛家人修到出定似亦圓成了矣今乃曰過此向上爲眞圓頓門我不知出神出定後更有向上我亦不知仙佛爲如何圓頓我聞自佛法入中國至于今上下千古人人皆說凡夫發心修行時便頓然了了爲頓門今言出神出定過了後方名頓然則眾言皆非與答曰果非也尤可笑彼凡愚漸且不知誑言知頓竟不知如何爲頓冐認爲知頓能頓以自妄爲尊大實竊據衣食財利之竇而亦更不肯悟華嚴經所謂如來始成正覺在寂滅塲現盧舍那身說圓滿修多羅名爲頓教之說今之一切凡夫俗子皆未到寂滅塲安可妄稱我自頓教頓門此是未得爲得入魔道而不省悟者又何不解圓覺經所云如來境界漸進至於佛地名頓教大乘頓機從此開悟之說所以不知七地菩薩上至八地成佛尙要加持修上至九地十地十一地等覺而後竟道始圓滿正爲眞頓教也葢初修行時用功行以至七地而功行止了矣八地以上則無功行乃不可言修言証此時若强加功則是同于退席者之知見若未到七地而誤不用功行則是斷見空亡外道之知見後學皆犯此卽墮入此魔坑矣汝當自詳之能如是說則同佛說不如是說則同魔說不可頓爲仙佛但可頓入魔界獄矣夫旣喻之曰胎宜若有似於胎矣雖曰似胎而實非胎也何也生人之理胎嬰在腹修仙之理胎神在心世人但聞胎之名而遂謂腹中實有一嬰兒出而爲身外身者此又可咲其愚癡之甚也有志修仙佛者不可不以此破疑而自啟其迷又問古人皆言身外有身伯師今日獨言非身外有身何也答曰人性至虛至靈無形無體無論動出靜入本然皆無形體我今不過以得定之性出定而爲神通亦只虛空無形體洞玄靈寶諸天世界造化經云得道者與虛空合體無盡者也非拘拘於身外有身形也若欲顯身令人見之身外便能了身一身多身百身千身萬億身皆能變化無窮初出定之神現身亦少乳哺神旺方可變化百千萬億多身如此者是因陽精陽炁歸元還虛所能也古仙遂卽所能然者爲鼓舞人趨向决烈之志如佛之善巧方便化人豈拘拘以身外身爲言哉昔洞靈神鑒書云念動意動處處出神念停意停處處歸眞先我言之者亦如是七問曰如何得成陽神抑何以出答曰先天元精謂之眞陽得此眞陽而煉性通神入定而出定謂之陽神不得眞陽之精配合性眞以入定得定者只名陰神陽神者顯然出現變化莫測世人所不能見知者而能見知之世人所不能爲者而能爲之世所無者而能有之有者而能無之人人共見此神通之能顯于陽世者曰陽神若不能以身形顯現於陽世則人不能爲者亦不能爲世所無者不能使之有有者不能使之無無陽剛之炁故也僅僅能先知先見勝于人而巳亦只能陰陰暗現于世故曰陰神全與陽神相反故不及其神通所以得成陽神者由元精眞陽也葢元精是無形質之陽氣能化補其炁能助胎養其神乃成金丹成仙道顯神通變化之眞物故曰眞陽曰陽神若炁非眞無形便是陽不眞爲陰濁無虛靈之變化縱陽神到空只是陰神旣無陽炁之因故不成陽神之果所以王重陽眞人門下孫不二元君云偏執性爲宗如何出陽神十個九個墮頑空若得命基帶了性命基者卽眞陽元精也白麵做燒餅有準又長春仙祖門下徐復陽眞人云未煉還丹切莫内觀照恐出陰神投舍迷眞道是也還丹者機有將動之元精用還返之法化炁成丹丹成則以之養神入定内觀照之化陽神内觀照者觀照此炁還之丹也若未得還丹内無所觀照强欲觀照乃無着落必墮空亡死境故曰恐出陰神陰神者死而性靈之鬼也投舍者此身形氣已死不能存住此性故又投胎生身爲居舍迷眞道者迷失長生不死之陽神道若止習枯禪當下了得卽行内觀照之法而萬緣不掛息無出入息禪定而滅盡定也心不生滅心禪定而滅盡定也故皇經集註云心生則地獄生心滅則地獄滅到眞空境界方能出得個陰神必要心息俱到眞空方出得陰神故長春眞人云未到眞空雖陰神亦出不得可見陰神亦非容易出的猶是有生死在不免輪迴者之小果耳有死則有生不能長生則有死有死生卽是輪迴入地獄餓鬼畜生三惡道同是輪迴雖生于人生于天亦是輪迴故曰不免所以四果之徒有生天生人之階者以此天福盡而還墮皇經集註云豈知積福生天福盡猶不免復墮故我祖先虎皮座張眞人謂之謊花兒不結果者言不及陽神之實證果也初李虛菴眞人得山東劉寶珠内觀照之法遂内觀照至七七日卽有慧光發現隔城墻能見人所爲城墻如琉璃透徹明亮自謂一心息相依而得此妙證此果及出靜室依舊是凡夫無能見故張眞人云謊花兒不結果夫陰神出而亦有慧光發現洞見百千萬里如在掌中此亦有天眼通之微意房舍墻壁不足爲隔礙山河城郭不足爲阻攔我形在此而慧光亦在此惺惺靈照而洞見遠視之爲妙也非離此而逐諸境也不如是卽昏夢中之魔境而誑語人爲陰神者也於此著之卽入魔道矣楞嚴經云若大妄語卽三摩地不得淸淨成愛見魔失如來種所謂未得謂得未証謂證如窮人妄號帝王豈知眞陰神者耶又有一等人似戲似誑言曰我能出陰神明明出于街市而往返焉而人遂敬信之陰神之慧光亦能普照無所不見無障不徹豈但只見街市而往返行之街市兩旁之房舍便隔礙不能徹見耶若果如此是春夢非陰神也若再强誇得此陰神便是誑語有心以欺世者非正人君子之言也洞玄靈寶之所禁楞嚴四律儀之深戒學者自愼之犯在玄洞則得女青律風刀之考犯在梵網則招酆都山拔舌之愆若不愼則此罪有準彼見人敬信而益誇其能出陰神此又可恥其無恥之甚也若眞陰神者有神通矣亦止有神境通神通變化無窮也宿命通知自身前世人後世事及見他人過去未來事他心通知他人心上陰謀之事天耳通徧天之下人與物之聲音言語俱可遠聽而知天眼通見徧天下人與物有形無形可盡一見而知絕無有障隔者能六通之五耳仙佛陽神皆有六通此偏于一性靈者只有五通世稱五通爲鬼者正此類也世間每有五通鬼侵淫女人者蓋由少此一通不能除陽精之漏不得漏盡通也陽漏至枯竭則死而至於爲陰鬼必然之理也故生死者皆非仙非佛太霄琅書云太極大法師曰五通尙在三界未爲仙也夫仙道無不無有不有能覺有無之間於其際而無際乃能超三界今時自稱誑人曰能出陰神者果能五通與不知所少於陽神者乃漏盡通不與也陽精無漏則成漏盡通此通一成卽得長生不死爲天仙諸眞佛世尊之基若精漏不住不得此通則不長生而不死凡有死則有生死不斷有輪迴六道相續世之愚人不知有死者必有輪迴盡信誑言欺哄反求死者正投入輪迴的門路不得脫離妄誇如是爲證佛當其現在生有人身時愚不知懼尙不知求不死不輪迴乃至橫生異類性愈迷惑愈不知求不死不輪迴不知釋迦眞佛皆能漏盡通而後能長生不死不輪迴者雖曰愚不足教我願後來人見此一辨少有所悟而知求學不死不輪迴唯人自信自勉之可也無上内秘眞藏經云法無二念當知三界之中有漏眾生無方便慧終無悟解佛教中言阿私陀山迦㫋延等得四禪五神通所少於佛者卽漏盡通正是淫欲未淨而陽精之漏未除只成陰神陰神者無陽精之所證也陽精無漏則無死有漏則有死死則爲陰鬼故儒者亦云鬼者陰之靈元始九老眞經云人不保生神炁不全流爲下鬼是也其天眼天耳二通能見能聞天之下不能見聞色界以上天者卽是無眞精之陽炁不合純陽之天體陰性不能達天之陽中故也三皇玉訣云陽者天道故神炁合道乃神仙若天仙之道煉精得陽精陽精無得則不長生因長生無根卽天仙無基故經中巳說精爲長生根眞得者是知藥生之時眞知藥生之地亦眞知採藥之時煉藥之時皆眞唯知如是皆眞故能得眞陽精有一不眞則不得况邪淫門之全不眞者與陰神門不求知眞者何亦癡望修成仙佛耶煉炁陽炁化二炁煉到眞寂定則眞化爲神無了生死若炁不到化盡猶是色界之眾生頓悟直證陽神精盡化炁炁盡化神則炁極定神極通皆决烈精進煉精煉炁方能修到得此證者乃陰陽二者合一之道者也陰陽合一者乃神炁合一以爲工炁寂滅而神靜定亦合一之爲證果入而靜則神同太虛而爲性體入者入而住于常定也神已同於太虛卽常靜定于太虛此正性體圓明之實相無法界可拘無世界可染唯得成陽神已出陽神之後者能如此非若未成陽神者之必依胎息法而後能趨太虛出而顯則通天徹地而爲神通出者出神于身外而顯神通凡陽神出殻則無重濁者無窒礙者巳定色界禪定之功超出色界之上矣此以前有功用行而有爲之功巳歸于無矣此以後是巳成仙佛之正果無功用行時無爲而至于無無者也通天者上通欲色二界二十四天之上卽世尊佛出白毫光上照阿迦尼吒天是也此卽天眼通之所見其天耳之通亦能聽至于此天徹地者可見二十四地獄及所謂十八地獄八大地獄等處皆能見之而亦能聞彼之所語卽世尊佛出白毫光下照十八地獄是也通與徹言神能至能見能聞無隔礙也千變萬化眼見宇宙上下四方曰宇卽前所言欲色二界天及地獄等處神境通之所能見也古往今來曰宙卽過去未來之事此宿命通之所能見者也手斡乾坤斡者移轉之義天地之形有不便於人者能損益之天地之化有不利於人者能轉移之如漢欒巴在朝噀酒一口化大雨而遠救成都之火灾如唐一行禪師以袋囊七豕而在天之北斗藏形蓋由斗姥者是豕形身也如丘長春眞人在燕京住天長觀值熒惑火星犯尾箕宿屬燕京之分野將灾全城百官請眞人禱之本夜星退數舍如大明初鉄冠道人張景和助太祖皇帝平陳友諒南風之天舟後使北風送舟而逆上蘄黃也如虎皮座張眞人謂李虛菴曰汝傳道及於非人汝大數及盡但北斗中有本命星君注生死我爲汝指而勅之添夀一紀十二年以便精修見其星雖形如小豆能化大如五尺圍湧如浪沸白毫光燦爛旣而漸復小形此仙家之演斗法也如李虛菴眞人在廬江縣家中時苦旱農不下種應眾請禱塗墨于掌以蔽日黑雲隨手掩日而㴻雨救本縣及鄰封六邑之灾此皆斡乾坤之顯案也是爲眞陽神也眞陽神卽眞空性體也王玉陽眞人云一悟眞空總了仙故王重陽眞人云靈性分明作大仙是也不能見性則不得眞空見性者性中原是寂靜絕無生滅的人能修心到大定而常在定便見性體此正到仙佛地位者于淸風眞人云不到眞空陽神難出譚眞人水雲集云今生若要登雲路不合虛無不得仙不成陽神見性眞空卽六祖所謂若修不動時同無情不動方是成陽神不到見性眞空實地必不能出陽神也修到見性此性出定卽爲陽神顯神通若未修見性成佛卽是未成陽神故不能出陽神若性有妄出乃是外馳之病無定力也又問曰若何知是眞空實地出陽神之時答曰性合虛空而不神用元始先天道德經云妙法無因妙境無緣又禪宗六祖云禪心無想禪性無生一緣不染一塵不動絕無出入生滅先天道德經云唯無生然後爲長生正是眞空實地心性中有念生染緣與塵者則不住胎息故息有出入凡息有出入者則是性不住之凡夫外道而已若滅郤緣與塵及滅郤出入息復還於胎息而常住定方是無出入生滅如此者是仙佛禪定必由之理也眞空者性地無妄可生其心眞息定得絕無出入故空爲眞若心未全定而少有生滅息未全滅而少有出入則空不眞而生死亦未了實地者非似空而不能空者比亦非暫能空而不能頓然全空者比乃頓空而直至無量刧常空始是眞空實地故重陽眞人云要見眞空元始虛無是祖宗一見天花亂墜神念湧出頂門陽神超矣脫矣向上煉神還虛而合道超刧運矣無上内秘眞藏經云道行絕空無心無意無覺無觀是爲眞道又云眞道寂滅滅無所滅又問曰古往聖眞皆未言及天花亂墜何也答曰上天所禁秘機不肯輕言洩道者有之仙佛正道眞機本上天科律重禁不肯輕洩于狂者愚者之共聞及憫世人時未有不奉天命略露一句智賢者則能悟而成道下愚迷惑不悟者及造一句假言煽惑善信上天聖眞又爲善信憫又多語二三句四五句以救世而狂愚不悟不棄邪歸正又造二三句四五句假言誤人由是眞言愈多而假言亦愈多卽世諺所謂一法立一獘生之意同也今憫世人被誤害者眾又露出此一法及五龍法焉知後之棍惡又不造一假言以欺人乎故以不肯輕洩者而亦洩之於世尊達摩神光及重陽眞人邱眞人金口之先宣洩重詳揭示于我之言也後之學者甯信此書之語明者自明顯者自顯若有不能悟明顯者猶待仙授愼毋聽棍惡之誑言可也不知而後知之不暇言者亦有之根基淺薄之愚夫不遇仙傳者亦有之昔藍養素養胎於南岳十月功成而不知此久定不能出劉海蟾以李玉谿十詠寄之遂大咲而出世尊說法至天花亂墜而亦以此指示人者二祖神光說法亦至天花墜猶懼未脫𨶒君之手天花墜乃聖凡生死之分路見天花而出定離了生死超出凡胎之聖也見天花而不出定猶是有生死之凡夫聖由自手握住生死凡由𨶒君手握生死斷臂達摩前求於此向上事鍾離正陽眞人云雷震天關鬼神驚天門開如雷震言出陽神者掀翻宇宙飛白雪將出陽神而未出先之景見此而後出不見此則不出呂純陽眞人云寒雲散後留殘月言胎息滅盡定也臘盡來時向太虛言見雪來則離實有之幻體而向太虛無王重陽眞人云忽然間振動天花偏墜前面刧有個眞人又云空中早仙樂來迎感天花偏墜邱長春眞人云若到天庭忽有天花飛方出陽神得初地果也初得聖果初証仙佛者皆如此學者當知仙佛同一工夫同一景象同一陽神證果史太素胡太眞問曰何謂同一工夫古言佛教離宮修定仙教水府求玄何彼言之不同也答曰彼言不同者由于凡夫俗子之口非聖眞得道者言也我今再詳言其所同者蓋仙言煉精化炁又言留得陽精决定長生卽同佛言戒淫修梵行以出欲界者也仙言轉神入定伏炁胎神卽佛言四禪定息定心定而滅盡以出色界者也仙言煉神還虛卽佛言七地菩薩修上八地如來出現已成佛時加持至九地十地更加持上至十一地等覺以超出無色界之上者也工夫之同也如是亦有如是証果同入仙門學仙者同此卽成仙同入佛門學佛者同此卽成佛若一切學人能見聞此能信受此能知悟此猶可望成仙佛若不聞此不信此不悟此則是旣不知修仙修佛何以妄想成仙成佛耶世之言當下就了者是言臨死時逢惡道魔境離之而能就了實於大道仙佛不能就了也有言當下回機者是言死于此而生於彼時用躱輪迴之機雖入惡道能速回其機而不墮入也此皆凡夫之所修亦仙佛初修之前刧七生天上七生人間者一生天上一生人間者之初果根基也仙佛二宗人亦當知彼嘐嘐音交然强談爲二者眞下愚不移者歟又問曰世之從事仙佛者皆分爲二宗各立門戸以爭高今獨言工夫一景象一證果一然觀仙佛之言若不一如世人淺見寡聞只知仙言虛無佛言寂滅不知仙家先天道德經已先言寂滅矣世人只知仙言性命雙修佛則單言見性不知不見性者不成仙惟其不知是以訛傳訛而若不一我亦未識其爲一不能不同世人之分自六祖不傳衣鉢之後則性學不眞皆言和尙操轉刧之性全不究竟如來佛超刧之性以是而分仙佛爲二矣雖佛教五祖之下猶分神秀爲北漸法之教以盧能爲南頓法之宗一佛氏學而同居中國且分漸頓二途况東土西方仙佛而不至于分乎世世人人浮慕修行妄稱得悟者而强爲誑語以分之不分之則不得以已勝于人也人人得不自誇而愈分乎絕不聞合一之言何以識爲一且人全不見仙藏内典或有略見佛藏又無一言能解悟領受所以終于不識一雖智者無不在分不分之疑似間也卽不能不疑今一之說太一自言曰我之疑非疑仙佛不可一而當分亦非疑可一而亦可分祗見古仙以來皆言一以救世迷而僧流皆分以惑眾信古來人何不救正妄分誤人者而直切指其一于仙佛諸經之自言者又何不具一慈悲救世心直言其若一者而示卽一如今之所說乃直待今說卽一是以未有不疑今古兩說請再詳之答曰道修于有爲以至于無爲仙宗張眞人悟眞篇曰始于有作無人見及至無爲眾始知但言無爲爲要妙孰知有作是根基佛宗中四來僧肇曰有爲雖僞棄之則佛道難成無爲雖眞執之則慧性不朗東土宗鏡禪師云有爲雖僞棄之則功行不成無爲雖眞擬之則聖果難證此皆仙佛二宗若一之說人人共見奈彼欺瞞而不令人共知何道成於有證以至於無所証仙之養胎成神而猶煉神還虛雖已得道不以爲得實若無所得是爲眞得若已爲有所得則心被有相有妄繫縛不能解脫得道故無上内秘眞藏經云眞道寂滅滅無所滅佛教圓覺經云若得如來寂滅隨順實無寂滅及寂滅者此亦仙佛若一之說也仙佛皆然者也不但仙佛同然雖沙門之四果所言萬法歸于一而一歸于無亦有似于如此故呂純陽仙翁云不問神仙與佛共同覺照覺者是佛是仙當禪定時則覺照在禪定當虛無時寂滅時則覺照在虛無在寂滅所以仙佛自始至終皆由覺照覺照者心中之實悟也若不覺照乃是假說修行而全無實悟只爲口頭三昧是也仙家人見呂翁言仙佛同一覺照遂誑言曾參黃龍禪師然我昔常究此而見爲謗仙之惡口自知仙佛决可兩從亦欲與眾謫之令知爲可兩從故按呂翁以唐德宗貞元十二年四月十四日生於唐文宗開成二年丁巳舉進士時四十二𡻕也爲德化縣令出城遊廬山遇異人自言是鍾離權其話有契呂遂棄職隨之七八年而聞道後修成道于六十四𡻕五月二十日黃鶴樓前飛昇虛境超出天地五行之外世人皆知不可昧者若黃龍者在豫章南昌府甯州東鄉黃龍山寺僧晦堂和尙一語言僧俗耳與黃庭堅居鄰爲言語文字友并其徒號死心者皆宋季人也豈有已大定之出陽神而神通能厯過五百餘年不死者之呂反問五百餘年後之不能大定出神通而有死者之僧以學死耶况呂翁至今屢屢顯聖度人由已得定出定不落生死輪迴者而後能之若黃龍則死後至于今獨不能顯一聖如世尊之度人如呂翁之度人反言能顯聖之仙而參不能顯聖之凡僧雖則毁謗仙眞黃何足榮呂何足辱細觀黃在未死時不能神通如呂已死後又不能復出現於世如呂此乃死後入輪迴胎去久矣故也彌勒佛所謂終是落空亡是也我今旣得二宗合一之妙見彼二宗學者皆趨小路妄分仙佛而爭高自誤致死我示知一便可不墮死入輪迴之塗縱惹僧狂日後毁我亦惟盡我度盡後際仙佛聖眞之念耳我又按自太上傳鍾離鍾離傳之純陽海蟾二人遂分爲南北二宗之首葢呂傳之王重陽王傳之邱劉譚馬郝王孫爲北宗七眞及下而王棲雲尹淸和宋披雲徐復陽等法眷諸仙又劉海蟾傳之張紫陽張傳石石傳薛薛而陳陳而白爲南宗之五祖及下而彭鶴林彭而蕭紫虛等法眷諸仙皆傳仙佛合一之道所修者合一所度人者皆同一法其言之現在諸集諸語錄者有徵後之眞修實悟者後要依樣自悟自修方有實得而後可以不失人身第仙宗詳言其始所以必詳始者是何故蓋以其煉眞精之難得也凡遇眞仙傳辨藥之眞時則煉之可得不然世法中所傳之煉終不能得凡出言爲丹經者莫不章章句句反復宣明不過明小成初果之要法初關百日用煉精化炁之法化炁而炁足如全體童子便是得長生不死初成之小果鍾離三成之說謂之小成不如是則不得眞精不能成其大道成大道者卽養胎化神于十月出陽神爲得中成神仙九年面璧還虛成天仙上眞大成之大道人遂疑其止能乎此耳故一以小成視之而不知其後之大而不可復有加者也釋氏子乃借仙言爲小者而小之以爲貶併不自知其佛法亦如是也佛但略言其始其爲言曰若不除淫修禪定者如蒸砂石欲其成飯經百年刧祗名熟砂何以故此非飯本此楞嚴經文也飯以米爲本炊之成飯喻修行必除淫離欲成金剛寶座此卽仙家之煉精化成乾元白金之炁同以此爲神之所依佛故以此爲座坐此以修禪定證湼槃成佛而得如來出現卽仙之十月凝神入炁禪定寂滅成仙而出陽神是如以米炊飯爲仙佛二宗之所同也若不除淫離欲妄稱修佛必不成佛蓋淫慾失生身之根本身心速壞而性無定位故無以證湼槃入泥洹者是卽砂石蒸飯必不成飯此我佛示人以决然不可易之詞也然佛言離欲者小乘也禪定者中乘而大乘也後人掃去離欲禪定自稱當下卽佛愈于往昔佛修直似謗法謗佛不但如蒸砂作飯猶甚似無水無火無米而曰作飯予誡智者當思此義汝以淫身求佛妙果縱得妙悟皆是淫根輪轉三塗必不能出如來湼槃何路修證除淫者是如來初修行之路淫身是凡夫行淫事之身身旣有淫漏則漏盡通不能成漏盡通成則眞無漏精全炁全而長生漏盡通不成漏之不止則精枯炁竭而必死死必沉溺三惡道中輪轉之苦只因不行如來除淫之路所以不能成如來湼槃之果淫性之根不除漸長淫事雖有偶知佛性當悟畢竟淫性多而間雜妙悟亦無成也當知六祖所說淫性卽是淨性因除淫卽是淨性身後人豈可不除淫而誑人曰參禪悟道哉必使淫機身心俱斷斷性亦無淫機而曰身心者言淫機于身斷淫事而不交姤淫機于心斷滅而不妄生淫念故曰身心俱斷初由勉强斷而後得實証斷勉强斷者是欲界六天有妻妾可淫事者而執身不行淫事戒淫而修梵行淸淨成身之機斷矣身根于是亦斷成自然永不可行淫事如世尊佛之三十二相之馬陰藏相又云陰藏如馬蝗卽仙眞返老還童子之陰是爲實證身斷證到此不可復行淫時始可言斷超欲界之頂而出欲界矣由此上昇入色界初入時淫念未滅盡然大修行人有大志以超世何故有念未盡蓋日間惺然有眞覺時本是無念及至昏沉時有睡魔未必無女色魔定心力微者或有隨此念而妨害道力正是念未滅盡之過能心有定力勝者執心念歸正覺斬絕魔事魔念此亦初入定時勉强斷念之說也念念皆斷至于無念可斷此謂之自然眞實斷者皆由禪定到念住而得初禪如六祖所謂禪心無想實證淫機心斷也方是自性戒定慧也從此而大定而常定滅盡方是斷性亦無也於佛菩提斯可希冀將身心求斷淫機是修仙佛初發心地之正因身斷念住是證入仙佛地之正果若能以此修便可希望成佛不如是修而癡癡地言成佛何異向大海水求火熾洪爐裡求裡堅不過只爲外道邪說之人依傍佛名假借門戸以誑世耳恨不向楞嚴看此一句以醒心回頭明淫欲之非佛本必除淫寶精爲淸淨梵行之佛本也又曰修禪定者不除淫根必入魔道禪定者安定其心於禪静世尊在雪山六年行四禪九定以入佛道是也此言魔道卽淫事也魔王以魔女惑世尊而未爲所惑淫根已除故不入魔世人若爲淫色所惑所以隨入魔道便不是佛道要知魔與佛相反者又曰其心不淫則不隨其生死相續修行人或色界未證初禪念猶不住定心中忽起一淫念着貪愛卽隳入胎中矣古人參禪入在定而投胎去者皆因此也或欲界人命終而死此生而有死續者生氣絕而淫念未絕故見人行淫而亦生心欲與之行淫卽隨此淫念淫事而入其胎矣此死而有生續者及轉生而淫念又不絕又至有死相續當知如是生死相續不了由于心淫心斷淫能見色不淫以及有色不見雖死亦不受生于後胎已証天人矣生亦不死者已証不死生阿羅漢果矣以證佛之八千刧說一會法八萬四千刧入一定而長生不死也昔世尊云最不欲母人入我教中雖不淫壞人道行亦有壞道之具正防人之淫心因彼而生也亦卽生死輪迴之機也故云動念時卽受生時是也又說沙門戒律皆禁沙彌侍者絕其淫具也亦防後人生惡行之因後人可不亦遵戒之哉又馬丹陽眞人戒門人云眞實修行不許用少年童稚只老成四五十𡻕者一二人足矣方是淸淨境界又云淫心不除塵不可出淫心者卽六根之意識心之淫卽根識中之内塵根中有塵而著之不知捨去卽是合塵而背覺故云不可出而謂作佛氏子學佛宗者可不信受佛言除淫根以脫魔道乎史太素問曰我亦嘗聞佛教人說法雖聞巧喻似亦妙高但不聞如何除淫脫魔道者答曰此言人當遵奉佛法戒除淫以脫魔道爲凡夫及僞學者言非槩言及聖智者有悟而聖者自戒必嚴淨修眞梵行爲佛種子若吾人自願志心修佛所修行佛所行豈可違佛至要之戒哉昔迦㫋延先學四禪已得五通矣迦㫋延在雪山修行禪現得四禪五神通爲八百飛仙之首五通者天耳通天眼通神境通他心通宿命通也後又必學於佛而修梵行得漏盡通爲六通此是知除淫以脫魔道出欲界斷生死者也梵行淸淨則得戒力便生定力慧力故五戒先于除淫無淫則無塵無魔無欲界無生死故萬法必以除淫爲首彼世之濫名修佛而不求知佛道因其略于言始略言者非佛不言但言之而簡略耳而遂謗佛始之不以此爲要也因佛止言除淫之名未聞除淫之法故皆謗佛不以除淫爲要若可不以爲要佛何故屢囑重宣爲至要卽上文楞嚴經反覆重言除淫之義但不及仙宗煉精化炁之明言而反掃盡之者竟不用其爲要眾僧流不說自不知究自不能用反言佛不用其法嗚呼可惜佛道由此一根滅絕而無果證矣修六通之行則得六通得証佛果不信受除淫則無六通之行無佛果証故云如來湼槃何路修證然仙宗又略言其終所以可略終者非仙不言乃有一言而總徹矣故云一言半句便通玄以其煉神還虛而合道斯時也絕無所爲至虛至無至虛則無相至無則無法可說何以多言無極至極至無之極也不可以言言者也無言之可言亦不必以言言者也不得已於救度後聖第曰唯見於空所空旣無無無亦無湛然常寂此四句是太上淸淨經中語後世愚夫不識此一言巳徹矣與寂滅何異此皆卽同冷灰無火者亦有無上内秘眞藏經元始天尊云眞實寂滅滅無所滅只因其略而遂謗爲不如佛之湼槃寂滅内秘眞藏經元始天尊云心性寂滅謂之妙因意根不動故名妙果併亦不識佛之詳言湼槃寂滅祗是息無出入心無生滅内秘眞藏經元始天尊云無生無滅無因無果而爲眞果定而已矣卽同仙經旣無亦無常寂之說也千言萬語明性見心之旨總不出仙宗煉已煉神還虛後際半句之義此實二氏之同言若異而理不異佛門末法人强爭爲異正所謂矮人擔板只見得一邊奈何事佛氏者競爭爲自大不知佛之何以成其大而仙本同其大皆超刧運而至未有天地之先此靈光獨耀不隨天地而成壞同有此爲大事仙家者貶佛爲幻空不知仙何以異於佛幻而爲眞空而佛本同其眞空空以何義爲眞空卽佛所說空而不空不空而空是也葢心性靜寂而有正覺是爲空中而不空也寂而無正覺則隳幻空而頑矣不可也心性住于定似乎不空之定相妙于不拘定相洞虛太空不着一所是爲不空中而空也若托相爲定而爲法所繫縳不解脫墮在二乘知見矣非眞空佛果也故亦不可也茫茫二宗學者徒曰學仙而仙且不知又焉能知佛枉稱學佛而佛法不信又焉能識仙道乎妄相譏議不當皆末法學者之愚也若不高誇自已貶别他人如何能爭奪得衣食終於不知二宗之道皆以如是而了也乃同理而異詞者耳如是而了者皆除淫欲以出欲界皆禪定以出色界皆証上四空定天以出無色界此所同之理也異詞者卽此上文兩樣之說是也然而從此究其言之詳亦不爲勝愈於略言之略亦不爲負墮於詳者也負墮二字出傳燈錄乃西土佛說不勝之義今而後吾又爲佛宗惜而爲仙宗幸何也事佛道者迷其始而執其終始者離欲梵行也徒只口說梵網經而身行世法事不以爲始當精進之法迷而不悟一併掃去不用執終者似終之四空定而實無因得空定掃郤世尊習四禪而入定者上五不還天四空天定而九大定者不遵世尊得如來出現時而爲頓自以凡夫之流無修無證而爲頓了任其墮空而不肯悟是爲執妄惑迷者也能從此理而回心實悟于舉步起而行以到家徹上徹下至大休歇而頓了斯足爲我佛門龍象矣若只嗔我云代佛宣言别其眞僞反誣曰我請則佛法終于不得明害郤未來無量數諸佛世尊則四禪九定正法終無有一人肯修取證而已矣棄其命而猖狂談性雖曰秉教普度眾生而實普䧟眾生者也爲其無可以入首則無前修之根基不知耕田博飯吃終歸于死亡之禪若不耕田以博飯吃則如彼之畫餅必不充飢又且有不畫餅充飢者有墮口頭禪外道者以人之必有死爲開示以一口氣不來爲實悟當機處安然待其死是空亡也此悖佛了生死之說矣或有肯實悟禪定者只知四禪五神通而不能成漏盡六通以免死亡皆悖佛之四願曰不老曰不死曰恒少壯曰恒無病者按其滾芥難於投針此亦禪宗人之所說者曰昔佛說須彌頂山上以芥菜子一粒投之滾以下山其山下以一針𥪡立使尖向上芥子投遇針尖焉能有遇此事甚難者喻人生於世得人身甚難得回心修行甚難遇仙佛正法亦甚難借曰萬幸遇沙門四果之初自求生死之法似滾芥投針之難甚言知死此生彼之難遇則其死此生于彼到輪迴不能逃者亦多若能于今除郤外來六塵輪迴除郤内起六塵輪迴于修佛仙正法相應則于針芥相投處方可望一遇而輪迴有能逃不能逃者矣能逃者能知達摩歸空十信又知世尊自擇父母之法則能逃三惡道而生于人中洪福不能逃者不知十信擇法不知一線之下有投逩必不能逃三惡道而墮入矣故蕭眞人云今生若不悟修眞未必來生得怎地所以彌勒佛謂饒經八萬刧終是落空亡者正爲此輩醒也地不湧金蓮法華不能轉不坐金剛座不能超刧所以空亡事仙道者泥其始而以少得爲足未能究其終者有之或有初學少得長生僊人小果便自志得意滿而不進悟入定神通反出定神通者則不成神仙内秘眞藏經云學小乘行終無得道又玉淸道德經云或有不明正性未全六乘不發智慧亦能墮落是也究而未能了其終者亦有之此二節言始終者是言修神仙之始終非言天仙之更在後者其或有在十月入定養胎神之時頻有出入而不滅盡定惟修内神通而不能成神炁不空則不發智慧不超生死也未能成大定時而頻出入不絕只成妄走雖欲外顯神通而亦不能此卽所謂不能了其終者或有未到最上上乘上上乘卽煉神還虛與道合眞能住持於此終處不退念亦不失此形軀暫可長生不死而可久爲參請之具爲其入首少得實地實地者言旣得長生不死則非落空亡之類得實地便可進修了末後句子以証最上上乘則善於佛氏子者矣求其混處世法中能以戒行爲寶者則佛氏子實有勝者焉僧流雖庸下之流每有道高明受戒者道流每有高明之輩同于庸下無戒此便是道者不及僧者處是何故葢僧有戒經頒行于徧世界專習戒經者名曰律師以講明律義大眾便于聞戒易于習學及披戒衣求乞者俗人不擇眞僞曰戒僧也慨施之以是借戒者多至于仙戒天律明科甚多有全說之戒經有諸經之内皆有戒條戒語俱在道藏内盡用住持者秘藏不令世界中學道者得知得見又無律師傳戒遂使徧世界人疑爲仙眞無戒彼何由以發心受戒抑從何處得以聞戒及至求乞者無戒衣可披俗人亦不以如有戒之僧一樣視之而施故出家者以易化緣之故入佛教者多矣故浙杭有一諺云和尙化緣如猫捕鼠一開口便咬一個尼姑化緣如狗捕鼠或偶有咬得一個者道士化緣如馬捕鼠舉一世亦不能咬得一個以此諺觀之則浙地不學仙間有出談仙道者終不知談眞正仙道也後之高賢當知人一類也其性命精氣神等仙佛二宗之人皆同身一生也皆由父母二炁所生不如此者便是卵生濕生化生之眾生心一性也皆具純眞不昧之體有至靜不動之理入佛宗者幸毋廢起首脚跟下所行以自絕於佛道者也凡言脚下所行起初必有所行之工也從一步行起直行到極處不可少者諸佛諸菩薩未有不依法修行者古人所謂若少一法不成佛法是也亦毋二視其性而併自絕於仙道者也人一而性豈二耶人生來所具同一性所修亦同一性所以超刧運而不隨刧壞者亦同一性故我有幸得深明此一性也昔華嚴經云護持諸佛法攝取大仙道此世尊且取仙道而修眾凡豈可不取乎又云大仙所有施戒法忍辱精進禪智慧及以方便慈悲道佛淸淨行願皆說此亦不二視仙佛性之道也遇有仙可學則學仙卽佛也遇有佛可入則入佛卽仙也言仙佛本皆難遇遇而不聞其言不見其神通亦不知其爲仙佛言而不言及超世大道則仙佛之道尤爲難遇世人有何德何功之大何修何福之力而可輕易能得遇仙佛遇仙佛之道耶我故重示之曰在佛宗之人倘偶遇仙則學仙卽是學佛何碍于秃頭秃嘴在仙宗之人倘偶遇佛則學佛卽是學仙亦何嫌其留髮留鬚本來了在一性何必差别分于外相爲哉後學其能聽之否也唯眞修正覺以頓了而各自努力精進可矣言仙佛性固同道固同則所修者當有同証唯精勤修者則證同有不同者是各人勤惰之不同眞修僞說之不同故所證亦不同而又分别門戸爲不同今重示正覺者爲禪定中寂而常覺二宗之小乘趨大乘上乘必須皆努力而後能得不然必爲無知頑空者之所害二宗俱不得所利益予故說不可以有爲單說仙亦不可以無爲單說佛以其皆有有爲皆有無爲不能分而不分也仙家言有爲者卽煉精用小周天煉炁用大周天是也言無爲者卽炁定神定還虛合道是也佛言有爲者卽燃燈說法常轉法輪言無爲者卽龍宮天宮入定靜室中入八萬四千刧定是也又沙門禪師言有爲者卽萬法歸一言無爲者卽一歸無又西來肇師云棄有爲則佛道難成執無爲則慧性不朗當知皆由戒而得定慧皆以有爲而精進無爲也若不如是墮空亡矣昔見佛藏有正法念處經亡先世三十三天帝釋佛藏中言三十三天者卽指欲界六天之第二天忉利天也又名淨居天言有三十三人同爲此帝釋故云如此華嚴經云如來十四天下中或名釋迦牟尼或名第七仙或名帝迦此世尊之自名仙自名爲帝釋也非可指爲仙家之人而妄貶之也以天福盡故退生下世佛釋迦出世爲其說法得不退失旣云帝釋是仙宗天帝因佛說法而得道仙道卽佛法也有可稽也又何分仙佛爲二卽又何誑言修仙者不用禪耶惟大聖智而後知同悟於極也亦唯後聖心自信之以圖自究自悟愼勿向濁惡愚夫言徒然致其一咲所謂不咲不足爲道也彼咲而爭人我者何人從地獄畜生二道來者原無自修自證而又無見無聞又且不信見不信聞必不足以知此雖然予爲憂世有餘說焉卽此仙佛正宗修證而觀之試審二教末學果有誰知一悟於此乎抑亦有聞而信受於此乎皆爲根淺福薄見邪所障也是以仙教末學不學仙道以按導郤病爲多能以房術採戰爲樂計以烹鉛鍊汞爲服食猖狂行教于世索謝禮于郤病之塗縱淫媾於採戰之局挾騙機於烹鍊之塲元始報恩成道經元始天尊言世人生入邪道顚狂惑亂自製一法敗黷道要以求利用賍滿罪積生身被考種種苦惱死入地獄遍遭湯炭永無出期正同此類舉世皆然可有一人不如是乎不如是者則眞志於眞仙者也有學眞仙之志乃前刧有眞修正道之根不入旁門不學邪法不行騙局務修德恐不及豈肯喪德奈何濁世凡夫中絕無眞仙眞道而世何由以學世間因無仙道只有採戰淫術故學者只學此而聞此被其迷惑雖至于耗精神喪性命不知改過祗聞祇自天降而度人者邱長春眞人云了悟仙地出神登仙者悉是虛空㸃化點凡師所度内而神炁成眞外而煉汞點化心口密授而已不意凡夫棍黨諸能内外而遂誑人則世世被其害者幾多人耶又見佛教末學不學佛法予以佛經諸法所開示者而宣示之彼若視爲刀加彼頸忿若仇讐無上内秘眞藏經云聞大乘而生不信此人從無量刧來受六畜身故生我慢不信三寶徒以勸修功德而自竊庇爲遇緣以化人布施而自享利爲護法以打人一棒而得勝機爲超宗陳眞人云饒他傾河之辯反爲入道之魔内秘眞藏經云繫業不住業業相牽云何解脫皆凡夫外道空亡事耳全與佛法不生不滅而湼槃者不相干涉而公然駭俗驚僧不以求眞佛法爲志願不以不求諸佛法爲愧恥爲釋迦三十三祖之罪人爲哄誘善信墮輪迴之魔鬼楞嚴經佛言如不斷淫必落魔道彼等魔眾自謂成無上道我滅後多此魔民廣行貪淫爲善知識令諸眾生墮愛見坑失菩薩路害人甯有巳哉以若所爲爭相冐認曰會佛法何異說眞方賣假藥者乎其不如勸人行善之有補於世道也遠矣噫有志仙佛者幸毋䧟入此二種外道局中斯有可向上之望不然這般種子蟠結心田何生識得滅郤而眞修實性陽神出而還于虛耶
