front:
  text: 仙佛合宗語録重刋道藏輯要仙佛合宗語録
  hash: sha256:7fcadf0cedf6ec8db1c90f2a0aeb88103a9bd4ab642bbc893f549c2ee4ca8e39
  markers:
  - {type: page-break, offset: 6, content: '', id: CK-KZ_KR5i0066_02p001a}
body:
  text: 伍太一十九問八問曰乳哺何為答曰鍊神以後之喻也神氣定而為一神神氣定是在胎中養成之陽神也神出矣所謂常定者正當在是也以大定而至常常大定一定而永定喻之為乳哺不常定則失已定者矣即神仙與菩薩有退墮之謂也不定息則有呼吸如凡夫則亦可同凡夫之生死夫乳之養孩養臟腑而令具足養形軀而令成人乳哺之功至大矣乳哺之用至要矣蓋初定之神易搖易搖者或定中起一調神出念雖不遇境但入之遲而出之久則搖或出遇一境而少著之則搖所以云初出定時必倏出而倏入正要防危慮險也必定而久定而後了其大成初定者滅盡出入息而證一日之滅盡定久定者一七二七七七若年若劫悉俱定中而滅盡定久也方是寂滅為樂之實地此正到天仙佛世尊之圓滿覺道也以鍊神還虛之義明之乳者即鍊之義也鍊而又鍊至合於自然真虛即取喻乳而又乳成其全體者也初出陽神定力小則神通小依定久久而為乳哺則定力大而得神通亦大如人初生只一小孩乳養長大成人氣力大才能亦大倘不常定只得初定小力則不能千變萬化則上上乘而非上上從初定成時而乳至常定還虛便是上上乘如造寶塔合頂尖完矣若不常定雖已在上上之路亦不能到上上矣頓而非頓頓者即是不二法絶無生滅往來出入不似漸之鍊了精又煉氣化了氣又化神一定直至常定之極處方謂之頓若不入為常之大定至圓覺了義則非頓也神而不神初成神仙得大定必乳哺而常定則神之通十方而普現分神萬變所謂百千萬億化身也可此神之所以神也不神者不能大顯神通也由初得定而出神定力微而不可離定若離定則與凡夫不入定者等耳離定略久則曰有危險之當防慮以其離定之故使內失神通而外亦不能有神通必常大定則內常通而外亦通我故曰不常定則不神通或退滯於小果者有之大定而出陽神後能常常大定即佛之加持向上事也則佛之覺道可圓滿仙之神可還虛而了郤最上上矣若不常定則退於出入生滅所以佛言大涅槃經云一切法真如中為有三乘差别相否謂有退住聲聞乘者或有退除獨覺乘者或有證得旡上乘者是也仙家所言三界有衆生者亦言不常定則生死或有至於不能絶盡故也所以寒山拾得達摩傳大士皆由菩薩而退滯轉劫復生為此身惟持守前念具在則此俱不墮猶是菩薩尚能修證向佛若有前念迷者則墮凡夫逐情愛而輪回無出期矣後之偽學者妄談仙道佛法自誇頓了不信如此乃無前修福力之下愚我勸諸人宜愼之則難免於移居奪舍移居也奪舍也及投胎也舊住也仙家謂之四果張真人悟真篇遵大藏已明標其目于世間而諸家注未詳其由蓋以舊住者言住舊房舍即長仙不死人仙之身能住舊是亦或能常入定而或亦有不入定此四者中之最上正果即不死而不生之阿羅漢果可趨佛地為可超小果而向上者以其守住小果不再退而下曰舊住故于退小果之類不言惟投胎奪舍移居三者是小果時之所墮亦向上大修行宜防慮之危險移居者言此身無可居彼身有可居乃移神于彼身中而居也蓋有不常定乃妄出而迷猶似十月內有餘之涅槃或偶遇刀兵劫災壞身而不可居神或偶遇火劫災焚毁壞身水劫災漂溺壞身而不可居神則移神入他人新死之身未壞者而居此小果之所不能逃三災者之所當知故退下小果者遇災劫不能保身亦如之不能免也此由世之參方者傳言如此不必深信豫謂若人之此身老壞或曾經大危廢疾而不可還丹者未免不再生後有少壯之身亦謂之移居棄舊居而移新居也亦兼有投胎奪舍之類在其中又昔張紫陽真人謂其入室外護之徒劉永年曰吾去赴瑤池宴七日不來焚吾蛻未及六日劉以母死焚張蛻而去張回則見蛻焚己無可居而移之此亦初出定不常定而危險當防慮之一案也此亦雖出于作仙傳者之言有無不能辨亦可備存一端之理也奪舍者父母已成胎性命隱然可備存則可為神居之舍勿令他人得而居而我爭先奪而居之可得富貴之洪福或得修行之淸福不墮惡道亦小果有生死者之必至而得定者之當防退以至者即佛教中三陰認景投胎中陰之一機也投胎者有三曰初陰中陰後陰也有死之時與胎産之時相遇則相投入此不住胎中者有死之時在先胎未滿足産期在後則安身于胎息而俟投入者有入胎而俟産者或死于父母媾之先因見媾而起淫念投入為胎隨十月滿而産凡人欲認景而般者亦當知此然此事在凡夫則死而投轉劫生後身在果位則起淫媾之妄念即乘淫事而投入如化書梓潼帝君前劫飛空見漢高祖與戚后之媾遂犯淫事投入胎中為如意太子是也又如世尊在兜率陀天宮天夀盡下降自擇父母投入摩耶夫人胎中為須達多太子是也此二案也在奮志精修必欲即成仙佛者皆當防此為危險也若不幸而轉一胎則遲一劫矣不肯墮下者敢不認洪福淸福保護來世決定修仙佛耶然初大定而出神未可遽離形若不定而久離之必有移奪投三者之危若常定後乃可離形是神已合天德之虛矣凡初定能出而能常定即永在十月外而向上還虛極矣不常定而少有未定只退似十月內則果小矣我故曰出定之初即為入定之始言當常常在大定也或墮陷於異趣者有之異趣者是六道中之三惡道為言畜生道餓鬼道地獄道也以及魔道亦與天道人道之正趣不同者墮陷者念邪之所至也如六根迷其六識入於六塵然塵識即異趣之境也既迷入其境雖曰不為不可得也况貪著者乎故我邱長春真人授法已來皆有斬退無常一法凡精修百日十月之間倘見無常鬼使一到即用法斬退不隨以去則正異兩趣俱無故令大修行者當死而不死亦謂之我命在我也固不宜逐境而定遲心逐六塵外境而未即回定則氣亦隨之馳外而不定俱住六塵異趣矣故張虛靜天師云神一出便收來神返身中氣自回此正示人速常定之理所謂無色界尚有生死者此也此言失定者之墮生死為其不復速定之似凡夫也非言正定還虛有生死蓋定而言愈入妙愈遠生死矣古人云到此正要腳踏實地叮嚀得定者最要常在定乳至還虛同虛空體矣出三界之外死生不能縛天地不能拘又皆乳哺之力也乳哺又豈可忽乎哉自此以後即釋迦所謂虛空界盡我此修行終無有盡無盡之定正是超劫運之修行若劫運至只在定中故不隨劫壞言定之無已也定有已則限於虛空之不盡即是不超劫運學者知之九問曰李虛菴真人曹還陽真人相傳以來言句以何為祕要願再言之答曰皆以採先天陽精而鍊金丹為祕要也上天明科之所重禁不許輕妄漏泄天機厯代仙真莫不皆以此為祕也還陽真人每教人便淺説其道之原以究竟其先天人能知道之原則知天之先所以化生天地化生成人成仙佛者而後真知返其本歸其根復其命之有趨向若世人無真知真聞者不知所備如何為法不知所證如何為道妄猜瞎想欺誑衆愚故真人見古之説喻遍後世皆執喻而愈迷由不知所以然之道乃重宣明示以提醒人知要而已我已發明之而揭於天仙正理直論之首矣虛菴真人言句甚多遺於廬江今且借二真人言初用工者一言之虛菴仙祖有截句二章律詩三首截之一曰一陽初動漏遲遲正是仙翁採藥時速速用工依口訣莫教錯過這些兒一陽初動者陽精之氣於陰極而復動之初也遲遲者陽氣漸生漸旺而至氣定於成丹凡修士用以還丹亦當勿急迫而失之氣嫩也古人立喻以朔旦首一月之令必詳審以三日見庚方之月為藥生採藥之候速速者言時當採則速採不速則望遠不堪嘗矣月減光則陽氣亦漸散不能長生不死故囑之曰莫錯過真人因這些子是長生不死超劫之本祕密天機天上有地下無故叮寧之也截之二曰一陽初動即玄關不必生疑不必難正好臨爐依口訣自然有路達泥丸一陽動者即玄關之藥氣生也隨而由此採鍊即玄關之火氣生也古人云識得玄關金丹了郤世人疑之曰必有祕竅及聞機關之玄妙有猜這件也不是有猜那件也不是又問這樣不是那樣不是果以何為著落故真人破其疑曰一陽初動即是也又何必疑其難知難行哉依師仙機口訣由順路而逆回為採為鍊即灌頂之路也泥丸者頂門乾也所謂夾脊雙關透頂門修行徑路此為真是也又云一孔玄靈竅乾坤共合成者亦是又谷神篇云得採玄關路的端教君容易鍊還丹律之一曰識破乾坤顚倒顚金丹一粒是天仙要尋不必深山裏所得無過在眼前忙裏偷間調外藥無中生有採先天信來認得生身處下手工夫要口傳乾坤顚倒者坤陰主靜在下乾陽主動在上下之靜者不能自升因動者下降和合而後能同升即此升降之機便云顚倒凡天地二氣升降皆如是顚倒之始能生生不已故鍊金液還丹者其二氣妙合顚倒升降亦如是成此金丹一粒服食以證天仙也若非金丹必不是天仙也不必深山者內鍊神氣之金丹最要得仙傳而後知之真行之真不拘在山不在山皆可為之若無仙傳徒入深山也無益故悟真篇云何必深山守靜孤非若以金石外物鍊神丹服食者之必入深山福地而後可也在眼前者言長生久視之妙非可泛然旡見則採取在眼前配合在眼前烹煉在眼前少有不見則煉丹無機矣且違陰符經機在目之説而墮旁門之虛幻調外藥者藥有生時有當採時若不見調則老嫩無分别皆不成丹必仙授天機生如來生之時採如所採之時生生採採皆如即謂之調無生有者元氣自無而生藥為有火自無而生內呼吸為有藥火皆自無來故合先天採煉成丹亦為生有也生身處者即先天氣也無真仙口傳者則知先天不真採煉工不真故必要天上人口傳若世間誑語雖傳亦無用律之二曰若無火候道難成説破根源汝信行要奪人間真造化不離天上月虧盈抽添這等分銖兩進退如斯合聖經此是上天梯一把憑他扶我上三淸此詩專言火候為要者仙家以藥氣為長生之本以火候為長生之大用蓋元氣充運於一身凡夫日勞一日則氣耗一日而身疲故夜必昏睡氣不充也靜久復動而猶漸微年及老氣將盡而必死修仙者使元氣不微弱亦不盡逆回復于命根存住而且長養至于長生非火候則氣不能自歸于根不能自存自長故真人開口便決言囑人曰無火道難成根源者即用火候所以然之理奪造化所必由非此則不能奪用火候又必合月之盈虧然一月盈虧即是一日子午前半月漸盈象進陽火也後半月漸虧象退陰符也抽添以盈虧而分銖兩進退以盈虧而合聖經常法始以有呼吸之候而鍊丹服食後以無呼吸之候而定神證天仙是必以此為上天梯子律之三曰偃月之爐在那方蛾眉現處是家鄉色中無色塵先覺身外生身道更香先取元陽為黍粒次薰真氣醖黃梁其間釀盡長生酒一日翻來醉一場偃月爐喻心也蛾眉現即三日庚方現出一線光之月也月現之初喻陽氣生復之初陽氣生則爐始用故曰爐是家鄉以元氣又喻為米薰蒸而釀成玉液服之一日一醉醉者大周天薰然沉酣之喻也以上五章皆在南昌授曹還陽而作還陽有截句三章一曰一陽每動是其時時時又至我還知謹依師指臨爐訣自然擒住這些兒陽氣每動皆藥生之機是其時者知為藥初生之時時時又至者生而又生生生之不一生而知知而配採當切切愼此時而不可錯失也正是指出參同契中二分水有餘之祕語也若不有師指此事難知謹依師指示採取烹煉氣結成丹而住若不得真仙祕指則不知真時不當採而採者則氣之不足而或嫩當採而不採者則氣之過時而或散故曰當謹依師指則不難于擒住這些兒者即一陽動氣也二曰一陽初動本無心有心撥動指南針得箇牛眠藏氣穴活墓蓮開七朵金無心者心無生而氣自生是為真生而可得以長生有心者時至神已有知而為採取之主凡有知即是神與氣遇遇而不離則配合矣故必有心指南針者以小針浮於水面針身在午針尖在子卜吉地者因以定藏風聚氣之穴也牛眠地藏氣穴皆喻伏氣胎神也蓋牛之性在鼻鼻則有息存焉凡安神息者喻之仙家張果真人有牧牛圖佛家志公和尚有牧牛圖石鞏和尚有答馬祖牧牛之語皆同此活墓者王重陽真人掘土穴為墓自居三年以養胎乳神名之曰活死人墓也大修行時只知有定心不致有動念活活的似一個死人始得不如是必不到仙佛地位後之法眷不可違悖了此意蓮開七朵金者純陽下降度重陽時令舉目東觀海邊見空中現出七朵金蓮純陽又曰豈但七朵還有萬朵金蓮及道成至東乃度邱劉談馬郝王孫七真而預為報兆也故門下後人作金蓮正宗書以記之昔世尊地湧金蓮重陽真人虛空湧金蓮唯演説佛法開立全真正教至于浩浩無極劫者自重陽真人始後來法眷故皆遵之而仙佛二宗始能合一為真修矣三曰金丹大藥不難求日守中天夜守流水火自交無上下一團生意在雙眸此章正言採大藥之理即直論所謂內藥採而後生者也按學金丹者遍世間而知得其大藥者絶少到頭盡歸無有而不能胎神上仙每示人曰世間絶無其事天上始有其理德不合天者難求志不動天者難求深戒人之妄求及不知修德所以為求者又謂大藥不求則不至也故曹真人又提醒之曰不難求所謂不難者蓋守中天守流而已天固在上流固在下上下之間皆有守時守之則已成之氣聚而不散求之即得也故曰水火自交無上下隔礙神氣成一片矣而丹豈不可求哉有不可詳言所守者即天機至祕所難求者守之機在雙眸釋陰符經之教也目神能運則徹上徹下可專覺而常覺不昧也全録中所解皆昔聞仙佛師論道之説故重發明為自注之説非世之他人揣摩猜度幻注者後學見者須當潛心體覓則思得其半矣二真人八詩之説皆重宣火藥者耳夫金丹仙道至難明者真火真藥也顧與問曰弟子久蒙尊教近又得正一天師門授我以玉淸仙士符籙幸悟道之有基敢再問世間人人自稱知火知藥似覺不難明按我所聞命已明者而覺實難明願請再詳答曰難明在調燮火藥之真候若藥候之真于直論語録俱已詳言之無餘矣但調真候于火者則有兩端有呼吸之候一調法也無呼吸之候又一調法也若只渾沌一言不為分别何由實悟然有呼吸者不宜見有必似于無無呼吸者不使強無強無則反著有強無著有而不調者我則斥之曰逼塞難容不強無而順時令以調者我則明之曰如空空無物是也此萬古聖真之祕機天廷之所重禁者所以為難明也學者當按此語修德盟天以尋仙師之度而二真人不得不反覆為言之詳也我今再詳於語録不過當時剌血同盟之語耳顧與韜問誓盟之説答曰自古仙真授受真道必淸淨齋醮如科條具信贄剌血盟誓于天奏告于上帝三台北斗南辰三官四聖五帝司命各位下請命降允而後可傳凡一傳人遍天地間聖神無不告知者倘有惡類妄自行財及以詭詐私相授受師弟子同受考掠可不重哉可不戒哉故四極明科略云度命回年之訣遇真便傳依盟上金八兩五色之羅各九十尺金環五雙師弟子對為九十日告日月傳違科負盟被左右二官所考又云金方丹方悉盟誓上金白絹以誓九天不泄之信又云不盟而度師與得者同被二官所考又云無信而度經謂之越天道無盟而傳經謂之泄天寶又太上科令云傳授弟子當苦淸齋而相傳授受不審其人無齋而傳付者師當死受者失兩目齋不苦切師當病受者失口焉太上三一五氣真經云天仙之真有龍胎金液九轉之丹長生久視有四十年一出之約皆不得背科而妄泄也無仙籍者不得聞知也若信人賫信金誠素試之無退將法付之若猶豫猜疑祕而莫與凡有願學正一盟威者上命所司帝君等授以符籙願學全真仙道金液還丹者太上老君親遺仙道玉帝紫微授以符節所以有符籙者復可升授符籙有符節者始得祕受火藥此所以難遇難明也及道成飛升驗符籙則歸原職驗符節則列仙真字字句句之理皆出仙師法旨故併書此語以為吾金蓮正宗後人之所考證十問曰鍾離祖仙翁謂仙有五等詳傳道集中天仙神仙地仙人仙鬼仙之目世人固皆知之第猶未知何所修證之異而不等也願聞之答曰仙雖五等而其種則二二種者何陰神陽神之不同也鬼仙者陰靈之種類也人死由陽盡而純陰其陰性雖有靈終是純陰之鬼也天神地人四仙者陽神之種類也四仙得陽氣之全足為一根本之所修由淺深不同而證有大小之異初證人仙進至地仙又進至神仙極于天仙大修行人大修者學仙佛正道談仙佛正理持仙佛正戒行仙佛正行者能採取腎中真精陽氣配合心中本性元神宰運呼吸而為小周天之火薰蒸補助補得元氣充滿如十六嵗童子純陽之體者所謂二八一斤者便是鉛半斤汞八兩又云上弦八兩下弦半斤丈六金身者亦是二八亦是一丈六上句是仙教人所説此句是佛教人所説相同者則亦同天體之純陽矣此鍊精已化成純氣者也既還為純氣不復去化生為精氣足於下田下田者乃初在母腹中成胎時元氣所藏之處亦生呼吸之根也故臍與母氣相通出胎時元氣仍在此生呼吸之根亦是此元氣化精由此精返化氣亦在此此理之一定不可罔説者世人妄指人以無氣根之處誤人亦太甚矣雖不用超脫離下而居中但能守在下田即是長生不死之果百千萬億歲而名曰人仙人仙有三種一者是內鍊神氣得金液還丹而成為天仙之初工也二者是金石之藥鍊神丹服食得千百嵗不死者又或鍊二十四品金石仙丹服食至五七百嵗不死者三者是靈芝及諸般草木藥物製成丹丸服食少延其身此則人仙之最下者人仙者不離於人者也不離人者由未超出人形色之凡身也有身在凡尚可淫色化形為精唯內鍊神氣而更不已氣純全不化精精返化氣守在下田氣久固而身亦得其久固所以成人仙者不失人身亦不能離人身此不過初機小成之果耳大仙之道由于三成即上關中關初關之所成初關乃鍊精化氣成者故為小成果守之則永保長年顧與問曰用何保法答曰氣欲動則使之不動而還靜故化精使不化而仍為氣即採取烹煉于下田歸其根復其命命長在而載命之身亦長在也若不守真氣復泄真精則與常人生死無異為其不列于人猶不異於人也所以云神馳則氣散神外馳于目則內氣亦外散于目而用視神外馳于耳則內氣亦散於耳而用聽神外馳于淫則內氣隨而散于淫根而用觸六根之塵皆能令我氣散最危險所當防精竭則人亡精由元氣化而為精為髓以護人身精有生則氣根旺精髓竭則氣根無而不能生護人身者已矣故亡道藏妙法蓮華真經云魂勞神散氣竭命終亦此意古云留得陽精決定長生陳希夷之言人仙者已有焉地仙者從人仙用工不已進一階級者則精已化氣採此化氣之丹更而至於服食之者淫根除矣得成如來馬陰藏相者又云淫根斷者出離故界矣無氣絶之生死身中氣絶而死是分所當死者故佛教人謂之分假生死能仙行於陸地猶有重濁凡質在故不能離於地者也楞嚴經云食地中百榖足不離地不服不食是真解脫者亦不能脫免三災小三災者水火刀兵也人世間偶遇故小大三災者水火風也天地陽九六百之劫數災故大自有呼吸在也何也水災之可以塞呼吸之竅也氣以呼吸通而生水隨吸而入塞其竅不能呼吸氣斷而死故水亦為災火災之可以燬呼吸之具也身具存則有喉鼻通呼吸身具燒燬則氣絶不能為神之所依刀兵災之可以解呼吸之形也或刀劒斬斷其形或鎗戟扎穿為穴而泄氣無以為神之依能使神氣離而為二故皆謂之尸解尸解之説非一或有氣數自絶而死凡夫也小災形神分而尸解者小果也有大修行而能超脫凡形飛升沖舉在天者真人也氣數盡及三災解脫者尸壞超脫凡形者尸不壞當神形離形之時視其形如生人此尸解也足不靑皮不聚者尸解也目光不毁無異生人者尸解也白日尸解者是升仙去非死亡尸解之例也若不解尸與神氣二終能久行於地此地仙之名不虛也可地行千百嵗真實不虛故太上洞玄靈寶智慧本願大成上品經云立三百善功可得長存地仙居一功不全則災從一始而都失前功矣常有其念在於心膂者則是也善功者是大修行內鍊精氣神之善功三百者大概言之有少壯人身夀相當只消三百功便得地仙者有年大精氣神衰弱者用功宜多於三百或有宜倍於三百者我伍子謂凡合當用之功俱要全不全者或有魔誘妄念塵緣而間斷其功則精氣漸散而神氣前功都失或有得功自足止而不復進修不進則必退亦致都失前功及省悟前非而復修更從新用功方可再得念在心膂者心在前膂在背即呼吸升降一孔玄關乾坤共合成者當從一始自起之時念在于此中往來而得地仙及其功全而地仙可得亦常念念在于此則長存不死為陸地之仙而不失從斯以進自一個月而至十個月行大周天之火以不息入無息鍊氣化神氣住矣神全矣是名神仙白玉蟾云所謂歸性根太始及未生之已從前是也斯實係地仙向上進修用十月大周天之火候氣入定化神定以趨神仙者也我以不息而至息自無息故二氣俱住而呼吸無神全大覺而無昏睡此所以無呼吸之神方可作旡形骸之神出定為神通無礙之神仙以無呼吸之氣而入水不溺又名曰水仙有呼吸水隨氣入而溺則尸解非形神俱妙者無呼吸者謂之形妙神全者謂之神妙唯形神俱妙者方得入水不溺水故不能溺神但神仙者亦不離於神者也神而知有神離氣守定一箇神故曰不離乎神若神不有其神則神還虛合道由中田以證果後天呼吸之氣已無先天真陽之氣盡化久守之於中而不超於上田即昔之藍養素胎神十月已成而不能出者之類也不能出者因不知出神之景景到而不出亦不知出神之仙機故不令神出亦所謂夀同天地一愚夫之類也愚夫者帶重濁之形為礙不能神通變化如愚夫但不死可夀同天地也於此之火足神全神氣大定則出陽神顧與韜問曰神氣大定出陽神者願聞所以然答曰神初不能定依二氣以為定氣定則神隨之得定氣定則無神離所依而獨立乃能離宅舍之身而出定顯陽神故出神必由大定後若不到大定神正要依靠不能離氣又焉能離身形故禪宗人心依息以息喻拄杖子乃依之以行者出神矣則為神通變化出神後則神虛空無礙故能變化未出神則身形為礙不能變化鍊其能變化之神而還虛合道則曰天仙天仙者體同天之淸虛德同天之空洞無極重陽仙氣云意同天心為天仙不局命於西天東天西天者天之西一方東天者天之東一方褊小功行所證局促之意超越於三十二天三界上之上仙家言二十八天為三界更上有四種民天共三十二天也言欲界六天與佛説同言色界十八天與佛説同而佛多五不還天在色頂也無色界四天與佛説四空天同佛于色界內頂多五不還仙于無色界外多四種民天仙名三十二佛名三十三而止此二教經文之大同小異也與天地齊其悠久不可以年劫計此世尊所以名為第七仙者即此也世尊在七佛中成佛於賢劫之初不曰七佛而曰七仙見華嚴經則仙亦同佛佛亦同仙超過陰陽天地雖天地有形壞這個性靈不壞則仙佛之至矣極矣無以復加者也此人仙地仙神仙天仙為一陽神之所證也他如不知真精陽氣亦不知真周天伏鍊者徒然祗借喻者之為用凡遇當實讀作圈點二字凡遇單即讀圈字凡遇單丶即讀點字合宗佛語同此古仙古佛禪宗皆同此所修者一性之陰而已所謂未鍊還丹而內觀照者是也性雖寂靜而不動於妄當下真空不起念作輪回種子不隨境入輪回窠臼出得陰神於此稟形氣盡只此一死不來人世再受生死久為靈鬼一向沉空滯寂去便為真寂禪宗之所極證謂之得生淨土淨土者喻心靜而無染塵妄不受後有者後有者後劫之有身不輪于六道不隸於死生之籍故曰鬼仙重陽仙翁亦云不持戒不殺生不思善為鬼仙之類又昔有靈鬼自歌曰做鬼經今四十秋無煩無惱也無愁𨶒王勸我為人去只恐為人不到頭即此類也又六祖盧能曰不思善不思惡亦似此楞嚴經之所謂十種仙之行外道四禪得五神通者皆不出此類也在地者猶隸於五嶽能飛行近霄者即同於生天在天者亦曰天人天人者猶稱天上之民人無道行有生死及死後生靈之性在天由於行十善十善全者多者生于欲界上半第四五六天十善不全者生于欲界下半第一二三天也雖隸於天曹不能合天道以行天道也天道者梵行淸淨道行精真能煉精化氣化神還虛而合道者是也不行天道則無六道十通止為凡民凡人而已即楞嚴經云彼天上各各天人是凡夫業果不知菩提涅槃正法但修十善祗得凡夫善業之果非道行也天王即是菩提天王者是一天之帝王管轄天人及下世人者有功德道行得禪定之神者由初在下世得禪定以證天王在天王又能常禪定故能滿天夀而不墮如世尊為盥水白几率天王稱為護明菩薩是也唯菩薩有大智慧故得受天王之位若凡夫之愚故不證天王也斯言之謂也有時下生於人世言天人無道行有淫欲倘淫念一起即降生於人道亦不能終天地於鬼者終天地者有欲界六等之夀有色界天十八等之夀無色界有四等之夀三界二十八等多少夀數不同唯天王有禪定能以滿其天夀滿夀則功德漸高漸升遷至上天終天地同夀天地劫壞則隨壞故曰終天地即教中之言生天生人者之天人由入門之不正真無陽氣治漏盡道不足以終天地者也是其分量之所自限分量者是其所修功行止能于如此非造化之所限此即釋迦所師之阿私陀佛仙及所參所見之跋伽仙阿羅邏仙迦蘭仙者此三人皆世尊初出王宮時所參修生天人果者世尊知其天福盡而還可墮落六趣故棄之而别參皆參四禪五神通之流習外道定者外道種類有三一者是行邪淫叛戒律偏行世法中不善之事自以為是而不依正法不顧生為魔民死墮無間也二者是專行邪法依傍正門為名即所謂陰為不善陽欲掩之之小人竊取衣食誑騙財物為志而已也三者是正法中人心願行正但著有為初基粗迹便志得意滿誇能説會不了心悟性寂滅真空亦是依傍上乘為名也今此三人只修小因小果為劫運中之受用而已耳世尊已自天夀盡而復下生欲學超劫運者故亦棄此命終生天不足為仙者也命有終而死而生則非仙也又有一等在世之人不爭名利自知無本故不爭利無能故不爭名不事繁華自知無財不可為悅雖有小財不知施為不羣人世昧于倫理者不能羣懶于倫理者不能羣逆于倫理者不能羣狂愚者不能同世人柔懦者不能任世事隱處深山窮谷而亦自謂之仙以所居為名山也人也夫人山二字以為仙乃五等之外仙乎猶有不能枚舉者而皆自謂之仙即如室羅城之迦毗羅仙斫迦羅仙為大幻師幻師者乃設虛幻之術而非仙佛之真修實證求太陰精和幻藥者西方人雖謂之仙焉可順從而以仙混稱之妄謂最上仙亦止乎如此耳後之學者幸毋見此不仙而名仙者遂輕視天仙等焉得箇真知實辨則亦可為美慕而進者否則多岐並列將以何者為我當行之道乎辨得仙真則修行趨向始得真十一問曰今語仙佛所修果同一法未知古來曾如是説否後世抑有知者否答曰有唯仙佛能知仙佛若非仙佛則不知不説也豫略舉世尊之所自言者令汝徵之法華經云昔者仙人授佛妙法如來因之遂致成佛此佛自言得度於仙者也又經云佛聞帝釋説法而悟最上乘妙道此佛自言得悟于帝釋帝釋者釋教人指為三十三天之天帝又指謂治世間分判善惡救拔衆生之玉帝也悟于聞法處即師寶法寶也佛自不叛所聞處存其所聞所名而末學強分為二教不同叛仙叛佛矣華嚴經又云如來大仙道微妙難可知此華嚴經三十四卷之頌也此佛典自稱為仙道者也華嚴經又云如來十名或名釋迦牟尼按大般若經云陰根如小童子者名釋迦注云即東土名黃門宦官之意世尊三十二相之陰藏如馬蝗故名釋迦亦宜或名第七仙世尊于三大劫修行至賢劫成佛在第七故自稱第七仙後人贊稱第七佛或名毗盧遮那又云或稱持衆仙或名大仙師梵網戒經贊云般若兼禪果證大覺仙此皆如來佛自名為仙者也三經之文人人之所傳讀講究人人之所見知聞知世尊既説佛是仙而亦得悟於仙豫安敢謗佛非仙耶又問佛既自稱為仙不知仙可自言曾與佛是一否答曰皆言是一昔元始天尊為未生天地先有之靈以始有之義而強立名曰元始化生天地而化生人乃分神化現十方無量世界則佛亦從一分化現也無疑又佛言從無始來天地劫初而化生為佛也亦無疑則仙佛原為一人故也迦葉頌釋迦云觀我天尊師處世雜穢污此頌詳佛藏處胎經則仙佛皆稱天尊也玉皇本行集經云帝初為光嚴妙樂國王棄位修行三千二百劫始證金仙號曰淸淨自然覺王如來教諸菩薩漸入虛無妙道如是修行又經億劫始證玉帝是此帝也諸佛之師衆聖之王此見皆稱如來也豫按近見西漢以前中國無佛之名昔秦始皇二十七年癸未有西方沙門室利房等一十八人賫佛經來自西域敕令囚禁後遣室利房等并經俱還歸竺國故漢前中國皆未分佛之名東漢之初佛法始入光武之子明帝時佛法始入中國始有佛稱北漢之後北漢者在古趙地其主劉淵在晉朝正統之末年今言此者正言仙宗人不分别佛鍾離真人正陽真人靈寶畢法云智士煉之金佛現言煉心而見性金來歸性則金佛現此仙自言為佛也呂純陽真人云行禪唱咏胭粉詞言即色即是空當體便是也又云不問神仙與佛共同覺照白玉蟾真人入室歌云觀音菩薩正定心釋迦如來大圓覺亦名九轉大還丹謂之長生不死藥此仙自言參禪見性為修道也其劉海蟾真人云真個佛法便是道一箇孩兒兩個抱張紫陽真人云佛珠還與我珠同我性即歸佛性海此仙自言仙即佛也仙佛同一性也而自何常分豫今據實言之東土稱曰仙得成此道而繼其後者亦曰仙西方稱曰佛來授此土人得成道者亦曰佛如世法中稱父母者呼爹媽者人一而二稱之也末世外道以有髮無髮而類分之不知仙佛性宗何由以識其共一法耶雖不知不足罪也唯是厯劫修來真仙佛種子真性不昧而復有真知十二問曰請問神從何處出陽神既不同於陰神所出之法或亦有異答曰然陽神出入於頂門頂門即鍾離真人所言天門是也而居於泥丸為其煉神還虛在上丹田也上丹田即是泥丸故世尊入滅時謂之入泥丸因名經曰泥洹經者亦如是也此天仙神仙及諸佛世尊頂放毫光者皆然陰神亦有能出入於頂門者而但居于心地中田為其亦借修佛為言依而求明心見性心性不外馳而入寂滅是也此見仙及佛門所度四果位之人為然四果尚有生死縱能寂定只是五通陰神而已究而言之陰神亦有二出何也性證于真空寂滅一性真純命終時與神從頂門而出生于天頂出脅入而生于人一也性到真空寂滅而未滅盡定未到滅盡定則心有生滅多出入有時六根引六念而馳六念者六根中之六識為念而外馳于聲色等即從六根出而亦入于母之六根以為胎以眼視女則性從眼根出以耳聽女則性從耳根出以身貪觸女則性從身根出矣母之六根者言女之身根生門也衆生之淫心淫事不除每思行淫則性入于女之身根貪愛觸情迷戀觸境不肯舍去久著根中遂成胎而不能離凡衆生無定力慧心戒行者雖入為胎而不知修行人有定力慧心戒行者偶生一觸念即舉戒念以滅之不犯淫則不入胎禪宗人所謂末後當機蓋如此生於畜道及生人道之下賤畜道者生為畜生之類人道者生為人之類下賤者奴僕及貧窮殘疾邊方夷狄等苦多之類皆曰下賤何以分畜人二道凡畜生飛者走者皆身後行淫唯人在身前行淫人有一生喜于身後行淫者大命終時此念具在焉不于身後行淫而墮入畜道故佛戒云不近沙彌童子者至教也人有一生厭惡身後淫事而專行身前淫事者命終念在未必不因身前淫事而墮入人胎故佛又言我最不欲母人入我教中為其有敗道行之具也二也此已上言陰神所出二端如此則神出而證聖者為凡者趨惡道者盡知之矣豫謂有志大修行者淫事固當首戒而身後淫事尤當戒十三問曰佛既同於仙仙有五等即天神地人鬼五者佛門宗有五目外道禪凡夫禪小乘禪大乘禪最上乘禪是也俱相同否答曰五目皆同最上乘禪佛同天仙大乘禪菩薩同神仙小乘禪同地仙凡夫禪同人仙外道禪同鬼仙又問仙宗下以長生為根基佛宗下只談凡夫死亡禪命終而死以輪回現而能躲脫為當機以生天生人為轉身出頭謂之沙門四果一是須彌洹果能七生天上能七生人間為證二是須陀含果能一生天上一生人間為證三是阿羅含果能只生色界不來欲界受生為證四是阿羅漢果能不死不生為證至此方成沙門方是了生死的菩薩仙宗或不言此答曰仙宗亦言四果佛宗亦言長生然上仙亦不止於長生而極於還虛而與仙之名者亦不皆得長生其外道鬼仙亦有死生在為四果之列者考仙宗之言四果有玉帝本行集經功德品云九品之內四果仙人運應數合下生人中尊貴凡下世帝王大臣皆四果降生功行高者生同色界功行小者生同欲界一生天上一生人間之果如伏羲神農黃帝帝嚳唐堯夏禹皆生欲界以其行淫而生子也亦止一生人間而返天上升三界之上如釋迦佛只生色界為太子不行淫生子而修行徑超于三界之外張紫陽真人又目而言之曰投胎曰奪舍王重陽真人云莫希奪舍學投胎便向瑤池下手栽曰移居曰舊住紫陽真人悟真篇云投胎奪舍及移居舊住名為四果徒正不免生死而求不墮輪回者昔陳顯微云遇物對景當以一息攝之而不復有相生相滅之機此不輪回不受生之妙用也正為此也掃拂得心中境魔淨躲郤輪回路令進修有根基世世生於人中方有進修根基從此以往生平日行十善雖無修行功行死後可能生于人中此善因之本果得六趣中之人道也平日行十善又有修行功行得初禪念住者念住是念住于定所以執心不行淫欲以求住念得念住則得初禪之果矣命終未終得初禪則住定于初禪而不變異命若終而死也住定于初禪命若未終而不死也住定于初禪猶然隨念亦住於初禪天隨念者隨禪定正念即所謂禪悅為食法喜充滿即華嚴經所云佛子如得初禪雖未終命見梵天處所有宮殿而得受梵世安樂此上數句言得初禪受用得諸禪者悉亦如是諸禪者二禪三禪四禪也得諸禪受用皆同于得初禪是也得二禪息住者命終未終皆住二禪天得三禪脈住者命終未終皆住三禪天得四禪滅盡定者命終未終皆住滅盡定四禪天即華嚴經所謂隨所入定境界根前是也隨所入至處則住入到二禪則住于二而不動退入到三禪則住于三入到四禪則住于四此得色界之果也滅息定言胎息滅盡而息真元謂之胎圓可出陽神之時也總此四禪略似懷胎養神之十月為生天之上品果也或有生於欲界六欲天者淫事雖無由執身不行淫欲故無事而淫念未滅盡故但欲界雖名天而多不離于地若生無色界空處識處無所有處非想非非想等處天者淫念空滅盡故謂之四空天此修因之正果得六趣中之天道也或有上隸於天曹居下界卑職掌人間村落小境事如土地城隍社令山主水主福地仙官皆是楞嚴經所謂地行羅剎此是不除葷食之鬼遊于四天者亦是佛言三界內之衆生者即此輩俱是也能五通而不能六通皆不知金丹大道之流不得金液還丹之果不能修證上仙故也世人求證此果而竟不能得者多矣不修還丹證仙者只得下界卑職然卑職亦不易得乃修十善至于萬全而可升仙者上界始授以卑職行代天治世之事十善不全者雖欲求卑職亦不能得吾輩志成仙成佛者絶不談此且其從人而生於人中者危今世為人後世亦生為人此固不墮惡道橫生皆善果也危者此時若不行善則墮惡道故危從人而生於天有善行多則生天人有道行則生于天王及仙官仙士天而下生于人中者吉從天降生人世如世尊從兜率陀天降生為人善行道行兼全易修成佛故曰吉是何故原夫在欲界天者此下詳言自天而後下生于人者雖淫欲未淨盡亦貪淫欲事有淨行淨性者及生人中時淨性不昧進修念專易於證道及于此生求成仙成佛如世尊自兜率陀天來如彌勒亦從兜率陀天降神受生所謂一來生而不再來生者故曰吉又有在色界天者淫事淫念俱淨盡及下生人中來亦於此生永必成仙佛如初祖迦葉如西六祖彌迦遮如十九祖鳩摩羅多皆自梵天來亦盡此一來不再來而成道者故亦吉若生人中而復轉生于人者善不善相半半行利己事半行利人事以世法為塵勞淫與淨相半半生子孫半修梵德戒淫及至轉生於人時舊念依然相半舊念者即上善不善淫淨等若善與淨行長則升為七生天七生人之類如昔軒轅黃帝久居天上因議大行天夀天福滿矣時當議大行升遷向上謂天上功行難積人間功行易積故下生下生人間一世為民二世為臣三世為君乃成上仙又王重陽真人與馬丹陽真人連十世為道伴皆遇正法而未迷及此世為師徒同證天仙如世尊過去世不即成佛必歷三大阿僧祗劫積修而後得道又如三洲護法韋馱天尊為十九世童真者又如天台智者云梁之祜律師轉劫為唐初之律師道宣者此由人轉生于人功行漸增而升者故從危中而得吉也若淫行與不善同長則日趨於下易墮於三惡道同凡夫俗士之苦趣故無吉而終危如華嚴經所謂耽著五欲五欲者食欲色欲財欲名欲睡欲此名五愛欲也又色聲香味觸五者為五塵欲也遠離諸佛障礙生天者是也人中志高者求生天志卑者求生人何以知生天生人之異又何知所以異求也其妙在于仙道佛法中之一音圈點二字耳此一丹家謂之野戰此一丹家謂之守城人能于平常絶淫欲自少壯至老晝夜皆不失此功德得至寂滅謂之凡夫涅槃則能生天得形如稿木心似死灰神識內守一志不散定中以出陰神為淸靈之鬼亦曰鬼仙命終而死者即生天為天人故華嚴經云如此三昧能令一切衆出地獄故免畜生故閉諸難門故開人天道故涅槃由三昧正定而至涅槃而有生死謂之凡夫涅槃尚有六道而求脫輪回者涅槃而永斷生死即是佛涅槃而自無輪回者學仙佛者當知之為趨向此理詳于楞伽經平常不行之功而失此功德及臨命終時七日能如此即華嚴經所謂于世界中死此生彼心無癡亂入胎出胎心無癡亂者則亦能生人中之洪福如永禪師轉生身為房琯丞相是也故智度論三藏中論名云欲界衆生有三種以善根上中下故也上者六欲天中者人中富貴下者人中卑賤言死後往生有此三種又云上分因緣天道果報中分因緣人道果報此生天生人之二者必須聖師度知而後有所宗主學仙佛二種之末學若不悟此者不遇真師傳此者且不能生于天生于人又安能得成道此止于鬼仙及禪師凡夫禪之同者如是故華嚴經云奇哉衆生愚癡無智于生死內受無數身不能以不堅固身求堅固身者正謂此輩也有所謂聲聞佛者華嚴經云聲聞乘隨他語解智慧狹劣是因師傳道之聲而聞道可自進修亦可度人進修知佛道而能成佛道故亦曰佛即仙宗中之遇真師得度正道而未行道築基之人也若肯行亦徹底有所證有所謂緣覺佛者於修行時緣色便覺空故曰緣覺即仙宗百日關中除淫根以鍊精化氣空郤色緣而得純氣長生不死之人仙也葛抱朴所謂下士得道長生世間者所以大育禪師云學佛之士勿滯無漏便為了當要超出陰陽之外則佛事方畢有謂二乘佛者心有生滅以生而趨滅息有出入以有而歸無以有無生滅二者循環故曰二乘自念住息住脈住而趨至於如來寂滅海即同仙宗十月關中玉液還丹關節相通抽鉛添汞陰盡純陽鍊氣至無而得化神之神仙也葛抱朴所謂中士得道棲集崑崙者有所謂最上乘佛者不涉有為不落言詮無名無相非佛非法寂然妙明天地陰陽不能死之生之夀命無量過於天地即同仙宗九年面璧鍊神還虛以後超出於天地之先不壞於天地之後之天仙也五等五目皆同者如此又問今説佛言長生不死從何證據答曰按佛藏因果經云悉達多太子啓王父曰我欲出家為有四願一願不老二願恆少壯三願無病四願恆不死此便是世尊求長生不死之志法華經云佛説是經八千劫未曾休廢説經已入靜室住於禪定八萬四千劫此便是世尊得長生不死之驗世尊求長生住禪定以為道而求成佛後生不求不住而反闢之今人若許佛言為是則僧言為非若許僧言為是則佛言或非如是掃佛之言流于世誤殺半閻浮人矣愚謂求其兩是必得長生禪定者而忘其長生禪定斯可言不求不住徒然一凡夫幻生妄念者而稱不求不住即如田不耕種不播何以搏飯而反曰無用食如是説者不墮空亡外道吾不之許也後之來者能于求住歸一一歸于無則同佛同仙之實悟若言不求不住于一不一而無則同外道之誑語諸人其必自勘之哉又曰大通智勝佛夀命五百四十萬億那由他劫舍利佛作佛夀命十二小劫迦葉成佛夀命十二小劫須菩提成佛夀命十二小劫大迦旃延作佛夀命十二小劫大目犍音乾連成佛夀命二十四小劫富樓那成佛夀命無量阿僧祗劫憍陳如成佛夀命六萬劫阿難作佛夀命無量千萬億阿僧祗劫羅㬋羅作佛夀命無量千萬億阿僧祗劫提菩達多成佛住世二十中劫威音王如來佛夀命四十萬億那由他恆河沙劫藥王菩薩成佛夀命四萬二千劫華嚴經十一卷云一切功德須彌騰雲佛夀命五十億歲又云雖經劫住而身不離散不羸瘦不變異此同仙家之形神俱妙又云海雲比邱於彼佛所千二百嵗受持普眼法門地藏菩薩本願經云佛言覺華定自在王如來夀命四百千萬億阿僧祗劫淨業障經云世尊言無垢光如來佛夀九十劫又稽古略書云寶掌和尚西竺中印度人也于漢獻帝建安二十四年來此土後扣達摩大士悟旨住世一千七十二年而逝又唐太宗時天竺方僧娑婆寐者來此土自言有長生術太宗深信之如華嚴經所云得智藏身于不死界而得自在又云具足修行離老死法又云得不老不病常住命根者皆佛法門中長生不死之證同世尊四願無二也後之修佛法者安能悖佛願而二之耶後學必如此語等證方為得佛法之真又問何為小劫中劫之年數答曰按佛藏娑婆論云中劫有增減算法減者從人夀八萬嵗起以一百年減一嵗減至十嵗為一減增者從人夀十嵗起以一百年增一嵗增至八萬嵗為一增如是十八增減為二十中劫約一增減十分之九每一減八萬數一增八萬數二八一十六萬數共一增減十分之九者八九七萬二千為一中減七萬二千為一中增二七十四萬四千為一增減中劫之數大約如此也再詳言之百年減一嵗千年減十嵗萬年減百嵗十萬年減千嵗百萬年減萬嵗七百二十萬年內除去一千年為一減之實數一增亦如之併二七一千四百四十萬年內除二千年完一增減中劫之年數此比人間凡世之年數也除二千年不算者以其減劫之內因少十年增劫內亦少十嵗故也便是一中劫之年數小劫未見定論以八十中劫成一大劫推之當是一中劫亦可折為八十小劫大約即見其年數也非不長生者能超越如是劫數也然又當知以劫數計夀命者數有盡猶有壞劫在如聲聞緣覺四禪菩薩二乘等與天仙地仙人仙三等者同也以劫數計一定者當知定之如是相續不已劫劫如是超越無窮無壞劫直超天地陰陽此世尊佛與最上乘天仙者同長生之極致者耶十四問曰陽神出非必執於身外有身已承明命但習聞舊説猶不能釋然謂本是無身若謂果無形相可見不知何以謂之出請再詳以教我答曰仙佛之種性即本性之靈光非有非無亦無亦有隱顯形相安可拘一昔軒轅黃帝以火龍出施肩吾鍾離正陽呂純陽三真人以上三級紅樓出以七層寶塔出劉海蟾真人以白氣出化鶴沖天馬丹陽真人以風雨雷震出孫不二元君以香風瑞氣出劉朗然真人以金蟬出蘇耽真人以白鶴出西山十二真人王祖師以花樹出此有相可見而非身也邱長春真人出則通天徹地見天地山河如同指掌又云三次撞透天門日月自别直下看森羅萬象南嶽山藍養素先生以拍掌大笑出此二者無相可見而亦非身也釋迦牟尼佛世尊以白毫光出故華嚴經五十卷云世尊從白毫相中放大光明名如來出現又法華經亦云世尊放白毫相光照見東方萬八千世界靡不周遍下至阿鼻地獄上至阿迦尼吒天此是色界天頂之名即色究竟天是也胎神十月化神得定功行已至此天故所見亦至此天也南西北方如是照見周遍此所出亦非有身也有時出而化火龍吐火有時出而化金剛密迹執榼音楷杵而吐火此有相可見而亦非自身也衆聖高真仙佛所出各别何常拘拘以身外有身為出哉又問何故有此不同答曰得定而見性真空矣於可以出定之時偶有此念動而屬出機未有不隨念而顯化者故不同或無念住至寂滅中而頓起一出念以調神者有同有不同其久久常定而常定者則變化顯現皆由一念千百億化身亦皆由一念故念不在化身則不必見有身念在化身則不必不見有身豫之此言但只為我鍾呂王邱李曹諸祖真人門下眷屬得道成仙者謫言是謂家裡人説家常話非為諸旁門凡夫惡少言也彼雖見之聞之亦無所用後世有緣遇此志于天仙出我長春邱真人門的泒受道者必須記知免當機驚疑也又問知拘拘以身外有身為出或者無有不是答曰得證大定真空見性遇出神之景而出有身也可無身也可亦不可強執無身為是但起念作有身想則有隨其自然空性之念則無身未到見性地位不能真空大定即是未成陽神唯期望有身為出被此妄見障礙與未得稱得未證稱證楞嚴經所謂著陰魔同不得向上全神則無神可出入魔道矣此正內起之陰魔也可不速滅之乎昔山東張先生在圜中圜音圓即園墻亭子禪宗人呼為團瓢馬丹陽真人所謂師恩深重真難報誓死圜墻煉至真是也見承塵板上落下一人立於面前沒入於地後湧出於前彼不知是外來天魔昔吉王太和殿下問曰如何知是天魔如何不知是天魔答曰師傳不透徹故不知傳得透徹故知又問如何傳語為徹沖虛子又答當十月神胎完足四禪得滅盡定矣息絶出入心絶生滅六根大寂何得有知有見而遇外魔由我出神之念而出由我現身之念而後有身若我無念現身而外有身即知是魔若我胎息未完足而不宜有出乃妄出而見有身當知是魔若不得如此受授則不得知也錯認做陽神出為身外身遂出圜問邱祖邱祖曰眼裏見者不是切勿著去見而久戀則心其魔見而不見急入而依我三昧凝神在胎故不著去初不信不信邱祖法言自矜能出神也又問郝祖郝祖曰邱哥説者便是又不信再不信郝祖之言可謂愚迷不醒雖有聖賢不能提挈之執信為身外實有是身已得道矣竟落空亡而不知悟由是觀之但信有身則此有身何不可拘拘認之乎我故曰不可著此由得邱真人傳來祕法也唯於體性中念動則出出亦是念念靜而定定亦是念初定七日必一出凡入定能入得一日則一日一出逐時趲捱向上又能入到定二日則二日一出及到七日之定則七日一出或至二七三七四七又至七七及九年一定則亦一出或多年多劫皆從七日為始即此得定頓為常定故名頓法始終如是故云無二無餘出則便已用於六通之一矣對境而勿逐境邱祖言不可著他者是也一出便收回於上田用乳哺之功為至急入常定也出久不收又恐迷墮逐境輪轉古人言到此地位正要腳踏實地最要時時住定方是踏住實地不然即落空矣佛亦言虛空界盡我此修行終無有盡世言神仙有墮輪回者正防此一出之時也我直論謂防出時之危險是也過此而能常住大定世尊所謂護念令住久住是也則永無迷墮矣仙家言一得永得形神俱妙佛家人言一得永得一證永證俱言此出時佛宗菩薩之有轉劫者亦然如大勢至菩薩轉劫為二十七祖般若多羅文殊菩薩轉劫為杜順和尚唐貞觀時僧彌勒菩薩轉劫為傅大士梁武帝時人志公言達摩大師二人皆梁帝時為觀世音後身此志公贊達摩之言又文殊轉現為唐之寒山子普賢菩薩轉現為拾得寒山拾得二人皆唐金粟如來轉為維摩詰世尊同時人及傳言定光佛皆轉劫有後身者如是諸佛菩薩出世或有分神化現後身以接引當來後世或亦在此初出定一時回向遲誤此案詳佛藏中久矣非無此事此理而世人妄以是非口流言之者我今為懼出定者自誤迷墮故已謂出定入定時之宜防危慮險修士可不愼之哉若只定而不出雖是夀同天地之愚夫愚夫者不徹悟性靈不能顯現神通變化亦能超劫運但不能顯神通故出定者是顯神通之樞機也守此定二七出三七出久久亦一出久而又久亦一出即所謂調神出殼調神者令其出入之有度也若不合于度則為妄出放逸而無妙覺靈應若知合度調十二時至七日調一七而二七至七七百日千日而三千不失于久出促出之危險也乳哺嬰兒加持頓入于大定一定至于九年而一出則定同于虛空之無極是曰圓頓曰還虛合道乳哺是仙家之稱加持是佛家之稱神入定喻懷兒于胎得定力矣而可出喻出胎之兒力小也持定念而加至久久前乳哺兒之大兒初出時言神初離形而暫合虛空加到大定而常久在定則永可離形而同虛空之至極矣定至極久而出亦可極久若不能久定尚近凡夫境界未入聖流則不可久出若以久出而不速入則必退馳于塵境而迷為轉生唯當久定得定力深而可離形去智者方可久出此又調神出定時之危險也自是以後久出久定也可久定在內則已離形去智之久矣可久出者雖久出在外則亦同于離形去智之久故可久此時久定是已出已入後之久定神通變化愈長向上者也不比十月胎神之久定不能出者之有危險在不能顯用其離形也倐出倐定也可六通也能十通也能十通即六通內所多能之條目曰十詳後佛宗語録中千變萬化無所不能如重陽真人正月四日上升時到南京濬儀橋邊勸臧公早修行又丹州大薛遇于終南共語分明又劉蔣村與張公治病藥而即愈又昆明池西在空中舞袖輕飄此皆是千變萬化此真證天仙佛地之頓法也所以我説出定之初即謂入定之始得定之初即為出定之初是出定之初乃得入定之根基也從此而入大定而常久定是也謂得大定以後無有不定之時白玉蟾云父母未生以前信有無窮造化身心不動已後復有無極真機是也方能解脫神通我直論所謂神通境界畢竟住腳不得者謂此也窮天地之年劫止同一定而一出也可即如世尊佛八萬四千劫為一定而後可窮天地大劫亦為一定也正是仙佛以上事説到此正仙佛齊肩大事方云了畢世之人癡迷混日謂仙非禪定之所修謂佛不用禪定而自然頓成佛皆彼福力之薄與仙佛無緣者鳥能知仙佛同禪定到頭如此超天地劫運如元始天尊超過天地五劫運其龍漢初劫經九萬九千九百九十億萬嵗超延康之二劫經八萬八千八百八十億萬嵗超赤明之三劫經七萬七千七百七十億萬嵗超開皇之初劫經六萬六千六百六十億萬嵗及超至上皇之五劫從劫至劫從天至天止是吾身教導人天此出洞玄因緣經無天地無世界無仙無佛無形無神無知無見本性如此已是虛空粉碎無無亦無矣又何必以見有身為言陽神本不專貴于有身但借顯陽神初出能有身之為驗耳神且要還于虛無即有身而還于無身方是還虛合道之至妙至妙處何必拘拘以有身為幸拘于中成之果而非悟性之極耶仙佛合宗語録伍太一十九問十五問曰前之鍊精化氣故曰從無入有中之鍊氣化神故曰從有入無前此皆有工夫後此皆無工夫既無矣神出矣本自然無為之道又言九年面壁鍊神還虛何故於此説一鍊字抑亦可以無為言鍊乎答曰然自一七定至二七三七定至九年定及佛言加持即此時鍊義也菩薩修上八地已證佛即世尊所謂初成正覺乃又龍宮入定七日觀菩提樹王入定七日至二七三七於乳汁林入定七日四十九日不食乳汁林者亦取喻乳哺之義所以八地加持至九地十地再加持至十一地等覺皆如此華嚴經所云雖證寂滅勤修習如修如空不動地佛勸令從寂滅超廣修種種諸智業是也大修行得生滅滅已而寂滅成佛從此初得寂滅而至永遠寂滅全無不動之地佛故明明囑人必要從此初得寂滅道起勤加修習而趨進即同仙家得道出了陽神後猶加鍊為乳哺之工以趨追還虛無之極處前此有為之鍊以十月習定為鍊仙家轉神入定行大周天佛家修習入四禪定皆自有而入無因其意在漸入故曰有為曰習曰鍊昏沉多外馳散亂多而內定少則用鍊氣化神法以補其神神滿不思睡神定不思馳則昏沉散少而漸無內定多而至得真定無氣與息則息無出入謂之息住神在定則性無生滅謂禪性無生此由習定而得漸法所致故謂之漸此仙佛如來正修行之漸非若五祖𢎞忍門下首座神秀輩講經説法生天生人兼行世法之漸者可比也彼七生天七生人間是漸一生天上一生人間是漸及止能修十善者皆是漸也得定而專一在定坐忘論云不依一法而心常定則謂之頓法以其無世法緣念之間斷在家者念父母妻子等六親五倫之緣者謂之世法出家者念法眷念大衆之緣而大起塵勞者謂之世法著於此念則間斷道法無此念而決然從此得至虛無寂滅之極處方是真頓法張紫陽所謂頓超無漏作真人是也真人者高真上聖也仙修而為真上證玉淸境洞真天位者曰真人後此九年之鍊後此者以出神時之後而言皆頓法中之定故曰常定曰大定常在大定大定者即生滅滅已也常在大定即寂滅為樂矣無不寂滅是也則純是一性炯然自一日至七日二七三七三年九載純純全全頓然在定華嚴經亦云恆住涅槃如虛空又云心常正定滅除覺現而以一切智覺觀從此不動入無色定如此而鍊謂之還虛有為之鍊全無著處若執鍊是有為義者則墮凡夫知見豈天仙宗還虛時之所可語耶凡一切諸有為法皆凡夫初修時事即張真人所謂始於有作之説修至虛無方是得仙又從仙之虛無還至虛無之極處方是天仙故世尊云虛空界盡即仙家虛無之極處我此修行終無有盡佛之修行亦至虛空盡處而猶不以為盡故我曰無有不定之時而圓覺經云如來圓覺圓覺者覺道圓滿即仙家言虛無寂滅之極處本無修習及修習者修習定觀覺道猶是有為故西來肇師云有為雖偽棄之則佛道難成故初修時必以所修之法而修習之以成正覺及修習者言心與息也息有出入修習至無出入心有生滅修習至無生滅而寂滅謂之成正覺從此初寂滅成覺修習加持常住正覺而圓滿無可復加故無用修習之法無修習之處如是則我真虛無矣真寂滅矣初得到虛無寂滅者何故不言真得猶是所謂能造其域而不能久也故仙佛皆云一日定七日定二七三七四七五七七七也及加至九年以後不可以年劫限是造其域而能久乃為真虛無真寂滅也我至天地先矣即虛無之極至安可以鍊字致思議言人不可以一鍊字生疑而誤加有為之功也十六問曰鍊氣化神古今皆言十月懷胎不知果決定以十月能完胎出神否請再詳之答曰十月者以世懷胎之例大概言之也凡人之子在母胎以無息而至呼吸成必由十月之久無十月之胎者則氣不為完足而成人而後生化神之氣大周天之用自有呼吸而返至無息之初言修仙佛者皆要將此呼吸之息返而修之至於如父母初媾成胎未成呼吸無息時斯亦謂之父母未生前也亦必由十月而後能無息盡定一變一化之道自然之理如是故仙真度人即此十月而發明之也世人不知厯多少嵗而不得仙無不疑懼真人直指十月必成神通之理令人知易趨而進易修而成也或有不必滿十月只九月八月七月而能出神者人有七月胎而生者八月胎者九月胎者故胎神者亦有生人亦有然或有滿十月而不出過十一二月十三四月數年數十年而後出神者生人亦然軒轅黃帝在胎二十四月而生帝堯夏禹漢武帝皆在胎中十四月而生玉帝在胎一年而生老子在胎八十一年而生佛堂弟阿難在胎六年而生帝祖師在胎十四月而生葉法善十五月生張氲真人十八月生朱橘真人十五月生林靈素二十四月而生重陽王真人二十四月生劉長生真人十三月生甚至胎元大定愈久而未能出者也有此又未知出神之景及出神法如南嶽藍養素先生者故如此此皆李曹二真人相囑之法言也又問何故有不滿十月而出答曰神氣精明志念勇猛晝夜勤功在定定定相續無一瞬一息而不在定元始天尊説先天道德經云妙定其恍忽杳冥之中劉長生真人云意不外遊自有禪定也自然得無息無瞬之稍有間斷而大定可易得得大定之日便是胎完之日神胎既就畢竟景現而出自然之理也所以神既定至於父母未生前不可又強留在胎為不神通之愚夫借曰生人之胎孰能留而不生古人所謂果生枝上終期熟子在胎中豈有殊是也又問何故有滿十月不出答曰神昏氣滯志念不猛一定之間或昏沉不遣而任其不定昏沉是神氣倦弱而熟睡若凡夫到神倦弱時則必睡而不能勉強以遣若修定者即以定可遣而不遣任其不定則耽遲火候而定力微矣必念念入定以遣之可也或散亂外馳而任其不定散亂是心馳於六塵心既外馳在塵受塵迷惑所以馳於外則不定於內不定則是無火候矣無定功何以得神全胎定故亦不能十月而脫胎則定不相續不常定則不能入大定尹淸和真人云一時一刻無功無行是謂虛費者所以九轉瓊丹論云又恐歇氣多時即滯神丹變化如是十月焉能得定雖一年年半二年或至多年亦未可量也會真集云不悟冥冥入定禪神離氣散子母難圓陰陽失媾昧玄玄九載三年不見壺天昔世尊在雪山修定六年晝夜長坐方得成道普曜經云太子苦行精進行四禪行數出入息六年結跏趺坐亦無覆蓋不避風雨不起經行大小便利亦不屈伸坐不傾側亦不卧倚四季端坐雖有衆難未曾舉手障蔽樹下鵲糞污身亦不棄去諸根不亂心不恐怖是也又金剛力士經云佛言若於佛事有不足者不入涅槃佛事周訖乃入涅槃之説便是佛事者在欲界之人修離欲事在色界之人修四禪定事在無色界之人修四空禪定事色界四禪定成者可入小涅槃無色界四空定成者則入大涅槃四禪四空俱成謂之佛事足佛事周訖也若人只知十月為期不識胎之完否胎完即是得定得定由於入定不入則不得未遇仙傳則不識可不於未定而妄認為定不宜出而妄出出無陽神為其未得定足不成陽神之故如是只名走丹前功盡廢矣又問前功如何得盡廢答曰既妄出而不急急專心於入未得大定便以少定為足逐日逐月只如是更有何曰能神定胎完只在尸解地位小果尸解只神妙而形未能妙只勝於死者而已不得形神俱妙此世尊所以云是有餘涅槃言其趨涅槃而實不能得盡涅槃故曰非無餘涅槃者也修士最宜愼之又問如何知得是未成陽神出無陽神答曰神定胎完自有當出之景不見此景即是神不宜出故邱祖真人云功之未足則道之不全楞嚴經云不恆其所覺云何獲圓通所以十月為大概之言不可拘也又問如何得不廢前功答曰不執於期月惟定定相續亦定定增長息息歸無故邱祖真人以輥石逆上高山為喻者示必謹其難也蓋言一日十二時似山有十二分高定得一時如上得一分高定得七八時淸和云邱真人熬到七八個時至九十時後有兩個時辰當不過如上得七八分高到此步步難掙畢竟逐時逐分掙上山頂已到盡處方有大休歇大自在邱真人所喻教門下者如是十二時一周完已故稚子禪宗人亦云一句合頭話萬劫繫騾橛是也此得十二時全無昏睡即所謂我能使得十二時者是也日日如是則胎就神出景到陽神見景而出安得廢功景未到必廢功故曰切不可出也既在高山頂上頓然獨立三年而往真趨大定無不定而亦不知有定無定無騾無橛而寂滅為樂大事方了又問曰既要入定何故又要出定答曰不入不神通不能成神通也不出不神通不能顯用神通也出而不入失神通已成之神通出而不速入則初定而易動悖郤十步百步之説著於塵染雖已成神通而亦可失於是神通必須調出調入及至九年一定之後劫劫如是始為縱橫天地之能事也太一又問陽神之定如此陰神之定同否答曰入定之法略同而定中之得失大異陰陽二修之初修初證不同故也何由異也是異在昏迷而不在散亂以散亂則不在定也不在定則不可分别定中景象然陽神在定中或有少許昏沉在初入定時循環之機所必有者則迷歇大周天之火候斯時六種震動自現眼有金光耳後有風生鼻有氣搐腦後有鷲鳴身有踊動丹田有火珠馳是為六種陽氣自來即丹田中之金丹大藥也陽神自覺能自離昏沉而自覺也所以不致久昏久迷而能孤明獨照此五句是萬古聖真未泄之機陰神之定者其元精元氣不足完則不知其動機而修補之或一有知動者又不知其當補之時不能足氣不能不死故定亦不成陽神祗名陰神之定所以陽氣無從得六種不震動妙覺不靈應入定之久定中或有夙念之根塵未淨迷而不覺如魚在水中則忘水逐境不返即人在境中則忘境迷墮於境矣此身在此而靈性已馳入别胎殼去矣玉皇胎息經云神去形離謂之死六祖盧能亦云性在身心存性去身心壞昔楞嚴經所云窮空不盡空理者為不回心鈍羅漢若從無想諸外道天窮空不歸迷漏無間便入輪轉正言定中之失而有異者如此今略舉定中之失者一端而例知其餘華嚴經有云如歌羅邏入胎藏時於一念間識則託生是也世人又傳一禪師留記云昔日無為子今朝郤姓陳在定之僧為前身隨洪福之念生陳太守為後身是也到得後身數盡或有能回定於前生者無為子是也或有不能回定而在異類者雲光和尚墮牛胎中而直受之不能辭是也雲光好食牛肉有高僧勸之勿食莫趨此輪回之境也雲光答我食而不食高僧曰你可做而不做光不信光死為牛耕於田耕不了力不堪犂不能脫汗不止喘不休高僧去視之呼曰雲光雲光牛則立而仰視高僧曰你當初食牛時我曾阻你你答食而不食言但曰食而心不貪食我説你可做而不做可是身做而心不做否光跪而泣欣曰恨不聽師言今始知身既做此不得不做矣此皆大可防之危險也夫陰神學者得定而能自出者固有人矣其不能自出者皆是所以禪人在定每用護法侍者於此定久則必擊響聲以出之如聲聞之義不及陽神者初出時能調出調入必能自出也蓋防此識念託生之危者純陽真人亦嘗言之免顚危要人呌免顚危有二義一者是初習定時遇飢渴索飲食時令不起煩惱二者是迷定而溺於昏沉若用聲以出之之意陽神原無迷者古聖真教人謹密如此習定者可不警醒之哉又問定法如何是同處答曰最上一乘仙佛陽神始初以為宗凡語中遇一則直呼作圈遇一丶則直呼作點字遇一圈點則直呼作圈點二字方可便於記念與前第十問同與後佛宗語注亦同行住坐卧之間行住坐則初關中關皆有之唯卧是初關百日內有之中關十月以後全無今此乃順口統言者切不可拘執不離這個其行也不離一佛謂之遊戲三昧其住也不離一佛謂之禪定三昧華嚴經云正定中受用為三昧有此則化陽氣即煉精化氣時之火候無此則化陽神而還虛即煉氣化神時之火候及神還虛無之極者皆是也證無餘涅槃矣彼陰神及四果人棒喝佛指直指單傳者亦以此為宗行住坐卧不離這個離了這個則心外馳而不在於定仙家不能入定中化神佛家不能入於禪定中見性而成佛者也行不離住不離亦自有至無此言其大略似同處第仙佛正法禪定之行住本乎自然道君言一切諸法皆空寂相佛言隨順寂滅境界是也祖師禪及四果所宗之行住實由強制但看高峯禪師所説忍飢夀昌金粟三峯三和尚等所説吞聲忍氣及氣急殺人之語可見此陰神此陽神似同而實有不同之妙學仙佛者不可執此便謂全同大用止乎如此則輕視仙佛等之和尚凡夫禪矣當悟所以有六種震動陽氣自來陽神自覺之妙而後可謂之胎神見性真定十七問曰仙佛既同一道一修而又有食葷食素之異得無畢竟有戒無戒之不同乎答曰齋戒俱同而更嚴密天德淸淨純素人不齋戒淸淨不合天之德矣安能證居帝聖仙真之位乎子盍觀之道藏內有太上洞玄靈寶業報因緣經云人造善業則有善報造惡業則有惡報太上道君言始自發心終於極果念念不捨持戒不犯上下有異有三洞衆戒三戒五戒六戒七戒八戒九戒初真十戒十二可從戒十四持身戒二十四戒二十七戒三十六戒正一七十二戒升玄內教百二十九戒洞玄上品四十戒中品六十戒下品八十戒共一百八十戒也上淸三百觀身戒洞神七百二十戒玄都律文天尊十戒千二百威儀戒金紐太淸陰陽戒太上虛皇四十九章經之齋戒章云天尊曰此元始天尊所説之經也齋戒者道之根本法之津梁子欲學道淸齋奉戒念念正真邪妄自泯一切衆生捨淸淨域耽嗜葷羶而以觸法譬之餓鬼啖食死尸火燒飢腸無有飽滿又如蠅蟲爭奪臭腐妄為羶香而以觸法五官溷濁六腑不淨尸魄欣昌樂於死地子當割嗜欲根入淸淨境無作諸苦無造諸惡無生諸見無起諸邪子觀戒文同世法律欲有所犯懼金木刑子於戒文精意奉持凜然在前如對所畏秉心正嚴滅一切想諦聽不二可會正真是吾弟子又苦樂先後章天尊曰學道之士斷諸愛欲郤絶肥鮮長齋淸腸研味至道是為苦中求樂能知其苦不見其苦吾道苦而後樂衆生樂而後苦今吾告子當明愼之又不殺章天尊曰子欲學吾道愼勿懷殺想一切諸衆生貪生悉懼死我命即他命愼勿輕於彼口腹樂甘肥殺戮充啖食能懷惻隱心想念彼驚怖故當不忍啖以證慈悲行又淸淨章天尊曰學道之士以淸淨為本長齋眇思嘯歌太無覩諸邪道如覩仇讐遠諸愛欲如避臭穢除苦惱根斷情愛緣溟溟濁海自得淨戒如白蓮花生淤音喻泥中亭亭出水不受污染五臟淸夷三田革素太玄真人自與子鄰子者天尊指妙人而言前子等行真皆同又洗心章天尊曰六根不淨當洗其心心不受垢自無諸穢元始洞真報恩成道經元始天尊言孝道慈悲好生惡殺食肉飲酒非孝道也靈寶出家因緣經道言勤修行業長齋奉戒精研上道轉神入妙念念增進永不退墮克得道真太上洞真智慧上品大誡云修齋求道皆當一心請奉十誡又云長齋奉誡自得度世洞真智慧大戒經天尊言不殺不淫不盜減酒節行調和氣性又云人不持戒則智慧不通洞玄靈寶因緣經云此十戒者自三淸以下乃至十方上聖真仙莫不皆由持此戒也又云衆生飲酒食肉致生病惱彌益罪根吾不飲不食抱道自然變化無方長生不死虛皇天尊十戒文云不得殺害含生以充滋味不得淫邪敗真不得飲酒食肉元始天尊説九真妙戒云不殺不淫不嗔不二奉戒專一太上十二品法輪勸戒經元始天尊言欲受戒時先須淸淨受真戒者不得屠殺不得邪淫縱恣嗔怒不得飲酒食肉使戒根牢固如玄都山戒相端嚴如玉京殿戒德光明如琉璃珠太極真人二十四門戒經云戒約煩惱隔絶魔心努力勤修早求解脫老君二十七戒云戒勿費用精神戒勿食含血之物戒勿忘道戒勿殺生戒勿為諸惡老君五戒文曰戒者防其失也又化胡經十二戒云戒飲酒戒食肉戒淫戒言語戒恚怒洞玄靈寶千真科戒云出家不交世俗不作有為功德靜思入定降伏外魔名為淨戒玉匱明真科戒云棄色斷情長齋持戒靈寶元陽妙經云有持淸淨法戒者則得真道太微徹視經云學道修真念念持齋心心不退歸心於寂直至道場又云學道者不勤行業不修齋戒難達至真玉皇本行集經云奉戒持齋冥心大道七百二十門要戒律訣文經云此戒文經名也長生神仙要在淸齋志學之士急務修齋齋真齊心守戒為主主以制心悉當淸齋以戒情欲一切貪生智愚不同一識既動無端競興外來曰動內住曰寂來不驚寂去不勞動動而不勞不離寂也寂而不驚不疑動也寂照明徹故無驚疑無驚疑者常樂常住住無所住為而無為為道之最又曰變化無窮由悟守一守一須資唯戒為急持之不虧邪不得入自然混合與道同真由戒入道故謂之門普勸行人悉令持戒究竟歸根同成正道識悟既明終持一戒一戒者唯戒於心不起他念也胎息伏陰經云若不持戒行未入胎息豈得合神太微靈書紫文仙忌真記上經云人雖有仙相復有敗仙相者十條犯而敗之亦不得仙矣一曰淫魂液外漏精光枯竭神焦魄散二曰酒魂忘本室魄遊怨宅七曰勿食肉食則神不守真魄生邪勃九曰勿殺生以罪求仙仙甚難也太上靈寶大乘妙法蓮華真經昔世尊得仙授妙法蓮華經而成佛故後亦説妙法蓮華經云佛告菩薩天人四衆吾四方求法時有仙人言有大乘名妙法華經我即隨仙精勤給侍令無所乏令我具足大波羅密成等正覺又曰昔者仙人授佛妙法如來因之遂致成佛是也後人講此經者謂仙即阿私陀也其七傷品有一之傷帶真行偽淫色喪神魂液泄漏精光枯乾氣散魄零骨空形振與凡塵結因玉府同符豈復得仙二之傷外形在道皮好念真而心抱陰賊凶惡內臻三官所記標為惡門三之傷飲酒洞醉損氣喪靈七之傷啖食六畜之肉殺害足口之美臰氣充於臟腑真氣擾於靈門圖有玄名帝簡亦不免於不死元始天尊曰為學之本當以七傷為急不犯七傷之禁將坐待靈降白日升宸如外勤好學內不遣於七傷者此將望成而反敗期生而反亡故上學有七傷也又云學道者要在行合冥科然後始涉大道之境若自不能徒勞於風塵無益生命之修短其諸經之言齋言戒者有如此又太極左仙公云仙公是天官職位之稱學道不修齋戒亦徒勞山林矣戒者戒諸惡行若不持戒道無由得葛仙翁云學道修仙先修戒行葉法善從太極紫微左仙卿下降在胎十五月而生出胎天然不茹葷呂純陽真人律詩云齋戒興工成九轉定應入口鬼神驚又云齋戒餌之千日後等間輕舉上雲梯又敲爻歌云齋戒等候一陽生便進周天參同理劉海蟾真人云但知恬淡無思慮齋戒寧心節言語重陽王真人云寂然刀圭根本齋戒換西東時中十二常常覺照內調神氣玉爐功又云酒飲淸光滑辣肉餐軟美香甘世人迷誤總無厭個個臨頭路險獨我悟來口遠唯豫省後心嫌十分戒行愈精嚴沒分酆都赴點又云受寂寥餐素又云性亂因醪誤精枯緣色妬又云化道王三已棄家豕羊滋味久相趖音渣又云大凡學道不得殺盜飲酒食肉破戒犯願張虛靜天師心説云齋戒以神明其德邱長春真人語云去聲色以淸淨為娛屏滋味以恬淡為德馬丹陽真人語云優遊恬淡養真人不須酒肉與葷辛酒為亂性之漿肉為斷命之物直須不吃為上又云分明説與出家人戒斷腥羶厭五辛又云腥羶未戒斷了慈悲又云腥羶戒盡常餐素挂體唯麻布待百朝鎖鑰重開效吾師內顧又云全戒腥羶及戒辛又云齋食不可美之又美更何須異饌多般但一味而已又云奉勸同流聽仔細斷葷戒酒全容易又云垢面蓬頭摧壯鋭粗衣淡飯遠輕肥又云我在俗時稱肉斗酒不厭而今已戒十數年矣他如食肉飲酒的亦可做得神仙只是較遲了些若人心不懷道嗜酒貪羶徒恣口腹罪報難逃終為下鬼盤山王棲雲真人語云酒肉吃了便可飛升也休吃白玉蟾真人云辟穀斷葷蕭紫虛云閉關絶俗及腥羶陸師云大戒三百以杜未兆之欲薩真人云道法於身不等間思量戒行徹心寒十年鐵樹開花易一入酆都出世難李雲卿真人云上真高仙必須精持戒行來問道者皆贈以絶欲斷葷四字是衆仙翁之言齋言戒者又如此未嘗不言齋戒也者所以我祖師北七真皆齋戒即於現在世而速成道我所以獨言齋戒之同於佛宗者亦以北七真此證有在也後之人學道之志不篤修行之念未真故不以齋戒而浴德又且無由見藏教經録之為誡故不知齋戒為首務倘有夙緣繼起於邱真人之門而欲修天仙者不可不遵天律自齋戒始又問佛宗戒殺戒葷之説云何答曰梵網戒經云佛言若自殺教人殺乃至一切有命者不得故殺是菩薩應起常住慈悲心方便救護一切衆生而反恣心殺生者是菩薩波羅夷罪波羅夷者此云極惡謂殺生者為極惡之人永棄絶於佛法之外不得稱為佛子菩薩也此是十重戒之一又云一切肉不得食夫食肉者斷大慈悲佛性種子是故一切菩薩不得食一切衆生肉食肉得無量罪故食者犯輕垢罪輕垢者此東土云玷污淨行為垢較前十重則輕此乃四十八條輕戒之一耳楞嚴經云其心不殺則不隨其生死相續殺心不除塵不可出如不斷殺必落神道當知是食肉人皆大羅剎鬼又云不踏生草云何取衆生血肉充食楞伽經云大慧白佛言願説食不食肉功德罪惡令衆生慈心相向各於住地淸淨明了疾得究竟無上菩提佛告大慧有無量因緣不應食肉我今略説一切衆生從來展轉因緣常為六親以親想故不應食肉令修行者慈心不生故不應食肉以殺生者見形起識深味著故不應食肉彼食肉者諸天所棄故不應食肉令口氣臭故凡食羶則口吐羶氣食腥味則口吐腥氣故不得證淸淨地不應食肉空間林中虎狼聞香故不應食肉聞香者聞腥羶之氣也人本不腥羶若食腥羶之肉則人身始有腥羶之氣虎疑為腥羶之物而食之世傳言虎食人見人足而泣始知為腥羶之誤也凡食作食子肉想不應食肉聽食肉者無有是處此言上乘大乘二乘四果凡夫俱戒食肉若許修行食肉則敗修行功德故於五目禪類皆無是處我説一切悉斷如來應供等正覺尚無所食到等覺地位則齋素飲食尚且全然不食况食魚肉視一切衆生猶如一子是故不令食子肉由此三經觀之捷見身心切害則知不可不戒殺諸生戒食諸肉而仙佛之貴於必戒者大約皆同於此十八問曰仙教中有以點化成銀服食升仙為言者佛教中不言此必此為仙佛之所以異乎答曰不異然不異亦有所徴由佛所言點化服食之説在華嚴經久矣經之七十八卷云有藥汗名訶宅迦人或得之以其一兩變千兩銅悉成真金者此點化之言也又云有藥名大蓮華其有服者住夀一劫又云人服延齡藥長得充健不老不瘦者此服食之言也華嚴至大至尊之經所説不可不信此佛教化菩薩修佛之法乃有點化服食之説若對未除貪欲之凡夫則不言也故後世凡夫小乘終不解悟此理仙之言者合言之曰點化服食分言之點化言外事服食言內丹抱朴子云不得金丹不得仙也但服食草藥雜類而不知還年要術終無久生之理若以外事為便可服食升仙則許旌陽真君首言服食飛升者不必言臍內元氣結成丹谷神不死因胎息於石函記中不必言元精藥母於可惜許歌中不必言男子修成不漏精女子修成不漏經女子之經為生人之始信亦為自修成仙佛之信故女修者曰斬赤龍為返經成氣與男修返精成氣者同一理此既皆言內丹之理則外事服食不足飛升也可知張果真人云世上鉛汞祗有變化五金之功無能延生命之理海蟾之徒馬自然真人云九轉靈丹非五金若無神授恐難尋元陽子云未見飲食之人得終天命皆見少亡被所惑而自誤也所以但稱為點銀之仙術則知非為身心性命升仙之道也許真君藥母論云丹道者非人間五金八石朱砂水銀之所為也先天故為元始精又荆山丈人解悟煉石之道無他妙也在委羽山能煉石成水以石水服之不能飛行虛空也煉石雖妙固小術耳了明篇云身中儘有延年藥可笑愚人向外尋若必以外事言服食今亦舉其似者一言之比如升打之靈藥皆金石類之所成也有服之以治愈梅瘡豫以靈藥治楊梅瘡七日愈十日半月一月而得除根愈者治愈結毒者楊梅瘡服輕粉而發毒者治愈痔漏者痔漏九年不愈膿水不止者名曰漏凡九竅有大瘡者皆曰痔治愈膈噎者食膈止於口而喉不咽或咽過於喉而即返吐出者我邱真人門下法眷有奇藥每服五釐或七八釐甚極者不過一分末為一服止用三服或四服五服即全愈皆有痊效使病不促夀算而身可復生而久安病痊則宜速止多服則害大此以上一假皆言金石靈藥之所用唐宋多君妄信方士之詭言方士者遊行十方之士也有此二等一者是棄家學道修仙誠心苦志岩棲穴處戒行精嚴遍訪仙師而遊十方不與世人交遊不為世法染縛此仙佛真修之種子也二者是邪道光棍原無自修之志又無教人之能或為衣食所逼或犯律罪而逃奔走十方以資身口之需以施拐騙之局遂使世之愚人貪財者受其煉銀點化之害貪色者受其採取女鼎之害望長生不死常享富貴者受其服食之害以金丹外藥可服食服之不已而求長生九霄君下降謂劉泓曰世人謂至藥服餌望長生不死不知金丹諸石藥有大毒在中服之者從羲軒以來萬不存一未有不死者中火毒而身裂而促算速斃又可鑒也丹論訣旨云若大丹用石藥雜氣即有大毒不堪服食能不食者為妙強服致枉夭者百即百矣誰能免一不夭受毒者宜用解藥須宣瀉吃防已葵菜甘草湯漸出之元陽真人大丹篇云服丹火毒發速以甘草煎濃汁日夜漸呷之即解火毒故本草有云服金石藥多而中毒者以麥門冬湯解之所用麥門冬去心六兩人參四兩甘草二兩炙三味共末蜜丸梧子大日再服二錢米飲空心下又云凡丹石藥服過多致食不下者以鶯粟殼和竹𤃉煮粥日食之而安丹經云有人服丹砂乳石硫黃紫粉等毒發者急服保仙丸可救性命又云四蒙未全不可服如誤服者覺毒發不安急服伏龍肝汁甘草湯生緑豆汁遂可不死又方云如服金石藥中毒發瘡者以白礬末一茶匙將冷酒調下三服愈還丹衆仙論云解丹毒方有名馭丹散者用麥門冬天門冬各去心淨四兩熟地黃五錢甘草一兩人參三兩白茯苓二兩紫苑二兩半去蘆頭地榆三兩半大赭一兩半海藻一兩半山枝子四兩半共末每服二錢米飲空心下即以諸天真仙聖具有解服丹毒之方藥及醫家具有解服金石毒之方藥而備觀之則丹藥不可輕易妄服食為仙又當知也雖服之者有僅可救病延年之功效猶且難遇况於升仙脫胎神通變化通天徹地之能絶然無有服之何益哉鍾離真人云訪仙求友學燒丹精選朱砂煉大還將謂外丹化內藥原來金石不相關又云內裏明時是至真外邊入者即非親若教異物堪輕舉細酒羊羔亦上升呂純陽真人云可惜九江張尚書服藥失明神氣枯不信還真本無質反餌金石何太愚太淸修丹祕訣云天地原爐郤在身陰陽不測謂之神元氣飛霜飛九轉還丹本是太和精皆言服外物為理之必無也妙解録云今時好事者大修爐火為金丹服食往往為藥所誤醫救莫及所謂無非自戕之捷徑丹論訣旨云切不可信八石四黃而誤用之蓋本非長生之藥若硫磺有軟銅鐵之功礬石有殺虎豹之能豈堪服食而不為毒害哉又有用曾靑雌黃雄黃殺水銀令死以為成丹亦非服食之理此世人互相謬傳者非聖真之良藥是也又問既言仙佛皆有服食之説是若謂為有又云服外物為理之必無是若決言為無似兩其説之不同何也答曰非不同因問二氏之故則述其皆言因古之有病者則用治無病者不用治故古仙不用者更多而用之者少也故詳辨之曰無能升仙只可治病然仙佛言有服食如治老病與大瘡毒之異症祗求救死而延其年於暫非為沖升變化神通超劫之計服食之而後內鍊金液還丹如張天師之自修與茅真君度二弟及佛説延夀一劫者觀之可知其半愚人遂棄其所實用之內而唯説服外者自愚之而又愚他人故也且仙是本性以見性而成仙出而顯神通亦性之靈運而神者也外物只可助形體而除病救死不能見性神通此理人所易曉後學聞此可不如是而究之乎今又指其內丹書之言服食者究之曰飲刀圭窺天巧又曰一粒金丹吞入腹始知我命不由天又曰朝服一刀圭暮即生羽翼又云只吞一粒金丹藥飛入靑霄更不回王重陽真人云修持如會識金丹只要真靈本性在馬丹陽真人云烹丹鼎下丹結中丹熱大丹涼不須煉白去燒黃自然玉性萬般霞彩射人光邱長春真人云修煉事地軸鎖天關出有入無三尺劎長生不死一丸丹究此衆仙真之言而內丹服食益明矣若謂欲究何以有外丹之説且又言外丹點化成銀之術之有無與真假者然此事也非世人可能此事亦非世間有此法傳乃神仙所以助修道之資而為然者唯遇仙傳道者即得仙兼傳術太淸金液神丹經云此事皆祕其文非有求仙之志者固不授也所以皆謂之仙機若不遇仙無仙道者必不得傳仙術魏伯陽云遇非人不得妄傳非人者行與理違若可得傳則人莫不傳於子孫况無志修仙道而徒狂亂妄想苟求富貴者上蒼安肯以此仙術傅之耶靑霞真人云神仙鉛汞神水華池之道自軒轅以來不上文墨只仙傳祕訣心授靈符又云以聖傳聖以賢傳賢不遇真人終無妙理楊行真人云若教個個識黃芽世間那得有貧人抱朴子云丹藥若使凡人知天下神仙成羣矣况志於拐騙愚人財寶之賊將何德以當天授又安能知能得仙術乎當知塵世凡夫俗子煉丹不成便可自醒自戒矣今之輕於言煉銀者盡屬拐騙之賊假託此術以拐騙人之財寶騙人之飲食但名方士方士以遊行四方而不定居者拐騙此方逃避於他方而失主追捕之不能獲凡一方士必有一資身之法或有一醫方而能治奇病或有一銀方而造假銀以欺世故皆為方士之所以名非實有知能可言也道門十規曰自秦漢以來方士競出若文成五利之以金石草木徒殺身取禍而無所成故世稱方術此見於史鑑為儒門學者共見而士仕者反昧此而貪服食點化於金石草木不肯內修是誠何心哉又問曰方士既非實有知能每聞其入門時亦能成銀可用者又是以何巧偽而為能乎答曰全是假銀但可欺誑愚人而已或是偽造假物非銀而略似銀形每欺人曰此銀也而使用害衆又或偽造假物稱曰丹藥私地墊入真銀於內名曰墊手遍世間皆以此等尋訪外護出本銀燒煉皆提拐銀罐而逃故方士類中有諺云作方士提罐一人每有三個死凡提銀得手快活死逃出了門走個死追獲了打個死然墊手是方士拐子總法又有以銀制成灰如末藥便詐稱為我已鍊成之丹藥點入銅汁中大火銷去銅而銀末復體為銀愚夫俗子未能識破誰敢不信此二墊法也又有以銀制如銅樣詐為出山生銅寄賣於店中或巧立為異名令買者得之彼以不相干之藥詐點之銅亦復體為銀淺見寡聞之初學誰敢致疑而識詐此三墊法也入門有成以取信於人者類皆如是而已無真能也但取信於人而人信之由貪鍊者之必遭其拐騙也其不貪鍊者任方士有多詐能而進身無地能明真丹經之理者則方士無投詐之隙而詐煉無所施矣再舉所以為教者言之此下一段皆言方士教人之法或教人以草藥制水銀假死丹經云諸般草木皆非道配真銀為用玉淸內書云用凡水銀為丹者妄人也又云若用水銀為金丹即不是真丹以水銀之質鬆浮不配不堅硬故也或教人制紅銅假白謂之紅銅皆去血配真銀為用以紅銅之質雖能假白如銀而不能純白不配則不能去耀眼之黃色故也此物雖可像銀待用後煎傾點硝點鉛則假質猶然敗壞而復折去名曰掩暫為其祗能掩人暫時之目乃喪人心滅天理者為之如是假法曰養砂不盜母者曰養砂盜母者曰靑金曰白金曰靑天硫曰黃天硫曰死硫曰死雄曰死砒曰死硇等三千六百餘門故海客論亦曾指其偽言所云秋石本河車黃芽一類及誑曰尿精聖無知乃鉛汞精髓妄曰靑鹽更以萬般草木藥物或言出於河北或言産於三吳或言仙草在嶺南或言真藥在西蜀或言雞子鉛出鄱陽湖蓋鄱湖中有所謂大磯山小磯山妄呼磯字為雞而山荒絶無物産者又有指稱蜈蚣山出此鉛然此山在大磯隔水三五里許又名蛇山長故也乃水中一白沙土洲而已非山也高不踰一丈二三丈者耕種之地民衆之居絶無鉛穴乃方士妄言以欺遠方不見者與輕信者或言真汞在辰州府辰州在楚洞庭湖之西南有大山出硃砂以砂之藏石隙者入火升出水銀方士乃指此世間之凡水銀妄真稱為真水銀若可以凡稱真水銀豈又有名不真者乎可問方士以何物名凡水銀則欺人之説難行矣盡是欺言皆無實理只謂延挨歲月久騙衣食今年等藥至明日藥未齊愚貪者不知盡被騙害而已此上皆海客之論説又太古真人還丹至訣云大丹受水火氣足以成若以雜石藥參雜意希化寶舉浩劫而不成况百年短景而妄想成耶昔施無疾真人責馬存曰子家金玉堆積尚不知足有姦偽者誑汝曰得藥為黃金以為飲器則神仙可得此誑者之欺言非通人之至論唯吾輩修仙修佛以修德立行為基者則不為不用也抱朴子云既覽金丹之道則不欲復觀小小方書大還心鑑云物非其類丹必不靈心非合道雖成必禍又問曰世人求丹法鍊銀者儘多果向何求而得有真又答曰全無真法不必學鍊張氲真人答唐明皇曰點化烹煉夭命之斤草木金石腐腸之物不可學也唯當苦志學道修仙則財與命可兼得矣劉朗然曰盡求點化要肥家忘郤形枯改歲華可授道者即可授術道得在心則術亦可得在心也道可以了生死而不復生復死輪回永絶道可以夀齊天地而超過天地之先後掌握乾坤造化而常極樂道可以撮土石成銀呵氣化金舉念得珍寶不必苦心勞力以求而自得者道可於自己性分中求之必得而非若外事妄求之而不得終為虛幻者比抑何疑憚而不求道哉且我今言不必求鍊銀者亦有故有一等貧窮人心甚濫惡謀學假銀欺人以供自給或幸得一假方詐稱遊訪外護拐騙財寶是拐騙之心皆起於家貧居窮之先方外遊行俗人不識尊經聖語仙書戒律人人皆是如此之類拐騙回家戴方巾穿色服造華屋買腴田娶嬌妻廣愛妾用此不自招為恣欲反誑人曰善能採補養家丁稱相公逞富於人前何嘗以喪人心悖天理自愧自罪哉抑何嘗以蒼蒼有三宮九府風刀掠考九幽六洞獄治輪沉報應為懼哉道藏仙王教誡經云生入邪道自制一法敗黷道要以求利用贓滿罪積生身被考死入地獄永無出期而猶以其詐法出入仕門愚㺯其士大夫之愚貪者而士大夫深以為德而不疑不懼亦可笑可惜之甚也士夫見其煉得似成而不知其不可成誠有感其教煉替煉之德此可笑也及其提拐逃走乃不悔其愚貪不悔失防守訟告有千無千之人逼勒追賠計亦遲且拙矣此又可笑也富不能強得且有富者石崇且滅家梁冀且覆族也故海客論為彼惜之方士者誰不借言誑衆曰某官某人我為之煉成服食某官某人我為之煉成點化固為惑人自薦計由是士大夫之貪愚益彰聖人凡人學燒丹者甚多何故只説士大夫是愚貪蓋古之士大夫學丹亦多有成皆棄凡世事而誠心苦志以修行悟道故得遇真仙來度所以古云若是貪財并惜寶千萬神仙不肯來如許旌陽之能棄旌陽縣令者吳猛真人之能棄西安縣令如彭抗之能棄尚書左丞者如尹喜真人以東宮賓師遷函谷關令而棄者張天師道陵以巴郡江州令而棄者李老君以柱下史官而棄者黃帝之棄帝位者王子喬以太子而棄帝位者如劉寬之棄司徒太尉者晉之劉道成棄陳州刺史者齊之張三山棄大司空者如是數仙真者皆棄位苦身心而學道故得丹而成道由於仙傳若後世之士大夫居官而不棄官戀家而不捨家只願永得富貴坐得神仙無古人志行神仙望望且去之安肯顯身而度之哉不過只有方士之遇假法之聞而已益彰者方士相傳獲利必有無限方士巧詐謀進此身以展提計則其受害將亦不止於一矣不尤可恨耶此貧窮惡棍騙人利已之流皆如此又有一等富人家資饒足初信方士詭言遂欲燒煉求為大富盡遭提手騙法提罐騙窮以至壁立無措要知學燒丹者未有不破家赤骨而窮者亦以所聞假法轉為訪護拐騙之謀此由自陷於不得已而亦謀為提騙如久嫖之客便甘心為鳥龜之類是也舉世皆假絶無丹法絶無人知丹理更向何處求真雖苦求之亦不可得我故曰世人不必求學元陽子還丹歌云君看前後煉丹者誤殺千人與萬人又應悟玄子還丹至藥篇云余好紅爐經三十載一事無成而後知八石原無入聖功五金只是凡常物蓋學不究玄機理無妙悟又問曰方士中也有知言內丹不言外事煉銀者抑真知有內無外乎又答曰總為愚弄世人之言也此亦有二種人一者是一心貪淫恣欲用女人為鼎以採戰為道無志於謀他事誡業本行經云樂淫色者由先業畜六根未斷也二者是本意謀外為騙局其所以又言無外者為其人被外事拐騙之多有不再信之意故暫言無外以投其機入身以餂其疑既入身則又漸漸言有外託言唯某處某人獨成點化致大富而買官致大貴此法唯我能之我代為之者也此所言能外是計也非彼真言無外也亦非真有非真能非真代之也光棍之口反覆無常普天之下皆是如此當其言有內時亦必言用陰陽採取以陰為身外之女人以陽為自已男身男媾女為採取補我得長生之説此何故為是言也蓋目為取淫欲之樂好淫欲之人專學淫欲之事家貧不能得淫欲之具故為是採補之説以諶恣已之樂墮其計者可謂至愚之人故先誘其淫樂動其愚心為畜生聚麀之狀而不自羞縱是顯宦名儒甘心入其局中自稱能事不顧外人之恥笑為淫欲迷惑之而己矣久之則又兼進外事而亦復遭其拐騙乃知初言無外為詐非真知言無外也後學者不為此二種人所惑而能信向真正淸淨自然仙道則亦屢世積修心地光明仙階有證者而後能之所以王重陽真人與馬丹陽真人十世同修皆遇正道而不信邪説此世師徒同證是當為後世之鑑者乎又問曰今我欲言無外事何故古仙皆作丹書詳言精妙之理既有丹書必有可為之事請詳言之決後世疑又答曰古有此理而今無此事仙有此事而凡世無可得此事之人若只信有丹書為必有事殊不知真書少而假書多假書者棍徒揑為拐騙具以欺世而取證如許行為神農之言真書者古仙之作其意一則為得仙傳者之印證二則為凡夫妄為者之解惑夫欲解妄為之惑謂凡夫偏於貪利無不妄為造假為真以欺騙人貪為掩暫暫時掩人之目而求必用又名染暫言染造暫時為銀色也既得假銀小利恨不煉大丹而取大富豈知仙訣大丹上天重禁祕藏不為世間凡夫用更不為滅德者用彼貪之不已而誤信者是不見其有真丹書之正法未解其惑而然若有見真書之理必當自思我之所為皆不如是所聞者又無從得如是既不如是即不如是理之可成是今無此事也明矣而妄求之心亦當已矣好將求外欺人騙人之心洗刷懴悔淨盡戒惡改過從善修心動求身心性命正道修個可得仙道之根基便有可得外丹仙術之因欲求正果必修正因可不勉哉欲求仙術成銀而不積德修正道是猶戲臺上優人自稱漢祖唐宗終日説入關中取鳳城口妄説而終不可有得也何以異夫可為得仙傳之印證者以何書為真如太上之黃芽歌之金碧古文龍虎上經元君之玉淸內書金華玉女之説丹經鬼谷子之九轉金液大還丹歌術中經廣成子之浮黎鼻祖許旌陽真君之石匣記之神樓賦諶母元君授許旌陽之銅符鐵劵吳猛真人之直指靈文此即銅符鐵劵之注合書於每章之下之大還丹歌葛仙翁名玄字孝先之採金歌二篇之神符經九霄真君之大丹歌之妙解録鍾離正陽真人之破迷歌呂純陽真人之認真歌程昭之析理真訣張紫陽真人之金火歌之金丹四百字之大丹歌李靈陽之玄靈備覽嚴君平之鉛汞歌王果齋之金丹鉛汞歌薩真人之太上指迷血論之鉛汞歌范文正公之漁莊録虛靜真人張天師之管見歌高象先之金丹歌張三丰之鉛汞歌白玉蟾真人之金華沖碧丹經祕旨之地元真金歌歌乃真書正理及後世棍徒借曰仙翁之名假託為做法注於下其注不可信之三元樞要之金碧寶鑑尹文始真人之大丹歌李真人之龍虎還丹訣李光元之海客論彭曉真人之明鏡匣之識一歌百玄子之金丹真一論淳和子林太古之龍虎還丹訣雷一陽之黃白破愚之黃白鑑形歌論是原本真書另有做手一本是後光棍假作切不可信王敬所之金丹捷要洪武時人雷一陽之師張元德之丹論訣旨心鑑劉太初之金丹辨惑仙家四書有四種此一種也陳自得之外丹敲爻歌嘉靖時福建人也之黃白直指之金谷歌之竹泉詞玉田氏之金大靈篇慕陽子之慕陽真訣此為徽人方姓止能祖述丹經作詩歌不悖於理而亦不知內事者鉛汞歌等書仙術之同有得於神仙下降而傳者有自悟虛理而不能燒煉唯效法作書以表所悟者為真理之可取證者略舉如此而我伍子不獲已於無言恥舉世之為人惑亦作神丹理論九章痛為之辨皆試驗事理與許旌陽神樓賦符劵書及葛翁採金歌皆合符節老師所言仙丹者與世不同一轉成母二轉成丹三轉點化漸至九轉而浮黎神氣似有似無者可服食延年而亦不能倚著誤內修已抄出於世誡世之愚仙丹天禁至重唯傳苦行學仙者今古皆不令凡夫知此言點化服食正謂闢世之妄為者豫以空言闢之彼曰汝不知此理曾似我知焉肯改過子以知真闢世後之妄假無非欲明得此理或可自悟自戒以答張李曹三真人之付囑他如秋日中天成化時人所作如夢覺新書序文甚是正理篇目散亂不真如金丹法藏如百法問如洞天祕典如火蓮經如觀花記如黃白承志録等書醇疵真偽相雜不由仙傳而不同仙術作於誇能之臆見而陷人以疑論固不足證矣又如度世真機如我度法度如琴火重光如假漁莊做手如假黃白鑑形做手如假地元真訣做手此三書皆論真丹之理萬厯末年乃有三種假法做手是當時提罐光棍所偽造者切不可信如三十六照如六十四匱法如七十二家爐火等書猶假甚之不可取證者并我所未及見者姑不枚舉是所必不可見者見之則害人心術吾又論之仙師之傳道必擇心專念篤能修道者故有直授財物助弟子得以供日用而遺世絶俗以密修虎皮座張真人助李虛庵真人以行道之資是也而又授以巴成之丹藥兼授鍊銀之仙術故祕授成銀仙術得以潛煉助道者陳正懿謂侯楷曰苟非栖隱山林未易有得也言居俗者必不得也亦甚多人於中亦有未得授成銀仙術貧乏不堪潛修必用外護者如伍達靈之得張仲二友如張紫陽之得馬陸二公如王沖然之得富韓公李長源之得筠陽親舊又有説焉當其初修仙道於世間則亦必用世間之財為日費之計如鍾離真人云真氣未完一日三餐要食大藥未就一年四季要衣即佛藏寶積經所云以生死財而求甘露不死仙財是也今而資之外護者室中三四人如王重陽真人用李靈陽和玉蟾護法而二人皆得道如張紫陽真人用白龍道人劉守益護法而師徒二人皆得道日給用銀不過五六分七八分每一人大約用二分三人者則六分四人者則八分歲不過三十金二年工則二其三十三年工則三其三十若造靜室關房則所費不能預算多寡唯量力世間每有信向仙道能出此等些微之財為護者儘多及願為如此等護者亦儘多要知護仙佛者即得仙佛凡用護者必先見得此人德行可證仙佛志念可證仙佛則用其護共修同證如佛所言施者受者同成佛道若無可證仙佛之德志者不可用其護所謂不使人間作業錢避天罰之無成豈容一概混用哉古仙所謂財不難兮侶郤難者又云擇侶擇財求福地者是也彭真一云投名山絶常交結仙友隱密潛修晝夜無怠方可希望又問曰修仙道者果鍊銀為好乎果不鍊銀為好乎答曰昔龍眉子云欲為跨鶴之遊必藉腰纒之助鍊固方便美事但鍊銀不密即為招禍之媒或至喪身失命而反誤道或至遺棄所戒而不能護道雖鍊之亦無益此不奉仙師鍊丹之戒者而然也不鍊銀者未有不依外護依護者則宜不甚遠於世人之居而便給飲食太遠則給護者厭煩太近則又恐世事干擾略近而僻靜方妙鍊銀者自有護必入深山窮谷居之抱朴子曰入山道者當懸鏡則魅不敢近人凡仙來及山神來鏡中猶是人形若鳥獸邪魅鏡中即現鳥獸本相不敢近人矣魅去則必郤行是魅必無踵若有踵者則山神也古仙所謂起來旋點黃金用不使人間作業錢是也一切皆取之自辦遺世可矣甚省交接應酬間是非得以專心悟道而速證果古仙依此修行者其證果更大若不鍊銀及不用外護者又有居山二法一法者三四師徒道友各辦銀三十兩為自身一人之費三年亦足用不必妄疑而多求則各具而各足何難之有且居孤寂之山不能多藏欲為弭盜之法弭賊是止盜賊不生窺𦗪之心使無可窺者莫善於以銀溶入銅鉛中祇見銅鉛之廢形而不見銀形則禍不生凡取用為買辦則煎銷些微若似從布施來者及一切衣食等物皆不令多餘或每人以三十金為入攢米堂之資有密修者雖待食於堂亦必要靜室離堂半里一里許有送供之規則在則亦足二法者三四同志再多用二三人之力耕以取食鑿以取飲苦修行之正仙佛之所當然者後學若以此法自修亦可矣亦不必鍊誨盜之銀也切以此囑昔曹還陽真人囑豫曰鍊銀真是仙術天福所關只許汝一見不許汝妄意常常為之恐迷於射利甚喪厥志且古言不受苦中苦難為人上人三洞聖真無不由苦行精修者子其勉之豫敬守斯誡言而亦宣言以誡後人後人其亦奉誡自勉之十九問曰彼教不信長生而任其有死者必有後生凡人之生於世間生有身矣則必有死及其死矣性靈無所依泊則必又生抑何所為不生於天而生於人畜願語與後學知之答曰生畜之因最多不善而貪嗔癡淫皆畜因也世尊教人戒淫為第一事即其故也故有序云觀其源始不離色心生滅輪回斯為苦本聖人超悟息駕反源拔出三界然後為道是也豫言止此今詳説之人若能修衆善能斷淫事淫欲即悟楞嚴經所謂執身不行淫而斷淫事執心不思淫而斷淫念所謂命根斷者乃能不受後有而生於天其已生在天者動一淫念即墮下界况在人中淫念不轉生乎故有雖修衆善不能斷淫必受後有之身又問若受後有有得人身有得畜身分受之時抑何可以轉其畜機而生為人乎答曰亦由自作而自受者佛藏辨意經云貞潔不犯外色男女護戒奉齋精進言外色男女者是世淫人以男女二色為淫具意女色行淫在於身前男色行淫在於身後故世尊戒經云不近沙彌禁男色也又云最不喜母人入我教中禁女色也人以素貪身前行淫者同於人媾兼有善因必受入身前淫受之胎而為人專念身後行淫者同於畜交兼無善因必入身後淫受之胎而為畜人若不信但觀古云要知後世因今生作者是之説即是世世皆有一等癡人最貪身後淫事者即所謂一條尾千定萬定者矣入二教修者可不亟戒身後之淫哉凡人心中有此見一起即畜機動也當機者能戒之則見此不淫見而不見而歸心於戒定而後遠離畜機世尊云當珍重波羅提木義是汝大師若我無異言持戒也禪宗皆言轉位回機即此即業報差别經云具修十善得生欲界天若修有漏十善以定相應兼修禪定者生色界天若修遠離身口以定相因生無色界天遠離身口者即淫機身心俱斷之義正法念處經云持戒不殺盜淫此三善得生天如是既生於天且不受生於人况其畜乎六祖盧能云除淫即是淨性因誠至誡也唯禁戒精專不犯身後之淫始可滅郤畜機而為人也談禪説道者專為身後之樂其心於知法犯法而望不畜者必不得矣因根固結於心故也至心口不一禪道盡成誑語矣我問世人倘見此言亦肯懼戒之否又問每見宗門人言了生死不入輪回畜道又郤掃仙佛之道為不足學彼自有法愈於仙佛果然乎不然乎願説欲聞答曰了生死者生死已無了不生不死之謂也凡人既生有身必難得無死既死無身必難得不生此常理之必然亦常人之不能不然者欲了生死必保得此身不死靈性常在此身中更無何性往彼受生此生死自然了矣若不能保身而至必死則性離此壞身急尋依泊必復生為彼身豈可以今之死而冒稱為了生死乎唯仙佛能不死而不生唯仙佛之道是不死不生之道也以其使神氣住定不相離身有寂盡滅盡定之功然後能保身不死而得不生為真了生死也此仙佛所説之法教人遠離惡道苦趣之説也末世邪人外道不知寂盡滅盡定不唯不知而不能求知且又掃去禪定而不用叛郤仙佛正法極言禪定至滅盡之非指為煩難不如已捷彼既不能滅盡定如何了得自已生死反用誑語欺哄世人害得遍世間人皆不知以仙佛正道了生死甚可痛恨也又問彼以此死為了生死與不了生死者其差别何以為異答曰即是一個不了生死唯真了生死者此身既不死其定性靈光獨超劫運不隨壞劫而壞安有六道輪回故六祖云性在身心存是也即大涅槃經云入菩薩正性離生是也不離生死者平日只行世法中邪惡事而不改身死時性只如前行邪惡事亦不改然世法事原皆背郤天道的俱是六道中所為之事為六道種子如性偏好貪暴者則同狼性之貪暴死後化入狼類如性偏好慳好狠毒者則同犬性之慳狠死後必化入犬類如性偏好淫者則同豬性之淫死後化入豕豬之類王盤山真人亦曾説此四類如性好毒害則同蛇虎之毒害死後入蛇虎之類不分未死已死此念不離必因此念入畜道矣只説還是在人生時一般不知已死無了人身入畜身既不知入畜身不求脫離便成了個堅固畜身矣只有畜生的受用萬般苦楚無能脫離此所以修身心者貴於不死而不生後世也禪宗亦有高僧求投人胎者為此凡人死後靈性所在之處即曰生又有一等其性貪食無厭足如餓者不捨一口與他人吃此必生於餓鬼道由生時死時皆無厭足之心故也又一等十惡重大者入地獄必矣如陽世牢獄禁之待發落之義也此皆不了生死者如是有志者豈可誤陷於不了耶故古云了即業障本來空未了應須還宿債有人身者其思之
